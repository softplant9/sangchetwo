<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>보디빌딩 지도자 시험 대비 자문자답</title>
<style>
  :root {
    --bg: #0f1419;
    --card: #1a212b;
    --card-hover: #212a36;
    --accent: #4ea1ff;
    --accent-soft: #1f3350;
    --q-color: #e8edf3;
    --a-color: #b8c4d0;
    --border: #2a333f;
    --answer-bg: #141b24;
    --done: #2e7d52;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Apple SD Gothic Neo", "Malgun Gothic", "맑은 고딕", system-ui, sans-serif;
    background: var(--bg);
    color: var(--q-color);
    line-height: 1.7;
    padding: 24px 16px 80px;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 780px; margin: 0 auto; }

  header {
    text-align: center;
    margin-bottom: 24px;
  }
  header h1 {
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 6px;
  }
  header p { color: #7b8794; font-size: 0.9rem; }

  .toolbar {
    position: sticky;
    top: 0;
    z-index: 10;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    background: rgba(15,20,25,0.92);
    backdrop-filter: blur(8px);
    padding: 12px 0 14px;
    margin-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .toolbar button {
    background: var(--card);
    color: var(--q-color);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 8px 16px;
    font-size: 0.85rem;
    cursor: pointer;
    transition: background .15s, border-color .15s;
    font-family: inherit;
  }
  .toolbar button:hover { background: var(--card-hover); border-color: var(--accent); }
  .toolbar .progress {
    align-self: center;
    color: #7b8794;
    font-size: 0.85rem;
    margin-left: 4px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-bottom: 12px;
    overflow: hidden;
    transition: border-color .15s;
  }
  .card.open { border-color: var(--accent); }

  .question {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 18px 20px;
    cursor: pointer;
    user-select: none;
  }
  .question:hover { background: var(--card-hover); }
  .num {
    flex-shrink: 0;
    width: 30px; height: 30px;
    border-radius: 8px;
    background: #232f3d;
    color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem; font-weight: 700;
    margin-top: 1px;
  }
  .card.correct .num { background: #2e7d52; color: #fff; }
  .card.incorrect .num { background: #9c3636; color: #fff; }
  .card.correct { border-color: #2e7d52; }
  .card.incorrect { border-color: #c14a4a; }
  .q-text {
    flex: 1;
    font-size: 1.02rem;
    font-weight: 600;
    color: var(--q-color);
  }
  .badge {
    flex-shrink: 0;
    font-weight: 800;
    font-size: 1.05rem;
    margin-top: 1px;
    width: 18px;
    text-align: center;
  }
  .card.correct .badge { color: #54d18c; }
  .card.incorrect .badge { color: #ff7a7a; }
  .chevron {
    flex-shrink: 0;
    color: #6b7785;
    font-size: 1.1rem;
    transition: transform .2s;
    margin-top: 2px;
  }
  .card.open .chevron { transform: rotate(180deg); color: var(--accent); }
  /* 문항 클릭 시 문제 하이라이트 */
  .card.open .question { background: var(--accent-soft); }
  .card.open .q-text { color: var(--accent); }

  .answer {
    max-height: 0;
    overflow: hidden;
    transition: max-height .3s ease;
  }

  /* 정답 확인 버튼 영역 (정답은 클릭 전까지 숨김) */
  .answer-actions {
    padding: 8px 20px 18px 62px;
  }
  .reveal-btn {
    border: 1px solid var(--accent);
    background: var(--accent-soft);
    color: var(--accent);
    border-radius: 999px;
    padding: 9px 22px;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: all .12s;
  }
  .reveal-btn:hover { background: var(--accent); color: #06121f; }
  .card.revealed .answer-actions { display: none; }

  .answer-inner {
    display: none;
    padding: 4px 20px 20px 62px;
    color: var(--a-color);
    font-size: 0.98rem;
    border-top: 1px solid transparent;
  }
  .answer-inner::before {
    content: "A.";
    color: var(--accent);
    font-weight: 700;
    margin-right: 6px;
  }
  .card.revealed .answer-inner { display: block; }

  .mark-bar {
    display: none;
    gap: 10px;
    align-items: center;
    padding: 2px 20px 18px 62px;
  }
  .card.revealed .mark-bar { display: flex; }
  .mark-bar .label { color: #6b7785; font-size: 0.82rem; margin-right: 2px; }
  .mark-btn {
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--a-color);
    border-radius: 999px;
    padding: 6px 16px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: all .12s;
  }
  .mark-btn.correct-btn:hover { border-color: #54d18c; color: #54d18c; }
  .mark-btn.incorrect-btn:hover { border-color: #ff7a7a; color: #ff7a7a; }
  .card.correct .mark-btn.correct-btn { background: #2e7d52; border-color: #2e7d52; color: #fff; }
  .card.incorrect .mark-btn.incorrect-btn { background: #9c3636; border-color: #9c3636; color: #fff; }

  /* 필터 바 */
  .filterbar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    margin-bottom: 16px;
  }
  .chip {
    background: var(--card);
    color: var(--a-color);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 7px 16px;
    font-size: 0.85rem;
    cursor: pointer;
    font-family: inherit;
    transition: all .12s;
  }
  .chip:hover { border-color: var(--accent); }
  .chip.active { background: var(--accent); border-color: var(--accent); color: #06121f; font-weight: 700; }
  .chip .cnt { opacity: .7; font-weight: 700; }
  .chip.active .cnt { opacity: 1; }
  .chip.wrong.active { background: #c14a4a; border-color: #c14a4a; color: #fff; }

  .empty {
    text-align: center;
    color: #6b7785;
    padding: 50px 20px;
    font-size: 0.95rem;
  }

  footer { text-align: center; color: #5a6470; font-size: 0.8rem; margin-top: 30px; }

  @media (max-width: 600px) {
    body { padding: 16px 10px 70px; }
    header h1 { font-size: 1.25rem; }
    header p { font-size: 0.82rem; }

    .toolbar { gap: 6px; padding: 10px 0 12px; }
    .toolbar button { padding: 7px 12px; font-size: 0.8rem; }
    .toolbar .progress {
      flex-basis: 100%;
      text-align: center;
      margin-left: 0;
      margin-top: 2px;
    }

    .filterbar { gap: 6px; }
    .chip { padding: 6px 12px; font-size: 0.8rem; }

    .question { padding: 14px 14px; gap: 10px; }
    .num { width: 26px; height: 26px; font-size: 0.75rem; }
    .q-text { font-size: 0.95rem; }

    .answer-actions { padding: 6px 14px 14px 14px; }
    .answer-inner { padding: 4px 14px 16px 14px; font-size: 0.94rem; }
    .mark-bar { padding: 2px 14px 16px 14px; flex-wrap: wrap; }
    .mark-btn { padding: 8px 18px; font-size: 0.9rem; }
  }

  /* 큰 손가락 터치 대상 확보 */
  @media (hover: none) {
    .mark-btn { padding: 10px 20px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>생체 2급 구술 면접 테스트</h1>
    <p>질문에 답한 뒤 클릭해 정답을 확인하고, 정답/오답을 채점하세요</p>
  </header>

  <div class="toolbar">
    <button id="expandAll">전체 펼치기</button>
    <button id="collapseAll">전체 접기</button>
    <button id="shuffle">문제 섞기</button>
    <button id="reset">순서 초기화</button>
    <button id="resetMarks">채점 초기화</button>
    <span class="progress" id="progress"></span>
  </div>

  <div class="filterbar">
    <button class="chip all active" data-filter="all">전체 <span class="cnt" id="cnt-all"></span></button>
    <button class="chip unmarked" data-filter="unmarked">미채점 <span class="cnt" id="cnt-unmarked"></span></button>
    <button class="chip correct" data-filter="correct">정답 <span class="cnt" id="cnt-correct"></span></button>
    <button class="chip wrong" data-filter="incorrect">오답만 <span class="cnt" id="cnt-incorrect"></span></button>
  </div>

  <div id="list"></div>

  <footer>총 <span id="total"></span>문항 · 채점 결과는 이 브라우저에 자동 저장됩니다</footer>
</div>

<script>
const QA = [
  ["보디빌딩이란 무엇인가?",
   "보디빌딩은 바벨, 덤벨 등의 기구를 이용해 신체를 단련하고, 근육의 크기와 균형, 아름다움을 겨루는 스포츠입니다."],
  ["보디빌딩 역사에 대해 설명하시오.",
   "보디빌딩의 창시자는 독일의 유진 샌도우입니다. 남자 보디빌딩은 1970년 유고슬라비아 베오그라드 IFBB 총회에서 공식 출범하였고, 여자 보디빌딩은 1982년 출범했으나 2013년 승인 취소 후 여자 피지크로 대체되었습니다."],
  ["종목별 공식 인정 연도와 장소는?",
   "여자 보디피트니스는 2002년 이집트 카이로, 클래식 보디빌딩은 2005년 중국 상하이, 여자 비키니는 2010년 아제르바이잔 바쿠, 남녀 피지크는 2012년 에콰도르 과야킬에서 인정되었습니다. 클래식 피지크는 2018년 스페인 베니돔에서 공식 인정되었습니다."],
  ["보디빌딩 관련 기관 및 협회를 설명하시오.",
   "보디빌딩 관련 기관에는 세계보디빌딩연맹 IFBB, 대한보디빌딩협회 KBBF, 아시아보디빌딩연맹 ABBF, 한국도핑방지위원회 KADA가 있습니다."],
  ["보디빌딩 심사방법 및 기준을 설명하시오.",
   "보디빌딩은 전체적인 체격의 비율과 대칭, 근육의 크기, 균형, 발달 정도를 평가합니다. 주요 기준으로는 근육의 크기를 보는 벌크업, 근육의 선명도를 보는 데피니션, 근육 간 경계와 분리도를 보는 컷이 있습니다."],
  ["여자 심사 기준 및 감점 요인은?",
   "여자 피지크는 근육 발달, 선명도, 대칭, 컨디셔닝, 여성미, X쉐입을 종합적으로 평가하며, 충분히 발달된 근육과 전체적인 균형이 중요합니다. 보디피트니스는 근육 발달, 대칭, 컨디셔닝, 여성미, T쉐입을 평가하며, 비키니보다 근육량은 많고 여자 피지크보다는 덜 요구됩니다. 비키니는 라인, 비율, 여성미, S라인, 엉덩이 밸런스를 중요하게 평가하며, 극단적으로 낮은 체지방이나 과도한 근육질은 감점 요인이 됩니다."],
  ["쿼터턴만 있는 3가지 종목은?",
   "규정포즈 없이 쿼터턴만 진행하는 종목은 남자 피지크, 여자 보디피트니스, 여자 비키니입니다."],
  ["남자 피지크 쿼터턴 자세는?",
   "남자 피지크 쿼터턴은 프론트, 사이드, 백, 사이드 포지션으로 진행합니다. 한 손은 복직근 또는 허리 부위에 두고 반대 손은 자연스럽게 내리며, 상체는 넓은 어깨와 광배근을 강조하고 하체는 한쪽 다리를 뻗어 자연스러운 역삼각형 라인을 보여줍니다."],
  ["여자 피지크/보디피트니스 쿼터턴은?",
   "여자 피지크와 보디피트니스 쿼터턴은 프론트, 사이드, 백, 사이드 포지션으로 진행합니다. 발은 모으거나 약 30도 벌리고, 가슴과 어깨를 펴며, 팔은 몸통 옆에 자연스럽게 내려 근육의 균형과 등 라인, 전체적인 체형미를 보여줍니다."],
  ["여자 비키니 쿼터턴은?",
   "여자 비키니 쿼터턴은 프론트, 사이드, 백, 사이드 포지션으로 진행합니다. 한 손은 허리에 두고 한쪽 다리를 뻗으며, 상체를 자연스럽게 비틀어 S라인과 엉덩이 라인, 여성미와 전체적인 밸런스를 강조합니다."],
  ["여자 보디피트니스/비키니 아이워킹이란?",
   "아이워킹은 결선 진출자가 무대 중앙에서 개별적으로 실시하는 개인 프레젠테이션 워킹입니다. 선수는 무대 중앙에서 자신이 선택한 포즈를 취하고, 이동 중 속도, 우아함, 몸짓, 쇼맨십 등을 평가받습니다."],
  ["여자 보디피트니스와 비키니 아이워킹의 차이점은?",
   "보디피트니스는 절도 있고 세련된 워킹과 T라인의 균형미를 강조하고, 비키니는 부드럽고 리드미컬한 모델 워킹과 S라인의 곡선미를 강조합니다."],
  ["보디빌딩 컬러링, 탄이란?",
   "컬러링은 탄이나 태닝 제품을 피부에 도포하여 무대 조명 아래에서 근육의 선명도, 분리도, 질감을 더 입체적으로 강조하는 방법입니다."],
  ["컬러링 금지 규정은?",
   "지워질 수 있는 탄이나 브론저, 반짝이는 펄이나 황금빛 색상은 금지되며, 오일의 과도한 사용도 금지됩니다."],
  ["시상식 실격 사유는?",
   "시상식 중 결과에 대한 불만을 표출하거나 메달 수여를 거부하고, 무단으로 무대를 이탈하는 등 스포츠맨십에 어긋나는 행동을 하면 실격 처리될 수 있습니다. 이 경우 순위와 메달이 박탈되며, 사안에 따라 추가 징계를 받을 수 있습니다."],
  ["대한보디빌딩협회 선수 활동은?",
   "대한보디빌딩협회 등록 선수는 협회가 인정하지 않는 단체의 대회에 참가할 수 없으며, 세계연맹이 인정하지 않는 대회에 참가한 경우 국제대회 출전이 제한될 수 있습니다. 또한 보디빌딩 홍보와 무관한 광고, 쇼, 이벤트에 참가할 때는 사전에 협회 승인을 받아야 합니다."],
  ["경기인에 대해 설명하시오.",
   "경기인은 선수, 지도자, 심판, 선수관리담당자를 모두 포함합니다. 선수는 대회 참가를 위해 등록한 사람이고, 지도자와 심판은 해당 활동을 목적으로 등록한 사람이며, 선수관리담당자는 선수의 체력과 건강 관리를 위해 등록한 사람입니다."],
  ["경기인 등록 목적은?",
   "경기인 등록은 경기인을 건전하고 효율적으로 육성하고, 우리나라 체육의 균형적인 발전을 도모하기 위한 것입니다."],
  ["경기인 등록 결격 사유는?",
   "경기인 등록 결격 사유에는 제명 징계를 받은 사람, 자격정지 처분이 끝나지 않은 사람, 폭력·성범죄·승부조작·횡령·배임 등으로 징계를 받은 사람, 그리고 심판과 선수로 중복 등록된 사람 등이 있습니다."],
  ["경기인의 활동 자격은?",
   "경기인은 정해진 등록 절차에 따라 매년 협회에 정식 등록한 사람에게 활동 자격이 주어집니다."],
  ["경기인 등록 기간은?",
   "자료 기준으로 전문체육은 1차 등록과 2차 추가 등록 기간이 있으며, 생활체육·지도자·심판·선수관리담당자는 상시 등록이 가능합니다. 정확한 날짜까지 말해야 하면: 전문체육은 1차 2026년 4월 10일까지, 2차 추가 등록은 2026년 7월 10일부터 30일까지이며, 생활체육·지도자·심판·선수관리담당자는 상시 등록입니다."],
  ["경기인 등록 유효기간은?",
   "경기인 등록의 효력은 협회로부터 등록 승인을 받은 때부터 다음 해 2월 말일까지 유지됩니다."],
  ["경기인 등록 구분은?",
   "경기인 등록은 연령과 활동 목적에 따라 구분됩니다. 12세 이하부, 15세 이하부는 육성 목적이고, 18세 이하부, 대학부, 일반부는 생활체육과 전문체육으로 구분됩니다."],
  ["경기인 등록 방법은?",
   "선수, 지도자, 심판 등 모든 경기인은 대한체육회 스포츠지원포털을 통해 본인이 직접 등록을 신청합니다."],
  ["경기장 내에서 선수 준수사항 4가지는?",
   "선수는 첫째, 심판 판정을 존중하고 승복해야 합니다. 둘째, 경기 규칙과 복장 규정 등 제반 규정을 준수해야 합니다. 셋째, 상대 선수와 동료를 존중하고 비신사적인 행동을 하지 않아야 합니다. 넷째, 경기장 내 질서와 안전을 유지하고 운영진의 지시에 협조해야 합니다."],
  ["응급처치(First Aid)",
   "갑작스러운 부상이나 질환에 대한 긴급 처치로, 상태 악화 방지와 생명 구조를 목적으로 합니다."],
  ["응급상황 행동요령(3C)",
   "Check(확인), Call(신고), Care(처치) 순으로 시행합니다."],
  ["CPR",
   "심정지 환자의 혈액순환과 호흡을 유지하여 산소를 공급하는 응급처치입니다."],
  ["심폐소생술(CPR) 방법?",
   "의식을 확인하고 119 신고 및 AED를 요청한 후, 호흡을 확인합니다. 이후 가슴압박 30회와 인공호흡 2회를 반복하며 구급대 도착 시까지 시행합니다."],
  ["심폐소생술에서 가슴 압박 시 이완하는 이유는?",
   "가슴을 완전히 이완해야 혈액이 다시 심장으로 채워져 다음 압박 시 전신으로 효과적으로 순환될 수 있기 때문입니다."],
  ["가슴압박 심폐소생술보다 표준 심폐소생술을 실시해야 하는 경우는?",
   "익수사고, 질식이나 기도폐쇄 등의 호흡성 심정지, 소아 및 영아 심정지, 장시간 방치된 심정지의 경우에는 인공호흡이 포함된 표준 심폐소생술을 시행합니다."],
  ["자동제세동기(AED) 사용법은?",
   "AED의 전원을 켜고 패드를 부착한 후 음성 안내에 따라 시행합니다. 충격 후에는 즉시 가슴압박을 다시 시작합니다."],
  ["PRICES 요법이란?",
   "PRICES 요법은 골절, 염좌, 타박상 시 통증과 부종을 줄이기 위한 응급처치 방법으로 보호(Protection), 안정(Rest), 냉찜질(Ice), 압박(Compression), 거상(Elevation), 고정(Splint)을 의미합니다."],
  ["출혈 환자의 응급처치 방법은?",
   "내출혈은 환자를 눕히고 상처 부위를 심장보다 높게 한 후 호흡, 맥박, 의식을 확인합니다. 외출혈은 상처 부위를 압박하여 지혈하고 심장보다 높게 유지한 후 붕대를 감아 감염을 예방합니다."],
  ["드레싱의 목적은?",
   "드레싱은 상처를 보호하고 지혈하며 감염을 예방하고, 분비물을 흡수하여 상처 부위를 청결하게 유지하기 위해 시행합니다."],
  ["저혈당 쇼크의 정의와 응급처치는?",
   "저혈당 쇼크는 혈당이 정상보다 낮아져 식은땀, 어지러움, 떨림, 의식저하 등이 나타나는 상태입니다. 의식이 있으면 당질을 섭취하게 하고 휴식을 취하게 하며, 의식이 없으면 음식 섭취를 금지하고 119에 신고합니다."],
  ["쇼크란?",
   "쇼크는 혈압이 급격히 떨어져 전신 조직에 충분한 혈액과 산소가 공급되지 못해 세포 기능이 저하되는 상태입니다."],
  ["쇼크의 종류는?",
   "쇼크는 출혈성 쇼크, 심인성 쇼크, 신경성 쇼크, 패혈성 쇼크로 구분됩니다."],
  ["저체온증의 정의와 응급처치는?",
   "저체온증은 체온이 35도 이하로 떨어진 상태를 말하며, 따뜻한 장소로 이동시켜 담요나 옷으로 보온하고 심한 경우 119에 신고하여 병원으로 이송합니다."],
  ["운동 시 체온이 상승하는 이유는?",
   "근육 수축을 위해 ATP가 분해될 때 에너지의 대부분이 열에너지로 전환되어 방출되기 때문입니다."],
  ["몸이 체온을 조절하는 방법은?",
   "피부 혈관을 확장하여 열을 방출하고, 땀의 증발 작용을 통해 체온을 조절합니다."],
  ["기도 폐쇄의 원인과 유형, 응급처치는?",
   "기도 폐쇄는 이물질이나 염증으로 인해 기도가 막혀 산소 공급이 차단된 상태입니다. 부분 폐쇄는 기침을 유도하고, 완전 폐쇄는 하임리히법을 시행합니다."],
  ["하임리히법이란?",
   "하임리히법은 기도에 이물질이 막혔을 때 복부를 위쪽으로 강하게 밀어 올려 이물질을 배출시키는 응급처치 방법입니다."],
  ["화상의 종류와 응급처치는?",
   "1도 화상은 표피 손상으로 흐르는 물에 식히고, 2도 화상은 물집이 생기는 진피 손상으로 물집을 터뜨리지 않고 관리합니다. 3도 화상은 지방층까지 손상된 상태로 즉시 병원으로 이송합니다."],
  ["골절의 증상과 징후는?",
   "골절의 증상은 부종, 통증, 피하출혈, 기능상실, 변형 등이 있으며 심한 경우 염발음이 나타날 수 있습니다."],
  ["골절의 종류와 응급처치법은?",
   "골절은 개방성 골절과 폐쇄성 골절로 나뉩니다. 개방성 골절은 지혈 후 고정하여 병원으로 이송하고, 폐쇄성 골절은 냉찜질과 고정을 시행한 후 병원으로 이송합니다. 또한 골절 정도에 따라 완전골절과 불완전골절로 구분할 수 있습니다."],
  ["도핑이란 무엇인가?",
   "도핑은 선수가 경기력 향상을 목적으로 금지약물이나 금지방법을 사용하는 것을 말하며, 도핑검사 양성 반응이나 검사 거부 등 규정을 위반하는 행위도 포함됩니다."],
  ["도핑검사에 대해 설명하시오.",
   "도핑검사는 경기력 향상을 목적으로 사용한 금지약물 여부를 확인하기 위해 소변이나 혈액 시료를 채취하여 분석하는 검사입니다."],
  ["도핑검사 단계는?",
   "도핑검사는 검사계획 수립, 검사관 배정, 대상자 선정, 선수 통지, 시료 제공, 서류 작성, 시료 운송, 분석, 결과관리, 최종통보 순으로 진행됩니다."],
  ["도핑검사 마지막 단계인 시료 보관년수와 그 이유를 설명하시오.",
   "도핑검사 시료는 추후 재분석이 가능하도록 최대 10년까지 보관합니다. 검사 당시 음성이어도 이후 금지약물이 검출되면 경기 실적이 박탈될 수 있습니다."],
  ["시료유형별 도핑 검사 종류 3가지를 설명하시오.",
   "시료유형별 도핑검사는 소변 시료, 정맥혈 시료, 건조혈반 시료 검사가 있습니다. 소변 시료는 소변을 채취하여 검사하고, 정맥혈 시료는 팔의 정맥에서 혈액을 채취하며, 건조혈반 시료는 손끝이나 상완의 모세혈관에서 소량의 혈액을 채취하여 검사합니다."],
  ["소변 불가 시 혈액 검사로 대체 가능한가?",
   "선수는 시료 종류를 임의로 선택할 수 없습니다. 소변이 나오지 않을 경우 도핑검사관의 안내에 따라 수분을 섭취하고 다시 소변 시료를 제공할 수 있도록 대기해야 합니다."],
  ["검사시기별 도핑검사에 대해 설명하시오.",
   "도핑검사는 경기기간 중 검사와 경기기간 외 검사로 나뉩니다. 경기기간 중 검사는 경기 전일부터 시료채취 절차가 끝날 때까지 이루어지며, 경기기간 외 검사는 훈련장, 집 등 선수의 위치가 파악되는 장소에서 사전 통지 없이 불시에 시행될 수 있습니다."],
  ["KADA의 검사대상명부(RTP) 및 검사대상후보명부(TP)에 대해 설명하시오.",
   "RTP와 TP는 KADA가 경기기간 외 불시검사를 위해 관리하는 선수 명부입니다. 주요 국제대회 출전 선수, 우수 경기력을 유지하는 선수, 소재지정보 불이행 이력이 있거나 도핑 회피가 의심되는 선수, 은퇴나 제재 후 복귀하는 선수 등이 포함될 수 있습니다."],
  ["소재지정보란 무엇인가?",
   "소재지정보는 경기기간 외 불시 도핑검사를 위해 선수가 자신의 위치를 KADA에 제출하는 정보입니다. 제출 대상 선수는 정해진 기한까지 소재지정보를 제출하고, 장소가 변경되면 즉시 수정해야 합니다."],
  ["소재지정보 등록 방법은?",
   "소재지정보는 WADA의 도핑방지행정관리시스템인 ADAMS를 통해 온라인이나 모바일로 직접 제출합니다."],
  ["소재지정보 불이행에 대해 설명하시오.",
   "소재지정보 불이행은 정해진 기한 내에 소재지정보를 제출하지 않거나, 검사 가능한 60분 단위 시간과 장소를 정확히 기재하지 않은 경우를 말합니다. 또한 지정한 시간과 장소에서 검사를 받지 못한 경우도 검사불이행에 해당합니다."],
  ["소재지정보 불이행에 대한 제재에 대해 설명하시오.",
   "12개월 동안 3번의 소재지정보 불이행이 발생하면 도핑방지규정 위반으로 보며, 자격정지기간은 2년입니다. 다만 과실 정도에 따라 최소 1년까지 감경될 수 있습니다."],
  ["TUE(치료목적사용면책)란?",
   "TUE는 선수가 의학적 치료를 위해 금지약물이나 금지방법을 사용해야 하는 경우, 일정 조건을 충족하면 치료 목적으로 사용을 허가받는 제도입니다."],
  ["TUE 신청 절차는?",
   "TUE는 신청서를 다운로드한 뒤, 선수와 담당 의사가 신청서와 의학적 서류를 작성하여 KADA 또는 국제경기연맹에 제출합니다. 이후 TUEC 전문가의 검토와 승인을 거쳐 결과를 통보받습니다."],
  ["TUE 사후 승인이 가능한 경우는?",
   "생명이 위급한 응급상황이나 긴급 수술처럼 사전 승인을 받을 시간적 여유가 없었던 경우에는 사후 승인이 가능합니다."],
  ["치료목적사용면책위원회(TUEC)란?",
   "TUEC는 임상, 스포츠의학 등에 전문성을 가진 의사들로 구성된 위원회로, 치료목적사용면책 신청을 독립적으로 검토하고 승인 여부를 판단합니다."],
  ["금지목록 국제표준에 대해 설명하시오.",
   "금지목록 국제표준은 스포츠에서 금지되는 약물과 방법을 명시한 WADA의 국제표준입니다. 경기력 향상 가능성, 선수 건강 위험성, 스포츠 정신 위배 중 두 가지 이상에 해당하면 금지목록에 포함될 수 있습니다."],
  ["대표적인 금지약물 3가지를 제시하고 부작용을 설명하시오.",
   "대표적인 금지약물에는 동화작용제, 성장호르몬, 이뇨제가 있습니다. 동화작용제는 고혈압, 심장질환, 여드름을 유발할 수 있고, 성장호르몬은 심장질환, 관절 약화, 당뇨를 유발할 수 있으며, 이뇨제는 저혈압과 심각한 탈수를 일으킬 수 있습니다."],
  ["아나볼릭 스테로이드란?",
   "아나볼릭 스테로이드는 단백질 합성을 촉진하여 근육 강화를 위해 악용되는 금지약물입니다. 부작용으로는 심장마비, 간암, 성기능 장애, 여성의 남성화 등이 있습니다."],
  ["의도하지 않은 도핑이란?",
   "의도하지 않은 도핑은 선수의 부주의나 실수로 금지약물을 섭취하여 도핑검사에서 양성 반응이 나오는 경우입니다. 도핑 위반은 고의성 여부와 관계없이 선수에게 책임이 있습니다."],
  ["의도치 않은 도핑 시 대처법은?",
   "의도치 않은 도핑 양성 반응이 나온 경우 즉시 KADA에 보고하고, 관련 소명 자료와 서류를 제출하여 고의성이 없음을 증명해야 합니다."],
  ["운동선수가 아플 때 금지약물 복용은?",
   "운동선수가 치료를 위해 금지약물이 필요한 경우 TUE, 즉 치료목적사용면책을 승인받아야 합니다. 대체 약물이 없는 경우 신청 후 승인받아 복용하고, 응급 상황에서는 선조치 후 사후 승인을 받을 수 있습니다."],
  ["운동선수의 약국 약 복용 여부는?",
   "약국 약도 금지성분이 포함될 수 있으므로 선수 본인이 책임지고 확인해야 합니다. 복용 전 KADA 금지약물 검색 서비스 등을 통해 금지성분 여부를 확인해야 합니다."],
  ["선수의 시료 채취 관련 의무는?",
   "선수는 도핑검사 시 시료를 제공하고 절차를 준수해야 합니다. 검사 회피, 거부, 실패를 해서는 안 되며, 통지 후 도핑관리실 도착까지 검사관의 감시 하에 있어야 하고 신분증으로 본인 확인을 해야 합니다."],
  ["선수지원요원의 의무는?",
   "선수지원요원은 도핑방지규정을 숙지하고 준수해야 하며, 선수에게 올바른 도핑방지 지도를 하고 도핑검사에 협조해야 합니다. 또한 금지약물·금지방법의 사용, 소지, 부정거래 등을 해서는 안 됩니다."],
  ["사전 미통지 원칙이란?",
   "사전 미통지 원칙은 도핑검사의 정확성과 실효성을 위해 예고 없이 불시에 검사를 진행하는 원칙입니다. 선수는 검사대상자로 통보되면 검사를 거부할 수 없으며, 정확한 소재지정보를 제공해야 합니다."],
  ["선수의 책임 원칙이란?",
   "선수의 책임 원칙은 고의성 여부와 관계없이 선수의 체내에서 검출된 모든 금지물질에 대한 책임은 선수 본인에게 있다는 원칙입니다."],
  ["도핑 규정 위반 사항은?",
   "도핑 규정 위반에는 금지약물이나 금지방법의 검출, 사용 또는 사용 시도, 검사 회피·거부·실패, 금지약물 소지, 부정거래, 공모, 소재지정보 불이행, 보복행위 등이 포함됩니다."],
  ["도핑 위반 시 자격정지 시작일은?",
   "도핑 위반 시 자격정지는 일반적으로 KADA에서 자격정지를 부과하고 위반이 확정되어 통보된 날부터 시작됩니다. 다만 선수가 자발적으로 잠정 출전정지를 한 경우 그 기간이 인정될 수 있습니다."],
  ["도핑 위반 시 자격정지 기간은?",
   "도핑 위반 시 자격정지 기간은 위반 횟수와 사안에 따라 달라집니다. 1차 위반은 보통 2~4년, 2차 위반은 1차와 2차 위반 기간을 고려해 가중되며, 3차 위반은 영구 자격정지가 될 수 있습니다."],
  ["개인 도핑 위반 과징금은?",
   "개인 도핑 위반 과징금은 학생부, 일반부, 전국대회 등 종별에 따라 차등 부과되며, 위반 횟수가 늘어날수록 금액이 증가합니다."],
  ["도핑 위반 시 시도지부 제재 사항은?",
   "도핑 위반 시 해당 시도지부에는 선수 1명당 과징금이 부과될 수 있으며, 관련 임원에게 자격정지 등 행정 제재가 내려질 수 있습니다."],
  ["스포츠 현장의 인권이란?",
   "스포츠 현장의 인권은 선수와 지도자 등 모든 체육인이 성별, 연령, 기량과 관계없이 인격체로 존중받고, 폭력·성폭력·차별 없이 안전하게 스포츠를 누릴 수 있는 기본적 권리입니다."],
  ["스포츠 인권 침해에 대해 설명하시오.",
   "스포츠 인권 침해는 경기 실적이나 지도 권한을 이유로 선수나 보호자에게 협박, 갑질, 폭행, 체벌, 기합, 과도한 훈련 등을 가하는 행위를 말합니다."],
  ["스포츠 갑질에 대해 설명하시오.",
   "스포츠 갑질은 우월적 지위에 있는 사람이 권한이나 영향력을 남용해 상대방에게 부당한 요구나 처우를 하는 것입니다. 지도자와 선수, 지도자와 학부모 관계 등에서 발생할 수 있습니다."],
  ["지도자에 대한 인권침해 유형은?",
   "지도자에 대한 인권침해에는 불공정한 고용 계약, 부당한 경기 출전 압력이나 승부조작 강요, 잠재적 가해자 취급, 허위사실 유포와 명예훼손, 책임 전가나 불공정한 대우 등이 있습니다."],
  ["학습권 침해 개념과 유형은?",
   "학습권 침해는 학생선수가 과도한 훈련이나 대회 참가로 인해 법적으로 보장된 학습의 자유를 침해받는 것을 말합니다. 수업 참여 방해, 보충학습 기회 부족, 학업과 진로 탐색 기회 박탈 등이 해당됩니다."],
  ["스포츠윤리센터에 대해 설명하시오.",
   "스포츠윤리센터는 체육계 비리와 인권침해를 조사하고, 피해자의 심리·정서·법률 지원을 통해 회복을 돕는 기관입니다. 체육의 공정성 확보와 체육인의 인권 보호를 목적으로 합니다."],
  ["스포츠공정위원회에 대해 설명하시오.",
   "스포츠공정위원회는 스포츠계의 공정성 확립을 위해 법제, 포상, 징계 등을 심의하는 기관입니다. 체육회 규정 관리와 공적에 대한 포상, 비위 행위에 대한 징계를 주로 다룹니다."],
  ["올림픽 아젠다 2020+5란?",
   "올림픽 아젠다 2020+5는 IOC가 미래 올림픽을 위해 만든 전략적 지침입니다. 평등과 비차별, 선수와 지도자의 일자리와 생계 지원, 발언의 자유, 안전과 복지, 사생활 보호 등을 주요 내용으로 합니다."],
  ["2024년 파리 올림픽 아젠다에 대해 설명하시오.",
   "2024년 파리 올림픽은 IOC의 전략 지침인 올림픽 아젠다 2020+5를 실제로 구현한 올림픽 모델입니다. 기존 경기장과 도시 인프라를 활용해 비용을 절감하고, 파리의 랜드마크를 활용한 도시 중심 올림픽, 탄소 배출을 줄이는 지속가능한 올림픽, 선수 보호와 도핑방지를 중시하는 선수 중심 올림픽, AI 등을 활용한 디지털 올림픽을 지향했습니다."],
  ["승부조작이란?",
   "승부조작은 경기 결과나 진행 과정을 고의로 바꾸어 특정 개인이나 팀에게 부당한 이익이 돌아가게 하는 행위입니다. 경기의 공정한 운영을 해치는 스포츠비리 중 하나입니다."],
  ["승부조작의 원인은?",
   "승부조작의 주요 원인은 금전적 이익, 선수의 경제적으로 취약한 환경, 낮은 적발 가능성입니다. 특히 도박이나 브로커 개입으로 큰 수익을 얻을 수 있다는 점이 주요 원인이 됩니다."],
  ["승부조작의 주요 특징은?",
   "승부조작은 사전 합의나 고의성이 있으며, 금전·도박·입시·선발 등 부당한 이익과 연결되는 경우가 많습니다. 선수, 지도자, 심판, 운영자, 브로커 등 경기 관련자가 직접 또는 간접적으로 관여할 수 있습니다."],
  ["IOC 경기조작 방지 코드의 4대 주요 위반 유형은?",
   "IOC 경기조작 방지 코드의 주요 위반 유형은 불법 베팅, 경기 조작, 내부정보 유출, 협조 위반입니다. 관련 경기에 베팅하거나, 고의로 경기 결과를 조작하거나, 비공개 정보를 제공하거나, 조작 제의를 받고도 보고하지 않는 행위가 포함됩니다."],
  ["대표적인 승부조작 사례는?",
   "대표적인 승부조작 사례로는 1919년 월드시리즈에서 시카고 화이트삭스 선수들이 일부러 패배한 블랙삭스 스캔들이 있습니다. 또한 이탈리아 세리에A 심판 배정 조작 사건인 칼치오폴리, 유럽 축구 경기들이 조직적으로 조작된 보훔 승부조작 사건 등이 있습니다."],
  ["승부조작 감시 시스템은?",
   "승부조작 감시 시스템에는 베팅 감시 시스템, 경기 데이터 분석 시스템, 수사 및 법 집행 시스템이 있습니다. 베팅 사이트의 배당률 변화, 선수 움직임과 경기 흐름의 이상 패턴, 통화 기록과 계좌 추적 등을 통해 조작 여부를 감시합니다."],
  ["승부조작 신고 방법은?",
   "승부조작은 스포츠윤리센터에 신고할 수 있으며, 홈페이지, 이메일, 전화, 우편, 방문 등의 방법으로 신고할 수 있습니다."],
  ["신고자·피해자 보호 원칙은?",
   "신고자와 피해자는 비밀 보장과 불이익 조치 금지의 원칙에 따라 보호됩니다. 신고자의 신원이 공개되어서는 안 되며, 신고를 이유로 선발 배제나 출전 제한 같은 불이익을 받아서는 안 됩니다."],
  ["스포츠 베팅은 불법인가?",
   "스포츠 베팅은 국가별로 다르지만, 한국에서는 국민체육진흥공단이 운영하는 스포츠토토를 제외한 사설 스포츠 베팅, 해외 사이트 베팅, 개인 간 베팅은 불법입니다."],
  ["생활체육 보디빌딩 현장에서 발생할 위험이 있는 승부조작 유형을 예로 설명하시오.",
   "보디빌딩은 심판 판정 비중이 크기 때문에 특정 선수나 회원을 잘 봐달라고 청탁하거나 금품을 제공하는 행위가 발생할 수 있습니다. 또한 참가자끼리 입상 순위를 미리 합의하거나, 특정 참가자에게 유리하도록 무대·조명·진행 환경을 조작하는 것도 승부조작 유형에 해당합니다."],
  ["스포츠 공정성을 훼손하는 승부조작과 도핑의 차이점은?",
   "승부조작과 도핑은 모두 스포츠 공정성을 훼손하는 스포츠비리입니다. 승부조작은 경기 결과나 진행 과정을 고의로 바꾸는 행위이고, 도핑은 금지약물이나 금지방법을 사용해 인위적으로 경기력을 향상시키는 행위입니다."],
  ["체육지도자의 스포츠비리, 승부조작 신고 의무는?",
   "체육지도자는 승부조작 등 스포츠비리를 인지했거나 의심되는 경우에도 즉시 스포츠윤리센터 등에 신고해야 할 법적·윤리적 의무가 있습니다."],
  ["생활스포츠지도사로서 보디빌딩 대회나 현장에서 승부조작을 예방하고 공정하게 운영하기 위한 원칙은?",
   "참가자들에게 승부조작의 위험성과 신고 방법을 교육하고 관련 규정을 명확히 안내해야 합니다. 또한 심판과 운영진의 이해충돌을 관리하고, 의심 상황이 발생하면 채점표나 영상 등 증거를 보존하여 공정하게 처리해야 합니다."],
  ["승부조작 등 스포츠비리 위반 시 처벌 수위는?",
   "승부조작 등 스포츠비리 위반 시 국민체육진흥법이나 형법에 따라 징역 또는 벌금형 같은 형사처벌을 받을 수 있습니다. 또한 소속 협회 스포츠공정위원회를 통해 자격정지나 영구제명 등 행정 징계도 받을 수 있습니다."],
  ["성희롱, 성추행, 성폭행, 성폭력에 대해 설명하시오.",
   "성희롱은 성적인 말이나 행동으로 상대방에게 성적 굴욕감이나 불쾌감을 주는 행위입니다. 성추행은 신체 접촉 등을 통해 성적 수치심을 유발하는 행위이고, 성폭행은 폭행이나 협박으로 성관계를 강요하는 행위입니다. 성폭력은 성희롱, 성추행, 성폭행을 모두 포함하는 개념입니다."],
  ["성적 자기결정권이란?",
   "성적 자기결정권은 타인의 강요나 위계 없이 자신의 성적 행동을 스스로 결정할 권리입니다. 모든 성적 행위는 상대방의 자발적이고 명확한 동의를 바탕으로 해야 합니다."],
  ["성폭력의 유형은?",
   "성폭력의 유형에는 신체적 성폭력, 정신적 성폭력, 디지털 성폭력, 2차 피해가 있습니다. 신체적 성폭력은 강간이나 성추행처럼 신체적 침해가 있는 경우이고, 정신적 성폭력은 성적 언어나 행동으로 굴욕감을 주는 경우입니다. 디지털 성폭력은 동의 없는 촬영이나 유포를 말하며, 2차 피해는 사건 처리 과정에서 피해자가 추가로 입는 정신적·사회적 피해를 의미합니다."],
  ["성폭력 2차 피해 예방법은?",
   "성폭력 2차 피해를 예방하려면 피해자 중심으로 생각하고 피해자를 비난하거나 가해자를 옹호해서는 안 됩니다. 또한 사건 내용을 함부로 말하지 않고 비밀을 유지하며, 2차 피해가 확산되지 않도록 주의해야 합니다."],
  ["스포츠 성폭력이란?",
   "스포츠 성폭력은 스포츠 현장에서 지위나 권력, 위계관계를 이용해 타인의 동의 없이 언어적·신체적·정신적으로 성적 자기결정권을 침해하는 행위입니다."],
  ["성폭력과 스포츠 성폭력의 차이는?",
   "성폭력은 성적 자기결정권을 침해하는 모든 행위를 포함하는 상위 개념이고, 스포츠 성폭력은 스포츠 현장에서 발생하는 성폭력입니다. 특히 지도자와 선수, 선후배 관계 등 스포츠 현장의 위계관계와 폐쇄성이 결합되어 발생한다는 특징이 있습니다."],
  ["스포츠 성폭력의 원인은?",
   "스포츠 성폭력의 원인에는 힘의 불균형, 성차별적 문화, 왜곡된 성인식, 폐쇄적인 환경이 있습니다. 지도자와 선수 간 권력 차이, 남성 중심적 문화, 성폭력을 장난이나 관행으로 여기는 분위기, 합숙소나 전지훈련장처럼 외부 감시가 어려운 환경이 원인이 될 수 있습니다."],
  ["스포츠 성폭력 사건 피해 발생 시 처리 절차는?",
   "스포츠 성폭력 피해가 발생하면 먼저 피해자의 안전을 확보하고 사건 상황에서 벗어나야 합니다. 이후 몸을 씻거나 옷을 갈아입지 않고 병원이나 해바라기센터를 방문해 증거를 확보하며, 스포츠윤리센터, 해바라기센터, 경찰 등에 신고합니다. 이후 조사와 징계 절차가 진행되고, 의료기관과 상담센터를 통해 치료와 회복을 지원받습니다."],
  ["성폭력 응급 대응의 중요성은?",
   "성폭력 증거는 시간이 지나면 사라질 수 있으므로 즉시 확보하는 것이 중요합니다. 따라서 씻거나 옷을 갈아입지 않고 해바라기센터나 병원을 방문해야 하며, 외상 치료, 성병·임신 검사, 심리 치료를 함께 받아야 합니다."],
  ["스포츠 성폭력 예방법 4가지는?",
   "스포츠 성폭력을 예방하기 위해서는 첫째, 성적 수치심을 줄 수 있는 신체 언급, 농담, 별명, 사진·영상 공유를 하지 않아야 합니다. 둘째, 개별 면담이나 훈련은 밀폐된 공간을 피하고 공개된 장소에서 진행해야 합니다. 셋째, 마사지나 물리치료 등 신체 접촉은 전문 자격자와 당사자의 동의하에 이루어져야 합니다. 넷째, 락커룸·샤워실·숙소 등 사적 공간 출입을 제한하고, 피해 발생 시 즉시 보호자나 관련 기관에 신고해야 합니다."],
  ["국가적 큰 틀에서 성폭력 예방책은?",
   "국가적 차원의 성폭력 예방을 위해서는 성폭력 예방 정책과 모니터링 시스템 같은 제도적 장치를 마련해야 합니다. 또한 예방 교육과 대처 매뉴얼을 강화하고, 지도자 자격 검증과 징계 이력 관리를 철저히 하며, 선수·지도자·학부모 등 대상별 행동 규범을 제정해야 합니다."],
  ["성인지 감수성이란?",
   "성인지 감수성은 성별 간 불평등을 인식하고, 일상생활이나 스포츠 현장에서 성차별적 요소를 감지해내는 민감성을 말합니다."],
  ["성그루밍이란?",
   "성그루밍은 가해자가 피해자와 친분을 쌓아 신뢰를 형성한 뒤, 심리적으로 지배하여 언어적·신체적 성적 착취를 가하는 행위입니다."],
  ["스포츠 성폭력 위반행위별 징계 기준?",
   "스포츠 성폭력은 무관용 원칙이 적용되며, 사안의 경중에 따라 자격정지 처분을 받으며, 중대한 경우 영구 제명될 수 있습니다"],
  ["성범죄 경력이 있는 사람도 지도자가 될 수 있나요?",
   "성범죄로 형이 확정된 사람은 일정 기간 또는 영구적으로 체육지도자 자격 취득과 활동이 제한되므로 지도자가 될 수 없습니다."],
  ["스포츠 폭력이란?",
   "스포츠 폭력은 스포츠인을 대상으로 폭행, 감금, 갈취, 협박 등을 통해 신체적·정신적·금전적 피해를 주는 행위입니다."],
  ["스포츠 폭력의 원인은?",
   "스포츠 폭력의 원인은 구시대적인 폭력 문화의 반복, 불이익을 두려워해 폭력을 묵인하는 분위기, 그리고 경기력 향상이나 정신력 강화라는 명목으로 폭력을 정당화하는 위계적 문화입니다."],
  ["스포츠 폭력 유형에 대해 설명하시오.",
   "스포츠 폭력에는 신체적 폭력, 방관자 입장의 폭력, 정신적 폭력이 있습니다. 신체적 폭력은 때리기나 밀치기처럼 신체에 피해를 주는 행위이고, 방관자 입장의 폭력은 폭력을 보고도 묵인하거나 도움 요청을 거절하는 행위입니다. 정신적 폭력은 욕설, 따돌림, 강요 등으로 심리적 피해를 주는 행위입니다."],
  ["스포츠 (성)폭력 피해 발생 시 대처방안은?",
   "스포츠 (성)폭력 피해가 발생하면 먼저 피해자의 안전을 확보하고 사건 상황에서 벗어나야 합니다. 이후 스포츠윤리센터, 경찰, 주변 보호자 등에게 신고하고, 사건 내용을 기록하여 증거를 확보하며 외상이나 심리적 상처에 대한 치료를 받아야 합니다. 이후 스포츠윤리센터나 수사기관의 조사와 스포츠공정위원회의 징계 절차가 진행되고, 의료기관과 상담센터를 통해 사후 회복 관리를 받아야 합니다."],
  ["스포츠 폭력 신고의 필요성은?",
   "스포츠 폭력은 공식적으로 신고해야 피해자 분리 조치 등 보호 시스템이 작동하고, 객관적인 조사를 통해 진위 여부를 확인할 수 있습니다. 또한 가해자 처벌과 재발 방지를 통해 추가 피해를 예방할 수 있기 때문에 신고가 필요합니다."],
  ["스포츠 폭력 예방법은?",
   "스포츠 폭력을 예방하기 위해 지도자는 경기력 향상이나 팀 단합을 이유로 기합, 구타, 욕설, 가혹행위를 해서는 안 되며, 훈련 목표와 방법을 충분히 설명하고 선수 의견을 존중해야 합니다. 선수는 선후배 관계를 이용해 욕설, 심부름 강요, 음주·흡연 강요, 괴롭힘을 해서는 안 됩니다. 학부모는 자녀와 평소 대화하고 피해 사실을 숨기지 않도록 교육하며, 체벌을 요청하거나 묵인하지 않아야 합니다."],
  ["동료 지도자가 선수에게 폭언하는 것을 목격했다면 어떻게 하겠습니까?",
   "즉시 폭언을 제지하고 피해 선수를 가해자와 분리하여 보호하겠습니다. 이후 사건 내용을 기록하고, 스포츠윤리센터 등 관련 기관에 신고하여 조사와 징계 절차가 이루어지도록 하겠습니다."],
  ["금고 이상의 형을 선고받은 경우 자격은 어떻게 되나요?",
   "금고 이상의 형을 선고받은 경우 집행이 종료된 후 2년이 지나지 않으면 응시할 수 없습니다. 성범죄의 경우에는 20년간 자격 취득이 제한될 수 있습니다."],
  ["스포츠 폭력 위반행위별 징계 기준은?",
   "스포츠 폭력은 사안의 경중에 따라 자격정지나 영구제명 등의 징계를 받을 수 있습니다. 중대한 폭력 행위는 5년 이상 10년 이하의 자격정지 또는 영구제명까지 가능하며, 폭력 예방을 위해 무관용 원칙이 적용됩니다."],
  ["생활체육이란 무엇인가?",
   "생활체육은 나이와 성별에 관계없이 건강과 체력 증진을 위해 자발적으로 참여하는 일상적인 체육활동을 말합니다."],
  ["생활체육 목표를 설명하시오.",
   "생활체육의 목표는 건강과 체력 증진, 건전한 여가생활, 공동체 의식 증진입니다."],
  ["생활체육의 기능 3가지는?",
   "생활체육의 기능은 신체적 기능, 심리적 기능, 사회적 기능입니다. 신체적으로는 건강과 체력 증진, 질병 예방에 도움을 주고, 심리적으로는 스트레스 해소와 정서적 안정에 도움을 줍니다. 사회적으로는 협동심과 공동체 의식, 원만한 대인관계 형성에 기여합니다."],
  ["생활체육의 필요성은?",
   "생활체육은 개인의 건강 증진과 만성질환 예방, 스트레스 해소와 삶의 질 향상에 필요합니다. 또한 공동체 의식과 사회적 화합을 높이고, 의료비 절감과 건전한 여가 활용에도 도움을 줍니다."],
  ["생활체육의 3요소는?",
   "생활체육의 3요소는 시설, 프로그램, 지도자입니다. 시설은 운동할 수 있는 장소와 환경이고, 프로그램은 체육활동의 내용과 계획이며, 지도자는 전문 지식으로 참여자를 안내하는 사람입니다."],
  ["생활체육 활성화 방법을 설명하시오.",
   "생활체육을 활성화하기 위해서는 체육시설을 개방하고 확충하며, 다양한 프로그램을 개발·보급해야 합니다. 또한 동호인 조직을 활성화하고, 생활체육 홍보와 정보서비스망을 강화하며, 스포츠지도자를 체계적으로 관리하고 활용해야 합니다."],
  ["생활체육 시설의 종류는?",
   "생활체육 시설은 운영 주체에 따라 공공체육시설, 학교 체육시설, 직장 체육시설, 민간 체육시설로 구분됩니다. 공공체육시설은 국가나 지자체가 운영하고, 학교 체육시설은 학교가 운영하며, 직장 체육시설은 기업이나 직장이 운영합니다. 민간 체육시설은 개인이나 기업이 영리 목적으로 운영하는 사설 헬스장, 스포츠클럽 등이 해당됩니다."],
  ["생활체육 프로그램이란?",
   "생활체육 프로그램은 일반인들이 생활체육에 쉽고 효과적으로 참여할 수 있도록 구성한 체계적인 체육활동 계획입니다."],
  ["생활체육 프로그램의 구성 요소는?",
   "생활체육 프로그램의 구성 요소에는 시설, 지도자, 참가자가 있으며, 구체적으로는 종목, 재정, 홍보 등이 포함됩니다. 종목은 활동 내용이고, 재정은 운영 예산이며, 홍보는 참가자 모집과 정보 전달을 의미합니다."],
  ["생활체육 프로그램의 기획 단계는?",
   "생활체육 프로그램 기획은 목적 이해, 요구 조사, 목표 설정, 계획, 실행, 평가, 보완의 단계로 이루어집니다. 참가자의 요구를 파악해 목표와 계획을 세우고, 프로그램을 실행한 뒤 평가 결과를 바탕으로 보완합니다."],
  ["생활체육의 원리는?",
   "생활체육의 원리에는 평가성, 창조성, 자발성, 목적성, 개별성이 있습니다. 즉, 지속적이고 객관적인 평가를 바탕으로 참가자가 자발적으로 참여하도록 하며, 뚜렷한 목표와 개인의 특성을 고려해 창조적인 체육활동을 도모하는 것입니다."],
  ["생활체육 지도자의 지도원리는?",
   "생활체육 지도자의 지도원리에는 평가성, 창조성, 자발성, 목적성, 개성화, 계통성, 반복연습, 사회화의 원리가 있습니다. 참가자의 특성과 능력을 고려해 체계적으로 지도하고, 반복 연습과 협동 활동을 통해 운동기능과 사회성을 함께 기르도록 하는 것입니다."],
  ["생활체육 프로그램 구성 원리는?",
   "생활체육 프로그램 구성 원리에는 평가성, 창조성, 자발성, 전문성, 전달성, 평등성, 편의성, 욕구반영성, 보완성, 다양성이 있습니다. 참가자의 욕구와 특성을 반영하고, 누구나 쉽게 참여할 수 있도록 전문적이고 다양한 프로그램을 구성하며, 평가 후 지속적으로 수정·보완해야 합니다."],
  ["생애주기별 운동 지도법은?",
   "생애주기별 운동 지도는 연령과 발달 특성에 맞게 이루어져야 합니다. 유아기는 놀이 중심으로 기본 운동능력을 기르고, 아동기는 다양한 스포츠 활동으로 기초체력과 사회성을 발달시킵니다. 청소년기는 2차 성징에 맞춰 신체와 정서의 균형을 돕고, 성인기는 유산소와 저항운동으로 건강 유지와 삶의 질 향상을 목표로 합니다. 노년기는 근력과 유연성을 유지하고 사회 참여와 고립감 해소를 돕는 방향으로 지도합니다."],
  ["조직적 생활체육이란?",
   "조직적 생활체육은 생활체육의 목표를 효율적으로 달성하기 위해 단체나 조직을 중심으로 이루어지는 체육활동입니다. 체계적인 계획, 전문 지도자 배치, 시설과 프로그램의 정기적 운영이 특징입니다."],
  ["피트니스란?",
   "피트니스는 신체적 건강뿐 아니라 일상생활을 활기차게 수행하고 여가활동을 즐길 수 있는 종합적인 신체 능력을 말합니다."],
  ["에어로빅이란?",
   "에어로빅은 몸에 충분한 산소를 공급하여 심폐기능을 향상시키고 건강을 증진시키는 유산소 운동입니다."],
  ["웰니스란?",
   "웰니스는 Well-being과 Fitness가 결합된 개념으로, 행복하고 건강한 삶을 의미합니다. 신체적·정신적·사회적으로 균형 잡힌 건강 상태를 추구하는 것을 말합니다."],
  ["“Sport for All”이란?",
   "Sport for All은 모든 사람을 위한 스포츠라는 뜻으로, 성별·연령·계층·사회적 지위와 관계없이 누구나 평생 동안 자유롭게 스포츠에 참여할 기회와 권리를 보장하는 개념입니다. 현대 생활체육의 기본 이념입니다."],
  ["머신 운동 vs 프리웨이트 운동 차이점은?",
   "머신 운동은 운동 궤적이 고정되어 있어 안전하고 자세를 잡기 쉬우며, 초보자나 특정 근육을 고립해서 운동할 때 적합합니다. 프리웨이트 운동은 덤벨이나 바벨을 이용해 자유로운 궤적으로 움직이기 때문에 균형감각, 전신 협응력, 안정근 발달에 효과적이지만 부상 위험은 상대적으로 높습니다."],
  ["운동 기구를 잡는 그립의 종류는?",
   "그립의 종류에는 오버그립, 언더그립, 뉴트럴그립, 와이드그립, 클로즈그립, 후크그립, 얼터네이트그립, 섬리스그립이 있습니다. 오버그립은 손등이 위를 향하는 그립, 언더그립은 손바닥이 위를 향하는 그립, 뉴트럴그립은 손바닥이 서로 마주보는 그립입니다."],
  ["동적 웨이트 트레이닝과 정적 웨이트 트레이닝의 효과는?",
   "동적 웨이트 트레이닝은 근육의 길이가 변하면서 힘을 내는 등장성 운동으로, 단축성 수축과 신장성 수축을 이용합니다. 정적 웨이트 트레이닝은 근육 길이 변화 없이 긴장을 유지하는 등척성 운동으로, 자세 유지나 재활운동에 활용됩니다."],
  ["1RM에 대해 설명하시오.",
   "1RM은 정확한 자세로 한 번 들어 올릴 수 있는 최대 중량을 말하며, 근력 운동의 강도를 설정하는 기준으로 사용됩니다."],
  ["1RM의 간접 추정 계산 공식은?",
   "1RM은 부상 위험 때문에 직접 측정보다 간접 추정을 많이 사용합니다. 오코너 공식은 1RM = 무게 + (무게 × 반복횟수 × 0.025)이며, 보통 5~10회 반복 가능한 중량으로 추정합니다."],
  ["웨이트 트레이닝에서 근력, 근지구력, 근비대 훈련 방법의 차이를 설명하시오.",
   "근력 훈련은 고중량·저반복 방식으로 1RM의 80~90% 강도에서 3~5회 반복합니다. 근지구력 훈련은 저중량·고반복 방식으로 1RM의 50~60% 강도에서 15~20회 반복합니다. 근비대 훈련은 그 중간 강도인 1RM의 60~80%에서 10~15회 반복하는 방식입니다."],
  ["랩(Rep)과 세트(Set)란?",
   "Rep은 한 세트 안에서 운동을 반복한 횟수이고, Set는 반복 수행한 운동 횟수의 묶음을 말합니다."],
  ["발살바 호흡법이란?",
   "발살바 호흡법은 숨을 강하게 들이마신 뒤 참아서 복압을 높이는 호흡법입니다. 고중량 운동 시 몸통 안정성을 높이고 강한 힘을 발휘하는 데 도움을 줍니다."],
  ["록첵상태란 무엇인가?",
   "록첵상태는 고중량 웨이트 트레이닝 시 최대 힘을 내는 구간에서 호흡을 멈추고 전신 근육을 강하게 긴장시킨 상태를 말합니다. 복압을 높여 척추를 보호하고 몸통 안정성을 확보해 순간적으로 큰 힘을 내기 위해 사용됩니다."],
  ["주동근과 길항근, 협력근에 대해 설명하시오.",
   "주동근은 운동 시 가장 큰 힘을 내며 동작을 주도하는 근육이고, 길항근은 주동근과 반대 작용을 하는 근육입니다. 협력근은 주동근을 도와 동작을 보조하거나 관절을 안정화하는 근육입니다."],
  ["근비대 목적의 트레이닝에서 세트 간 적절한 휴식 시간은?",
   "근비대 목적의 트레이닝에서는 개인의 체력과 운동 종목에 따라 다르지만, 일반적으로 세트 간 휴식 시간은 1분에서 1분 30초 정도가 효율적입니다."],
  ["운동처방 요소를 설명하시오.",
   "운동처방 요소는 FITT 원칙으로 설명할 수 있습니다. 운동빈도(Frequency), 운동강도(Intensity), 운동시간(Time), 운동형태(Type)를 말하며, 양적 요소에는 빈도·시간·기간이 있고 질적 요소에는 운동양식과 운동강도가 있습니다."],
  ["운동 강도를 나타내는 개념에 대해 설명하시오.",
   "운동 강도를 나타내는 개념에는 METS, 운동자각도(RPE), 최대산소섭취량(VO₂max), 최대심박수(HRmax)가 있습니다. METS는 신체활동의 에너지 소비 정도, RPE는 개인이 느끼는 주관적 운동강도, VO₂max는 산소를 사용할 수 있는 최대 능력, HRmax는 개인이 낼 수 있는 최대 심박수를 의미합니다."],
  ["일일 소비 에너지 요소에 대해 설명하시오.",
   "일일 소비 에너지는 기초대사량, 활동대사량, 발열대사량, 적응대사량으로 구성됩니다. 기초대사량은 생명 유지에 필요한 최소 에너지이고, 활동대사량은 운동과 일상활동에서 쓰는 에너지이며, 발열대사량은 음식의 소화·흡수 과정에서 발생하는 에너지입니다. 적응대사량은 체온 유지나 환경 변화 적응에 필요한 에너지입니다."],
  ["초과회복이란?",
   "초과회복은 운동으로 손상된 근육이 회복되는 과정에서 이전보다 더 강한 부하에 적응할 수 있도록 근육과 체력이 향상되는 현상입니다."],
  ["ROM에 대해 설명하시오.",
   "ROM은 Range of Motion의 약자로, 관절이 움직일 수 있는 최대 가동범위를 말합니다. 관절의 유연성과 근육 상태를 평가하는 데 사용되며, ROM이 좋으면 운동 수행능력 향상과 부상 예방에 도움이 됩니다."],
  ["준비운동의 필요성은?",
   "준비운동은 본 운동 전 체온과 근육 온도를 높이고 관절 가동범위를 확보하여 부상을 예방하고 운동 수행능력을 높이기 위해 필요합니다."],
  ["유연성 트레이닝의 효과는 무엇인가?",
   "유연성 트레이닝은 관절 가동범위를 넓히고 근육을 부드럽게 만들어 부상을 예방하며, 운동 수행능력과 운동 효과를 높이는 데 도움을 줍니다."],
  ["정리운동의 필요성은?",
   "정리운동은 본 운동 후 긴장된 근육을 풀어주고 피로물질 제거를 도와 빠른 피로 회복과 부상 예방에 도움을 줍니다."],
  ["지연성 근육통, DOMS란?",
   "지연성 근육통은 운동 후 1일에서 3일 사이에 서서히 나타나는 근육통입니다. 평소 사용하지 않던 근육을 무리하게 사용하거나 신장성 수축이 많을 때 근섬유 미세손상과 염증 반응으로 발생합니다."],
  ["트레이닝의 원리는?",
   "트레이닝의 원리에는 점진성, 과부하, 전면성, 반복성, 다양성, 개별성, 가역성, 특이성의 원리가 있습니다. 점진성과 과부하는 운동 강도와 양을 서서히 높이고 평소보다 강한 자극을 주는 것이며, 반복성과 다양성은 꾸준히 반복하되 방법을 다양화하는 것입니다. 개별성은 개인의 체력과 목적에 맞게 훈련하는 것이고, 가역성은 운동을 중단하면 효과가 감소하는 것, 특이성은 자극을 준 부위와 능력에 효과가 나타나는 원리입니다."],
  ["트레이닝 종류에 대해 설명하시오.",
   "트레이닝 종류에는 인터벌 트레이닝, 웨이트 트레이닝, 서킷 트레이닝, 레피티션 트레이닝, 플라이오메트릭 트레이닝이 있습니다. 인터벌 트레이닝은 고강도 운동 사이에 불완전한 휴식을 넣어 심박수를 유지하며, 유산소성과 무산소성 능력을 함께 향상시키는 훈련입니다. 웨이트 트레이닝은 바벨, 덤벨, 머신 등 무게를 이용해 근력과 근비대를 향상시키는 훈련입니다. 서킷 트레이닝은 여러 운동을 휴식 없이 또는 짧은 휴식으로 순환하며 실시하는 훈련으로, 심폐지구력과 근지구력 향상에 효과적입니다. 레피티션 트레이닝은 완전한 휴식을 사이에 두고 고강도 운동을 반복하는 훈련입니다. 플라이오메트릭 트레이닝은 근육의 탄성과 신전반사를 이용해 짧은 시간에 폭발적인 힘을 발휘하는 훈련입니다."],
  ["웨이트/저항성 트레이닝의 효과는?",
   "웨이트 트레이닝은 신체적으로 근력과 근지구력을 향상시키고, 기초대사량 증가를 통해 체지방 감소와 성인병 예방에 도움을 줍니다. 또한 뼈에 부하를 주어 골밀도를 높이고 골다공증 예방에도 효과적입니다. 정신적으로는 스트레스 해소, 우울감 완화, 신체 변화에 따른 성취감과 자신감 향상에 도움을 줍니다."],
  ["피라미드 세트와 디센딩 세트의 차이는?",
   "피라미드 세트는 세트가 진행될수록 중량은 점진적으로 올리고 반복 횟수는 줄이는 방법입니다. 반대로 디센딩 세트는 고중량 세트 후 휴식을 가진 뒤 점차 낮은 중량으로 낮춰가며 수행하는 방법입니다."],
  ["드롭 세트란?",
   "드롭 세트는 실패 지점에 도달한 후 무게를 낮추고 휴식 없이 바로 한계점까지 반복하는 고강도 훈련법입니다."],
  ["슈퍼 세트란?",
   "슈퍼 세트는 주동근과 길항근 운동 2가지를 휴식 없이 연속으로 실시하는 방법입니다. 예: 이두 운동 후 삼두 운동."],
  ["컴파운드 세트란?",
   "컴파운드 세트는 같은 부위의 운동 2가지를 휴식 없이 연속으로 실시하는 방법입니다. 예: 가슴 운동 2가지를 연속 수행."],
  ["트라이 세트란?",
   "트라이 세트는 같은 부위 운동 3가지를 휴식 없이 연속으로 실시하는 방법입니다."],
  ["자이언트 세트란?",
   "자이언트 세트는 같은 부위 운동 4가지 이상을 휴식 없이 연속으로 실시하는 고강도 훈련법입니다."],
  ["웨이트 트레이닝에 관한 조 웨이더 훈련 원칙을 설명하시오.",
   "조 웨이더 훈련 원칙에는 치팅 시스템, 스트레이팅, 번즈 트레이닝, 선피로 원리, 피크 컨트랙션, 근우선법, 퀄리티 원리, 더블 스플릿 원리, 플러싱 원리 등이 있습니다."],
  ["치팅 시스템이란?",
   "치팅 시스템은 정확한 자세로 더 이상 반복하기 어려울 때 약간의 반동을 사용하여 반복 횟수를 더 가져가는 훈련 방법입니다."],
  ["스트레이팅이란?",
   "스트레이팅은 반동 없이 정확한 자세로 목표 근육을 고립하여 더 이상 반복할 수 없을 때까지 실시하는 훈련 방법입니다."],
  ["번즈 트레이닝이란?",
   "번즈 트레이닝은 목표 반복 횟수를 달성한 후 완전한 동작이 아닌 부분 반복을 추가하여 근육 자극을 끝까지 이어가는 훈련 방법입니다."],
  ["선피로 원리란?",
   "선피로 원리는 부상 예방과 운동 적응을 위해 가벼운 운동에서 시작해 점차 무거운 운동으로 진행하는 원리입니다."],
  ["피크 컨트랙션이란?",
   "피크 컨트랙션은 근육이 최대 수축되는 지점에서 1~2초 정도 정지하여 근육 수축을 극대화하는 방법입니다."],
  ["근우선법이란?",
   "근우선법은 에너지가 충분한 운동 초반에 약한 신체 부위나 부족한 근육을 먼저 훈련하는 방법입니다."],
  ["퀄리티 원리란?",
   "퀄리티 원리는 세트 사이의 휴식 시간을 점점 줄여 운동 강도와 밀도를 높이는 훈련 원리입니다."],
  ["더블 스플릿 원리란?",
   "더블 스플릿 원리는 오전과 오후로 훈련을 나누어 각각 다른 신체 부위를 훈련하는 방법입니다."],
  ["플러싱 원리란?",
   "플러싱 원리는 한 부위에 여러 가지 운동을 집중적으로 실시하여 펌핑을 극대화하고, 산소와 영양 공급을 증가시키는 훈련 원리입니다."],
  ["근육 펌핑이란?",
   "근육 펌핑은 저항성 운동 시 특정 근육에 혈액이 집중되어 근육이 일시적으로 부풀고 단단해지는 현상입니다. 운동 중 산소와 영양 공급이 증가하고 피로물질 배출을 돕기 위해 혈류량이 증가하면서 나타나며, 휴식 후에는 다시 원래 상태로 돌아갑니다."],
  ["트레이닝 주기화에 대해 설명하시오.",
   "트레이닝 주기화는 기간별로 훈련 목표와 강도를 나누어 체계적이고 점진적으로 훈련하는 방법입니다. 예를 들어 근지구력, 근비대, 근력, 회복기처럼 단계별로 구성하여 운동 효과를 높이고 과훈련을 예방할 수 있습니다."],
  ["분할법에 대해 설명하시오.",
   "분할법은 운동의 효율성과 근육 회복을 고려해 신체 부위를 나누어 규칙적인 주기에 맞춰 훈련하는 방법입니다. 예를 들어 상체와 하체, 또는 가슴·등·하체처럼 부위를 나누어 실시합니다."],
  ["단순관절 운동과 복합관절 운동을 설명하시오.",
   "단순관절 운동은 하나의 관절을 사용하는 운동으로 특정 부위를 집중적으로 자극하는 운동입니다. 예로는 레그 익스텐션, 덤벨 컬이 있습니다. 복합관절 운동은 두 개 이상의 관절을 사용하는 운동으로 큰 힘을 발휘할 수 있으며, 스쿼트, 벤치프레스, 데드리프트 등이 있습니다."],
  ["근비대에 가장 중요한 3가지 요소를 설명하시오.",
   "근비대에 가장 중요한 요소는 운동, 영양, 휴식입니다. 적절한 저항성 운동으로 근육에 자극을 주고, 단백질과 탄수화물 등 충분한 영양을 섭취하며, 회복을 위한 휴식이 함께 이루어져야 근성장이 가능합니다."],
  ["생체전기저항 분석법, BIA의 원리와 주의사항에 대해 설명하시오.",
   "BIA는 인체에 미세한 전류를 흘려보내 조직을 통과할 때 발생하는 저항값을 측정하여 체성분을 분석하는 방법입니다. 이를 통해 체중, 근육량, 체지방률, 내장지방 등을 확인할 수 있습니다. 측정 전에는 음식 섭취, 운동, 샤워 직후 측정을 피하고, 생리 중에는 측정값이 달라질 수 있어 주의해야 합니다."],
  ["운동 중 고원 현상에 대해 설명하고 극복 방법을 설명하시오.",
   "고원 현상은 운동 수행능력이 어느 수준까지 증가하다가 피로, 권태, 흥미 상실 등 신체적·심리적 요인으로 더 이상 향상되지 않고 정체되는 현상입니다. 극복 방법으로는 운동 프로그램 변화, 충분한 휴식과 회복, 운동 강도와 빈도 조절이 있습니다."],
  ["횡문근융해증의 정의와 예방 방법에 대해 설명하시오.",
   "횡문근융해증은 갑작스러운 고강도 운동이나 외상으로 근육세포가 손상되어 근육 성분이 혈액으로 유출되는 질환입니다. 증상으로는 심한 근육통, 부종, 콜라색 소변 등이 나타날 수 있으며, 예방을 위해 운동 강도를 점진적으로 조절하고 충분한 수분 섭취, 휴식, 영양 섭취가 필요합니다."],
  ["오버트레이닝이란?",
   "오버트레이닝은 자신의 회복 능력을 넘는 과도한 훈련으로 인해 근육 발달과 회복의 균형이 깨진 상태입니다. 피로, 식욕 저하, 무기력, 운동 수행능력 저하가 나타날 수 있으며, 훈련량을 줄이고 충분한 휴식과 수면, 영양 섭취가 필요합니다."],
  ["고온환경 또는 여름철 운동 시 주의사항에 대해 설명하시오.",
   "고온환경에서 운동하면 땀 배출이 증가하여 수분과 전해질 손실이 커지고, 탈수, 어지러움, 두통, 근경련이 발생할 수 있습니다. 따라서 충분한 수분 섭취와 전해질 보충, 적절한 운동 강도 조절, 시원한 곳에서의 휴식이 필요합니다."],
  ["파워와 파워 존에 대해 설명하시오.",
   "파워는 단순한 근력이 아니라 근력에 속도가 더해진 순발력을 말하며, 짧은 시간에 빠르고 강하게 힘을 내는 능력입니다. 파워 존은 큰 힘을 만들어내는 신체 중심 부위로 허리, 복부, 둔근, 대퇴부를 포함합니다."],
  ["초보자에 대한 운동 지도법은?",
   "초보자는 부상 예방을 위해 가벼운 중량으로 정확한 자세를 익히는 것이 중요합니다. 충분한 준비운동과 정리운동을 실시하고, 개인의 체력 수준에 맞는 강도로 시작해 점진적 과부하 원칙에 따라 안전하게 운동량을 늘려야 합니다. 또한 운동, 영양, 휴식을 함께 관리하도록 지도합니다."],
  ["이두 및 삼두 슈퍼세트 운동은 무엇인가?",
   "슈퍼세트는 주동근과 길항근 운동을 휴식 없이 연속으로 실시하는 고강도 훈련법입니다. 이두와 삼두 슈퍼세트의 예로는 바벨 컬 후 오버헤드 트라이셉스 익스텐션, 덤벨 컬 후 원암 덤벨 오버헤드 트라이셉스 익스텐션 등이 있습니다."],
  ["우리 몸에서 가장 큰 근육 3가지와 운동 예시는?",
   "우리 몸의 큰 근육에는 대퇴사두근, 대둔근, 광배근이 있습니다. 대퇴사두근은 스쿼트, 런지, 레그 익스텐션으로 발달시킬 수 있고, 대둔근은 힙브릿지, 힙쓰러스트, 스쿼트로 발달시킬 수 있습니다. 광배근은 랫풀다운, 로우, 풀업 등이 대표적인 운동입니다."],
  ["상완이두근과 상완삼두근을 발달시킬 수 있는 운동 각 3가지 이상은?",
   "상완이두근은 팔꿈치 굴곡에 관여하며 바벨 컬, 덤벨 컬, 해머 컬로 발달시킬 수 있습니다. 상완삼두근은 팔꿈치 신전에 관여하며 라잉 트라이셉스 익스텐션, 덤벨 킥백, 벤치 딥스, 케이블 푸쉬다운 등이 대표적인 운동입니다."],
  ["대흉근을 발달시키는 운동 3가지 이상은?",
   "대흉근은 벤치프레스, 덤벨 프레스, 체스트 프레스 머신 같은 프레스 운동과 덤벨 플라이, 펙덱 플라이, 케이블 크로스오버 같은 플라이 운동으로 발달시킬 수 있습니다."],
  ["등, 광배근/척추기립근을 발달시키는 운동은?",
   "광배근은 랫풀다운, 풀업, 벤트오버 바벨 로우, 원암 덤벨 로우 등으로 발달시킬 수 있습니다. 척추기립근은 데드리프트, 백 익스텐션, 굿모닝 엑서사이즈 등이 대표적인 운동입니다."],
  ["스티프 데드리프트, 루마니안 데드리프트, 컨벤셔널 데드리프트의 차이점은?",
   "스티프 데드리프트는 무릎을 거의 편 상태로 수행하여 햄스트링 자극이 큰 운동입니다. 루마니안 데드리프트는 무릎을 살짝 굽히고 고관절을 접어 내려가며 둔근, 햄스트링, 척추기립근 등 후면 사슬을 발달시킵니다. 컨벤셔널 데드리프트는 무릎과 고관절을 함께 사용해 바닥에서 중량을 들어 올리는 운동으로 하체와 등, 전신 근력 발달에 효과적입니다."],
  ["삼각근을 발달시키는 운동 3가지 이상은?",
   "삼각근은 밀리터리 프레스, 덤벨 숄더 프레스 같은 프레스 운동과 프론트 레이즈, 사이드 레터럴 레이즈, 벤트오버 레터럴 레이즈 같은 레이즈 운동으로 발달시킬 수 있습니다."],
  ["삼각근과 승모근을 동시에 발달시킬 수 있는 운동은?",
   "업라이트 로우는 바벨이나 덤벨을 몸에 가깝게 유지한 채 턱 아래 방향으로 끌어올리는 운동으로, 전면·측면 삼각근과 상부 승모근을 동시에 자극할 수 있습니다."],
  ["복직근을 발달시킬 수 있는 운동은?",
   "복직근은 크런치, 레그 레이즈, 싯업, V업 등의 운동으로 발달시킬 수 있습니다."],
  ["전완근을 발달시킬 수 있는 운동은?",
   "전완근은 리스트 컬, 리버스 리스트 컬 등의 운동으로 발달시킬 수 있습니다."],
  ["하체, 대퇴사두근/대퇴이두근 운동은?",
   "대퇴사두근은 허벅지 앞쪽 근육으로 스쿼트, 런지, 레그 익스텐션, 레그 프레스로 발달시킬 수 있습니다. 대퇴이두근은 허벅지 뒤쪽 근육으로 레그컬, 스티프 레그 데드리프트 등이 대표적인 운동입니다."],
  ["백스쿼트 지도 방법에 대해 설명하시오.",
   "바벨을 어깨 뒤쪽 승모근에 올리고, 양발은 어깨너비 정도로 벌리며 발끝은 약간 바깥쪽을 향하게 합니다. 허리와 등을 곧게 유지한 상태에서 엉덩이를 뒤로 빼며 천천히 앉고, 대퇴부가 지면과 수평이 될 정도까지 내려갔다가 반동 없이 일어납니다. 호흡은 내려갈 때 들이마시고 올라오면서 내쉬도록 지도합니다."],
  ["바벨 프런트 스쿼트 지도 방법에 대해 설명하시오.",
   "바벨을 전면 삼각근과 쇄골 부위에 안정적으로 올리고, 양발은 어깨너비로 벌린 상태에서 시선은 정면을 향합니다. 호흡을 들이마시며 천천히 앉고, 허벅지가 지면과 평행하거나 그보다 낮은 위치까지 내려간 뒤 일어서며 호흡을 내쉬도록 지도합니다."],
  ["컨벤셔널 데드리프트 지도 방법에 대해 설명하시오.",
   "발은 어깨너비로 벌리고 바벨을 오버핸드 그립으로 잡습니다. 허리와 등을 곧게 펴고 엉덩이를 낮춘 상태에서 바벨을 몸 가까이에 두고 들어 올립니다. 들어 올릴 때 허리가 말리지 않도록 하고, 바벨을 올리며 호흡을 내쉬고 내릴 때 들이마시도록 지도합니다."],
  ["바벨 벤치프레스 지도 방법에 대해 설명하시오.",
   "벤치에 누워 머리, 어깨, 엉덩이를 벤치에 붙이고 양발은 바닥에 고정합니다. 바벨은 어깨너비보다 약간 넓게 잡고, 가슴 중앙으로 천천히 내린 뒤 대흉근을 수축하며 밀어 올립니다. 팔은 완전히 잠그지 않도록 하고, 바벨을 내릴 때 들이마시고 올릴 때 내쉬도록 지도합니다."],
  ["덤벨 런지 지도 방법에 대해 설명하시오.",
   "양손에 덤벨을 들고 선 상태에서 한쪽 발을 앞으로 내딛습니다. 내려갈 때 앞다리와 뒷다리의 무릎 각도가 약 90도가 되도록 하고, 상체는 곧게 유지한 뒤 다시 제자리로 돌아옵니다. 호흡은 내려갈 때 들이마시고 올라오면서 내쉬도록 지도합니다."],
  ["스쿼팅 바벨 컬 지도 방법에 대해 설명하시오.",
   "스쿼팅 바벨 컬은 스쿼트 자세에서 언더핸드 그립으로 바벨을 잡고, 팔꿈치를 무릎에 고정한 상태로 실시합니다. 상체 반동 없이 바벨을 들어 올리며 이두근을 수축하고, 내릴 때는 천천히 버티며 내려옵니다. 호흡은 들어 올릴 때 내쉬고, 내릴 때 들이마시도록 지도합니다."],
  ["스탠딩 밀리터리 프레스 지도 방법에 대해 설명하시오.",
   "양발을 어깨너비로 벌리고 바벨을 어깨너비 또는 약간 넓게 잡습니다. 시선은 정면을 향하고 바벨을 쇄골 부위까지 천천히 내린 뒤, 머리 위로 밀어 올리며 삼각근을 수축합니다. 팔꿈치가 과하게 벌어지지 않도록 하고, 내릴 때 들이마시고 올릴 때 내쉬도록 지도합니다."],
  ["벤트오버 바벨 로우 지도 방법에 대해 설명하시오.",
   "바벨을 오버핸드 그립으로 잡고 양발은 어깨너비보다 약간 좁게 둡니다. 상체를 앞으로 숙이되 등과 허리는 곧게 펴고, 바벨을 하복부 쪽으로 당기며 견갑골을 모아 광배근을 수축합니다. 바벨을 당길 때 내쉬고, 내릴 때 들이마시도록 지도합니다."],
  ["바벨 컬 지도 방법에 대해 설명하시오.",
   "바벨을 언더핸드 그립으로 잡고 시선은 정면을 향합니다. 팔꿈치가 흔들리지 않도록 고정한 상태에서 바벨을 들어 올리며 상완이두근을 수축하고, 최고점에서 호흡을 내쉽니다. 내릴 때는 천천히 버티며 내려오고 호흡을 들이마시도록 지도합니다."],
  ["클래식 보디빌딩 프런트 더블 바이셉스 지도 방법에 대해 설명하시오.",
   "선수는 심판을 향해 정면으로 서고, 한 발을 바깥쪽 앞으로 둡니다. 두 팔을 들어 어깨와 수평을 이루게 한 뒤 팔꿈치를 구부리고 주먹을 쥐어 이두근과 전완근을 수축합니다. 이때 머리부터 발끝까지 가능한 많은 근육을 함께 수축하여 전체적인 골격과 근육 발달이 잘 보이도록 지도합니다."],
  ["(클래식)보디빌딩 사이드 체스트 지도 방법에 대해 설명하시오.",
   "선수는 심판을 향해 측면으로 서고, 심판과 가까운 쪽 팔을 직각으로 구부린 뒤 다른 손으로 손목을 잡습니다. 가까운 쪽 다리는 무릎을 굽혀 발가락으로 지탱하고, 가슴을 펴며 상완이두근, 대흉근, 대퇴부, 비복근을 함께 수축하도록 지도합니다."],
  ["(클래식)보디빌딩 사이드 트라이셉스 지도 방법에 대해 설명하시오.",
   "선수는 심판을 향해 측면으로 서고, 두 팔을 등 뒤에 두거나 한 손으로 반대쪽 손목을 잡습니다. 앞쪽 팔에 압력을 주어 상완삼두근을 수축하고, 가슴을 들어 올리며 복부, 허벅지, 비복근까지 함께 수축하도록 지도합니다."],
  ["(클래식)보디빌딩 백 더블 바이셉스 지도 방법에 대해 설명하시오.",
   "선수는 등을 심판에게 보이게 서고, 프런트 더블 바이셉스와 같은 팔 자세를 취합니다. 한 발은 뒤로 빼서 발가락으로 지탱하고, 상완이두근뿐 아니라 어깨, 등, 허벅지, 비복근까지 함께 수축하도록 지도합니다."],
  ["클래식 피지크 베큠 포즈 지도 방법에 대해 설명하시오.",
   "선수는 정면으로 서서 두 팔을 머리 뒤에 두고 두 발을 모읍니다. 숨을 깊게 내쉰 후 배꼽을 척추 쪽으로 당기듯 복부를 안으로 집어넣고, 복횡근과 다리, 몸통, 팔 근육을 수축하도록 지도합니다. 이때 복직근은 과하게 수축하지 않도록 합니다."],
  ["여자 피지크 프런트 더블 바이셉스 지도 방법에 대해 설명하시오.",
   "선수는 정면으로 서서 한쪽 다리를 바깥쪽으로 빼고, 두 팔을 어깨 높이까지 올린 뒤 팔꿈치를 구부립니다. 주먹은 쥐지 않고 손을 편 상태에서 손가락이 위를 향하게 하며, 상체와 팔, 하체의 근육을 함께 수축하도록 지도합니다."],
  ["여자 피지크 사이드 체스트 지도방법에 대해 설명하시오.",
   "선수는 더 잘 발달된 측면을 선택해 심판을 향해 상체를 틀어 섭니다. 배를 안으로 집어넣고, 심판과 가까운 쪽 다리는 곧게 펴서 발가락으로 지탱하며 먼 쪽 다리는 무릎을 약간 굽힙니다. 양팔은 몸의 약간 앞쪽에 두고 손을 모은 상태로, 가슴과 함께 보이는 전신 근육을 수축하도록 지도합니다."],
  ["기능해부학이란 무엇인가?",
   "인체의 구조를 이해하고, 그 구조가 만들어내는 기능적인 움직임을 연구하는 학문입니다."],
  ["기능해부학의 중요성은?",
   "지도자가 인체 움직임의 원리를 알아야 회원에게 정확한 자세와 안전한 운동 방법을 지도할 수 있기 때문입니다."],
  ["인체 3가지 면은?",
   "1) 시상면 (Sagittal Plane): 인체를 좌우로 나누는 면 → 굴곡, 신전 2) 관상면 (Frontal Plane): 인체를 앞뒤로 나누는 면 → 외전, 내전 3) 수평면 (Horizontal Plane): 인체를 상하로 나누는 면 → 회전"],
  ["근육의 역할과 종류?",
   "역할: 움직임 형성, 자세 유지, 호흡 관여, 체온 조절, 내장 기관 움직임 등. 종류: 1. 골격근 (Skeletal Muscle): 뼈에 붙어 움직임 생성, 수의근, 가로무늬근 (운동 가능) 2. 심장근 (Cardiac Muscle): 심장 구성, 불수의근, 가로무늬근 (자동 수축) 3. 내장근 (Smooth Muscle): 장기 벽 구성, 불수의근, 민무늬근 (소화 등)"],
  ["골격근의 구조와 주요 기능 3가지?",
   "골격근은 수의근이며, 가로무늬근입니다. 1. 신체 움직임 생성 (관절 운동): 수축을 통해 뼈를 당겨 움직임을 만듦. 2. 자세 유지 및 안정화 (중력 저항): 중력에 대항하여 신체 균형을 잡음 (항중력근). 3. 체온 조절 (열발생, 열 생산): 근육 활동을 통해 체온을 유지"],
  ["기시점과 정지점이란?",
   "기시점 (Origin): 근육이 시작되는 지점으로, 수축 시 상대적으로 고정되어 움직임이 적은 뼈의 부착점입니다. (주로 몸통 쪽) 정지점 (Insertion): 근육이 끝나는 지점으로, 수축 시 주로 움직이는 뼈의 부착점입니다. (주로 몸통에서 먼쪽"],
  ["근육을 6개 부위로 나누고 각 근육 기능에 대해 설명하시오.",
   "근육은 크게 하체, 복부, 가슴, 팔, 등, 어깨로 나눌 수 있습니다. 하체에는 대퇴사두근, 햄스트링, 둔근, 비복근이 있으며 대퇴사두근은 무릎 신전, 햄스트링은 고관절 신전과 무릎 굴곡, 둔근은 고관절 신전·외전·외회전, 비복근은 발목을 밀어 올리는 기능을 합니다. 복부에는 복직근과 내·외복사근이 있으며 몸통 굴곡과 회전에 관여합니다. 가슴의 대흉근은 팔을 모으고 미는 동작에 관여하고, 팔의 상완이두근은 팔꿈치 굴곡, 상완삼두근은 팔꿈치 신전을 담당합니다. 등은 광배근, 승모근, 척추기립근으로 팔 당기기, 어깨 움직임, 상체 세우기에 관여하며, 어깨의 삼각근은 전면·측면·후면으로 나뉘어 팔을 앞·옆·뒤로 움직이는 기능을 합니다."],
  ["대퇴사두근이란?",
   "대퇴사두근은 허벅지 앞쪽에 위치한 4개의 근육으로, 주된 기능은 무릎 관절 신전입니다. 대퇴직근, 외측광근, 내측광근, 중간광근으로 구성되며, 대퇴직근은 고관절 굴곡에도 관여하고 내측광근은 슬개골 안정화에 도움을 줍니다."],
  ["무릎 단일 관절 운동은?",
   "무릎 단일 관절 운동에는 대퇴사두근을 고립해 강화하는 레그 익스텐션과 햄스트링을 고립해 강화하는 레그 컬이 있습니다."],
  ["스쿼트 시 무릎 부담 부위와 원인은?",
   "스쿼트 시 무릎 부담은 주로 슬개대퇴관절, 전방십자인대, 슬개건에 발생할 수 있습니다. 무릎이 과도하게 앞으로 나가거나 무게중심이 앞쪽으로 쏠리면 슬개골 주변 압력과 전단력이 증가할 수 있으므로, 고관절을 충분히 사용하고 무게중심을 발 중앙에서 뒤꿈치 쪽에 두도록 지도해야 합니다."],
  ["힙 어브덕션 근육을 설명하시오.",
   "힙 어브덕션은 고관절 외전 운동으로, 주로 중둔근, 소둔근, 대퇴근막장근이 사용됩니다."],
  ["힙 어덕션 근육을 설명하시오.",
   "힙 어덕션은 고관절 내전 운동으로, 주로 내전근군이 사용됩니다. 대표적으로 대내전근, 장내전근, 단내전근, 치골근, 박근이 있습니다."],
  ["종아리 근육에 대해 설명하시오.",
   "종아리 근육은 하퇴삼두근이라고도 하며, 비복근과 가자미근으로 구성됩니다. 비복근은 무릎과 발목에 모두 관여하는 이관절근으로 스탠딩 카프레이즈에서 주로 자극되고, 가자미근은 발목에 관여하는 단관절근으로 시티드 카프레이즈에서 주로 자극됩니다."],
  ["복근의 구성과 역할은?",
   "복근은 복직근, 외복사근, 내복사근, 복횡근으로 구성됩니다. 복직근은 몸통 굴곡과 골반 후방경사에 관여하고, 외복사근과 내복사근은 몸통 회전과 측굴에 관여합니다. 복횡근은 가장 깊은 복근으로 복압 유지와 척추 안정화에 중요한 역할을 합니다."],
  ["심부근육에 대해 설명하시오.",
   "심부근육은 코어 근육이라고도 하며, 신체 중심을 지지하고 관절의 안정성과 원활한 움직임을 돕는 근육입니다. 대표적으로 복횡근, 횡격막, 다열근, 골반저근이 있습니다."],
  ["컨벤셔널 데드리프트 시 코어의 역할은?",
   "컨벤셔널 데드리프트에서 코어는 복압을 형성하여 척추를 보호하고, 척추 중립 자세를 유지해 허리가 말리거나 꺾이지 않도록 돕습니다. 또한 하체에서 발생한 힘을 상체와 바벨로 전달하는 연결고리 역할을 합니다."],
  ["호흡, 흡기/호기에 사용되는 근육은?",
   "평상시 흡기에는 횡격막과 외늑간근이 사용되고, 평상시 호기는 근육의 적극적인 수축보다는 근육 이완으로 자연 배출됩니다. 강제 흡기에는 흉쇄유돌근과 사각근이 사용되고, 강제 호기에는 내늑간근과 복근이 사용됩니다."],
  ["대흉근 쇄골부의 주요 기능은?",
   "대흉근 쇄골부는 윗가슴 근육으로, 팔을 앞으로 들어 올리는 굴곡, 팔을 안쪽으로 모으는 수평 내전, 팔을 안쪽으로 돌리는 내회전 기능을 합니다. 또한 팔을 움직일 때 쇄골과 어깨관절의 안정화를 돕습니다."],
  ["덤벨 사이드 레터럴 레이즈 사용 근육은?",
   "덤벨 사이드 레터럴 레이즈는 측면 삼각근을 주동근으로 사용하는 운동입니다. 협응근으로는 극상근, 승모근, 전면·후면 삼각근 등이 함께 사용됩니다."],
  ["회전근개 4가지는?",
   "회전근개는 어깨관절을 안정화하고 회전을 돕는 4개의 근육입니다. 극상근, 극하근, 소원근, 견갑하근으로 구성되며, 극상근은 팔의 초기 외전, 극하근과 소원근은 외회전, 견갑하근은 내회전에 관여합니다."],
  ["어깨 올림근에 대해 설명하시오.",
   "어깨 올림근은 견갑거근이라고 하며, 견갑골을 위로 들어 올리는 거상 작용을 합니다. 대표적인 운동으로는 바벨 슈러그와 덤벨 슈러그가 있습니다."],
  ["팔(어깨)과 고관절의 내·외회전 근육에 대해 설명하시오.",
   "팔, 즉 어깨관절의 내회전근은 견갑하근, 광배근, 대원근, 대흉근, 전면삼각근입니다. 어깨관절의 외회전근은 극하근, 소원근, 후면삼각근입니다. 고관절의 내회전근은 중둔근, 소둔근, 대퇴근막장근, 내전근이며, 고관절의 외회전근은 대둔근입니다."],
  ["발목 굴곡에 대해 설명하시오.",
   "발목 굴곡은 배측굴곡과 저측굴곡으로 나눌 수 있습니다. 배측굴곡은 발등이 정강이 쪽으로 올라가는 동작으로 주로 전경골근이 사용되며, 스쿼트 하강 시 필요한 움직임입니다. 저측굴곡은 발끝이 아래쪽으로 향하는 동작으로 주로 비복근과 가자미근이 사용됩니다."],
  ["손가락 폄 동작 근육은?",
   "손가락 폄 동작에는 주로 손가락폄근, 즉 지신근이 사용되며 2~5번째 손가락을 펴는 역할을 합니다. 엄지손가락을 펴는 동작에는 긴엄지폄근, 즉 장무지신근이 사용됩니다."],
  ["뼈의 기능과 역할 2가지는?",
   "뼈는 우리 몸의 기본 골격을 형성하여 신체를 지지하고 형태를 유지하는 역할을 합니다. 또한 두개골, 갈비뼈처럼 주요 내부 장기를 보호합니다. 그 외에도 혈액 생성과 무기질 저장 기능을 합니다."],
  ["관절의 종류는?",
   "관절은 크게 섬유관절, 연골관절, 윤활관절로 나뉩니다. 섬유관절은 두개골처럼 움직임이 거의 없는 부동관절이고, 연골관절은 척추 사이 디스크처럼 제한된 움직임이 가능한 반가동관절입니다. 윤활관절은 무릎, 어깨, 손목처럼 윤활액이 있어 비교적 자유롭게 움직이는 관절입니다."],
  ["근육 관절 운동에 대해 설명하시오.",
   "근육과 관절의 기본 운동에는 굴곡, 신전, 외전, 내전, 내회전, 외회전이 있습니다. 굴곡은 관절 각도가 줄어드는 동작, 신전은 펴지는 동작이고, 외전은 정중선에서 멀어지는 동작, 내전은 정중선 쪽으로 가까워지는 동작입니다. 내회전은 안쪽으로 돌리는 것, 외회전은 바깥쪽으로 돌리는 것입니다. 그 외에 수평내전·수평외전, 회내·회외, 견갑골의 거상·하강·전인·후인 등이 있습니다."],
  ["골반뼈의 역할과 구조에 대해 설명하시오.",
   "골반은 척추와 하체를 연결하여 체중을 지탱하고 보행을 가능하게 하며, 방광과 내장, 여성의 경우 자궁을 보호하는 역할을 합니다. 골반뼈는 볼기뼈, 엉치뼈, 꼬리뼈로 이루어져 있습니다."],
  ["척추의 구성과 개수와 역할은?",
   "척추는 성인 기준 총 26개로, 경추 7개, 흉추 12개, 요추 5개, 천추 1개, 미추 1개로 구성됩니다. 천추와 미추는 성인이 되면서 각각 하나로 융합됩니다. 척추는 몸의 중심을 잡아 바로 설 수 있게 하고, 척수를 보호하며 신체 움직임과 충격 흡수에 관여합니다."],
  ["인체 구성요소의 주요 기능과 역할은?",
   "뼈는 신체를 지지하고 장기를 보호하며, 관절은 뼈와 뼈가 만나는 곳으로 움직임의 중심 역할을 합니다. 연골은 뼈 사이의 마찰을 줄이고 충격을 흡수하며, 인대는 뼈와 뼈를 연결해 관절을 안정화합니다. 건은 근육과 뼈를 연결해 근육의 힘을 뼈로 전달하고, 근육은 수축과 이완을 통해 움직임과 힘을 만들어냅니다."],
  ["무릎 인대 4가지는?",
   "무릎 인대는 전방십자인대, 후방십자인대, 내측측부인대, 외측측부인대가 있습니다. 전방십자인대는 정강이뼈가 앞으로 밀리는 것을 막고, 후방십자인대는 뒤로 밀리는 것을 막습니다. 내측측부인대는 무릎 안쪽을 안정화하고 외반을 방지하며, 외측측부인대는 무릎 바깥쪽을 안정화하고 내반을 방지합니다."],
  ["근육의 역할에 대해 설명하시오.",
   "근육은 뼈에 부착하여 관절을 움직이고 신체 운동을 가능하게 합니다. 또한 내장기관의 움직임과 생명 유지에 관여하며, 자세 유지와 체온 유지를 위한 열 생성 역할도 합니다."],
  ["근섬유에 대해 설명하시오.",
   "근섬유는 근육을 구성하는 근세포로, 수축성을 가진 기본 단위입니다. 하나의 근섬유는 여러 개의 근원섬유로 이루어져 있고, 근원섬유는 수축력을 가진 단백질로 구성되어 근육 수축을 가능하게 합니다."],
  ["근육의 종류, 지근과 속근에 대해 설명하시오.",
   "지근은 붉은색을 띠는 적근으로, 모세혈관과 마이오글로빈이 많아 산소를 이용한 지구성 운동에 적합합니다. 수축 속도는 느리지만 피로에 강해 마라톤 같은 장시간 운동에 유리합니다. 속근은 흰색을 띠는 백근으로, 모세혈관과 마이오글로빈이 적어 쉽게 피로해지지만 ATP와 크레아틴을 이용해 순간적인 힘을 내는 데 유리합니다. 단거리 달리기나 웨이트 트레이닝처럼 짧고 강한 운동에 적합합니다."],
  ["수의근과 불수의근이란?",
   "수의근은 중추신경계의 지배를 받아 자신의 의지대로 수축과 이완을 조절할 수 있는 근육으로, 대표적으로 골격근이 있습니다. 불수의근은 자신의 의지와 관계없이 자율신경계에 의해 조절되는 근육으로, 심장근과 내장근, 즉 평활근이 해당됩니다."],
  ["근육의 수축 형태 3가지에 대해 설명하시오",
   "등척성 수축은 근육 길이 변화 없이 힘을 발휘하는 수축으로 플랭크나 벽밀기 같은 자세 유지 운동에 사용됩니다. 등장성 수축은 근육 길이가 변하면서 힘을 내는 수축으로 단축성 수축과 신장성 수축이 있습니다. 등속성 수축은 일정한 속도로 근육이 수축하는 형태로 재활운동에 사용됩니다."],
  ["근수축 과정, 근세사 활주설이란?",
   "근세사 활주설은 신경 자극에 의해 액틴과 미오신이 서로 미끄러지듯 움직이며 근육이 수축하는 과정입니다. 운동신경 말단에서 아세틸콜린이 분비되고, 칼슘이 방출되어 액틴과 미오신의 결합 부위가 열리면, 미오신이 액틴을 끌어당겨 근절이 짧아지면서 근수축이 일어납니다."],
  ["근력을 결정하는 요인에 대해 설명하시오.",
   "근력은 근육의 단면적, 신경 요인, 근섬유 유형, 근육의 길이에 의해 결정됩니다. 근육 단면적이 클수록, 운동 단위 동원이 많을수록 큰 힘을 낼 수 있고, 지근보다 속근이 더 큰 힘을 냅니다. 또한 근육은 최적의 길이일 때 가장 큰 힘을 발휘합니다."],
  ["위성세포란?",
   "위성세포는 근섬유 표면에 존재하는 근육 줄기세포입니다. 평소에는 비활성 상태로 있다가 고강도 운동 등으로 근섬유에 미세손상이 생기면 활성화되어 근육을 재생하고 복구하며, 근비대에 중요한 역할을 합니다."],
  ["교감신경과 부교감신경이란?",
   "교감신경과 부교감신경은 자율신경계에 속하며 서로 길항작용을 합니다. 교감신경은 위급하거나 운동하는 상황에서 심박수 증가, 동공 확장, 호흡 촉진, 소화 억제 작용을 하고, 부교감신경은 안정 상태에서 심박수 감소, 동공 수축, 소화 촉진 등 회복과 에너지 보존에 관여합니다."],
  ["신경 말단의 신경전달물질은?",
   "자율신경계의 신경전달물질은 종류에 따라 다릅니다. 부교감신경 말단에서는 아세틸콜린이 분비되어 심박수를 낮추고 소화를 촉진하며, 교감신경 말단에서는 노르에피네프린이 분비되어 심박수와 혈압을 높이고 투쟁-도피 반응을 유도합니다."],
  ["신경근 접합부의 신경전달물질은?",
   "신경근 접합부의 신경전달물질은 아세틸콜린입니다. 운동신경의 전기적 신호가 신경 말단에 도달하면 아세틸콜린이 방출되어 근섬유에 수축 신호를 전달합니다."],
  ["골지건기관과 근방추란?",
   "골지건기관은 건에 위치하여 근육에 걸리는 장력을 감지하는 수용기입니다. 근육이나 힘줄에 과도한 장력이 걸리면 근육을 이완시켜 손상을 예방합니다. 근방추는 근육 내부에 위치하여 근육의 길이 변화와 늘어나는 속도를 감지하는 수용기입니다. 근육이 과도하게 늘어나면 반사적으로 수축시켜 근육을 보호합니다."],
  ["동화작용과 이화작용에 대해 설명하시오.",
   "동화작용은 작은 물질을 합성해 큰 물질을 만드는 과정으로, 대표적으로 단백질 합성과 근육 성장에 관여합니다. 이화작용은 큰 물질을 작은 물질로 분해해 에너지를 만드는 과정으로, 영양 섭취가 부족하거나 운동량이 과도하면 근육 분해가 일어날 수 있습니다."],
  ["ATP란 무엇인가?",
   "ATP는 아데노신삼인산으로, 우리 몸의 세포가 직접 사용하는 에너지원입니다. ATP가 분해될 때 에너지가 방출되어 근육 수축, 물질 합성 등 생명활동에 사용됩니다."],
  ["ATP-PCr 시스템, 인원질 과정이란?",
   "ATP-PCr 시스템은 산소 없이 근육에 저장된 크레아틴인산을 분해하여 ATP를 가장 빠르게 공급하는 무산소성 에너지 시스템입니다. 폭발적인 힘을 내는 데 사용되지만 지속 시간이 약 10초 이내로 짧습니다."],
  ["무산소성 해당 과정, 젖산 시스템이란?",
   "무산소성 해당 과정은 산소 없이 포도당이나 글리코겐을 분해하여 ATP를 생성하는 에너지 시스템입니다. ATP-PCr 시스템 이후 단시간 고강도 운동에서 주로 사용되며, 이 과정에서 젖산이 생성됩니다. 최근에는 젖산을 단순한 피로물질이 아니라 피로 상태의 지표이자 다시 에너지원으로 재활용될 수 있는 물질로 봅니다."],
  ["유산소 시스템이란?",
   "유산소 시스템은 산소를 이용하여 ATP를 생성하는 에너지 시스템입니다. 미토콘드리아에서 탄수화물과 지방을 분해하여 세 가지 에너지 시스템 중 가장 많은 ATP를 생산하지만, 에너지 생성 속도는 느립니다. 장시간 지속 가능한 운동에 주로 사용되며 마라톤, 장거리 조깅, 사이클 같은 지구성 운동에 동원됩니다."],
  ["운동 시 에너지 대사 과정의 사용은?",
   "운동 시 에너지는 ATP-PCr 시스템, 무산소성 해당 과정, 유산소 시스템이 복합적으로 작용하며, 운동 강도와 지속 시간에 따라 주로 사용되는 비율이 달라집니다. 0~10초의 초고강도 운동은 ATP-PCr 시스템이 주로 쓰이고, 10초~2분 정도의 고강도 운동은 무산소성 해당 과정이 주로 사용됩니다. 3분 이상의 저강도·장시간 운동에서는 산소를 이용하는 유산소 시스템이 주로 사용됩니다."],
  ["무산소성 역치란?",
   "무산소성 역치는 운동 강도가 증가하여 유산소 시스템만으로 에너지 공급이 부족해지고, 무산소성 대사가 본격적으로 증가하기 시작하는 시점입니다. 이 시점 이후에는 젖산이 빠르게 축적될 수 있어 피로감, 현기증, 몸이 무거워지는 증상이 나타날 수 있습니다."],
  ["초과산소섭취량, EPOC에 대해 설명하시오.",
   "초과산소섭취량은 운동이 끝난 후에도 안정 시보다 산소섭취량이 일시적으로 증가한 상태를 말합니다. 운동 중 부족했던 산소를 보충하고 신체를 회복하는 과정이며, 운동 강도가 높을수록 EPOC가 더 오래 지속될 수 있습니다."],
  ["호흡교환율, RER이란?",
   "호흡교환율은 내뱉은 이산화탄소량을 들이마신 산소량으로 나눈 비율로, 어떤 에너지원을 주로 사용하는지 판단하는 지표입니다. RER이 0.7에 가까우면 지방 사용 비율이 높고, 1.0에 가까우면 탄수화물 사용 비율이 높습니다."],
  ["기초대사량(BMR)이란?",
   "기초대사량은 생명 유지를 위해 아무것도 하지 않아도 소비되는 최소한의 에너지입니다. 호흡, 혈액순환, 체온 유지 등에 사용되며, 하루 총 에너지 소비량 중 가장 큰 비중을 차지합니다. 근육량이 많을수록 높고 나이가 들수록 감소하는 경향이 있습니다."],
  ["무산소 운동 시 근피로 유발 원인 3대 요인은?",
   "무산소 운동 시 근피로는 주로 수소이온 축적, 에너지 대사 효소 활성 저하, ATP와 크레아틴인산 고갈 때문에 발생합니다. 수소이온이 쌓이면 근육이 산성화되고, 효소 기능과 칼슘 작용이 저하되어 근수축 능력이 떨어집니다. 또한 ATP와 PCr이 고갈되면 폭발적인 힘을 지속하기 어렵습니다."],
  ["단백질을 에너지원으로 쓸 때 단점은?",
   "단백질을 에너지원으로 사용하면 근육을 분해해 에너지를 만들기 때문에 근손실이 발생할 수 있습니다. 또한 질소 노폐물을 처리하는 과정에서 간과 신장에 부담을 주고, 노폐물 배출 과정에서 수분 손실이 커져 탈수를 유발할 수 있습니다."],
  ["포도당 신생합성에 대해 설명하시오.",
   "포도당 신생합성은 탄수화물이 부족할 때 간과 신장에서 젖산, 글리세롤, 아미노산 같은 비탄수화물 물질을 이용해 포도당을 새로 만드는 과정입니다. 격렬한 운동이나 공복 상태에서 혈당을 유지하고 에너지를 공급하기 위해 일어납니다."],
  ["에너지, 영양소 과다 섭취 시 반응은?",
   "에너지를 과다 섭취하면 남은 에너지는 저장됩니다. 혈당이 높아지면 인슐린이 분비되어 포도당을 저장하고, 간과 근육의 글리코겐 저장량을 초과한 에너지는 중성지방으로 전환되어 체지방으로 축적됩니다. 이러한 상태가 반복되면 인슐린 저항성, 비만, 당뇨 등 대사질환 위험이 증가할 수 있습니다."],
  ["탄수화물 과다 섭취 후 운동 효과 감소 이유는?",
   "운동 직전 단당류를 과다 섭취하면 혈당이 급격히 올라 인슐린이 과다 분비됩니다. 이 상태에서 운동을 시작하면 인슐린과 근육 활동이 동시에 혈당을 낮춰 반응성 저혈당이 발생할 수 있고, 이로 인해 어지러움과 운동 수행능력 저하가 나타날 수 있습니다."],
  ["탄수화물 대사의 단점과 혈당 반응은?",
   "탄수화물은 빠른 에너지원이지만 과다 섭취 시 혈당이 급격히 상승하고, 이를 낮추기 위해 인슐린이 많이 분비됩니다. 간과 근육의 글리코겐 저장량을 초과한 에너지는 중성지방으로 전환되어 체지방으로 축적될 수 있습니다."],
  ["췌장 호르몬, 인슐린과 글루카곤의 역할은?",
   "인슐린은 식사 후 혈당이 높을 때 분비되어 혈액 속 포도당을 근육과 지방세포로 이동시켜 혈당을 낮춥니다. 글루카곤은 공복이나 운동 중 혈당이 낮을 때 분비되어 간에 저장된 글리코겐을 포도당으로 분해해 혈당을 높입니다."],
  ["지방을 에너지원으로 쓸 때 단점은?",
   "지방은 1g당 9kcal로 에너지 효율은 높지만, 분해 과정이 복잡하고 산소가 많이 필요합니다. 따라서 빠르고 폭발적인 고강도 무산소 운동에는 적합하지 않고, 주로 유산소 상태에서 에너지원으로 사용됩니다."],
  ["세컨드 윈드에 대해 설명하시오.",
   "세컨드 윈드는 운동 초반의 힘든 지점인 사점을 지나면 호흡과 순환이 안정되면서 운동이 더 편안하게 느껴지는 현상입니다."],
  ["스포츠 심장과 서맥이란?",
   "스포츠 심장은 운동으로 단련되어 1회 심박출량이 증가하고, 그 결과 심박수가 낮게 나타나는 심장을 말합니다. 운동성 서맥은 스포츠 심장의 특징 중 하나로 볼 수 있지만, 일반적인 서맥은 심장 기능 이상으로 충분한 혈액 공급이 어려워 어지럼증이나 피로가 나타날 수 있다는 차이가 있습니다."],
  ["심장 자극 전도계의 구성요소와 순서는?",
   "심장 자극 전도계는 동방결절, 방실결절, 히스속, 좌우각, 푸르킨예 섬유 순서로 전기 자극이 전달됩니다. 동방결절은 심장박동을 시작하는 페이스메이커 역할을 하고, 방실결절은 심방의 전기 신호를 심실로 전달하는 역할을 합니다."],
  ["심폐계와 심폐계의 기능에 대해 설명하시오.",
   "심폐계는 산소를 받아들이는 호흡계와 산소를 운반하는 심혈관계가 함께 작동하는 시스템입니다. 폐포에서 산소와 이산화탄소의 가스교환이 일어나고, 심장은 혈액을 통해 산소와 영양소를 전신 근육과 세포에 공급합니다. 또한 이산화탄소와 젖산 같은 노폐물을 회수해 배출을 돕습니다."],
  ["체순환과 폐순환이란?",
   "혈액순환은 폐순환과 체순환으로 나뉩니다. 폐순환은 우심실 → 폐동맥 → 폐 모세혈관 → 폐정맥 → 좌심방 순서로, 심장에서 폐로 혈액을 보내 산소를 공급받고 다시 심장으로 돌아오는 순환입니다. 체순환은 좌심실 → 대동맥 → 전신 모세혈관 → 대정맥 → 우심방 순서로, 전신 조직에 산소와 영양소를 공급하고 노폐물을 회수하는 순환입니다."],
  ["심박출량과 심박출량을 구하는 공식은?",
   "심박출량은 심장이 1분 동안 내보내는 혈액의 총량입니다. 공식은 심박출량 = 분당 심박수 × 1회 박출량이며, 운동 시 산소 요구량이 증가하면서 심박출량도 증가합니다."],
  ["분당 심박수 측정법은?",
   "분당 심박수는 손목의 요골동맥이나 목의 경동맥에서 검지와 중지를 이용해 측정합니다. 엄지는 자체 박동이 있어 사용하지 않습니다. 보통 10초 측정값 × 6 또는 15초 측정값 × 4로 계산하며, 안정 시에는 60초 전체를 측정하는 것이 좋습니다."],
  ["고지대 환경 운동 시 생리적 반응은?",
   "고지대에서는 산소가 부족한 저산소 환경이기 때문에 초기에는 호흡수와 심박수가 증가하여 산소 공급을 보상합니다. 적응이 진행되면 신장에서 EPO가 분비되어 적혈구 생성이 증가하고, 혈액의 산소 운반 능력이 향상됩니다. 이로 인해 평지로 돌아왔을 때 유산소성 지구력 향상에 도움이 될 수 있습니다."],
  ["저항성 운동 시 단백질 합성을 촉진하는 주요 호르몬은?",
   "저항성 운동 시 단백질 합성을 촉진하는 주요 호르몬은 테스토스테론, 성장호르몬, 인슐린입니다. 테스토스테론은 단백질 합성과 근육량 증가를 돕고, 성장호르몬은 근육과 뼈 성장 및 지방 분해에 관여합니다. 인슐린은 혈중 영양소를 근육세포로 운반하여 회복과 근합성을 돕습니다."],
  ["테스토스테론이란?",
   "테스토스테론은 대표적인 남성호르몬으로, 콜레스테롤을 기반으로 만들어지는 스테로이드계 호르몬입니다. 단백질 합성을 촉진하여 근육량과 근력을 증가시키고, 골격 발달과 체모 등 남성의 2차 성징 및 운동 후 회복에도 관여합니다."],
  ["여성호르몬, 에스트로겐에 대해 설명하시오.",
   "에스트로겐은 대표적인 여성호르몬으로 여성의 2차 성징 발현에 관여합니다. 또한 근육과 뼈의 생성에도 영향을 주며, 지방 축적과 체지방 분포에도 관여합니다."],
  ["부신수질과 부신피질에서 분비되는 대표적인 호르몬을 설명하시오.",
   "부신피질에서는 코티졸, 알도스테론, 성호르몬이 분비되어 대사 조절과 항상성 유지에 관여합니다. 부신수질에서는 에피네프린과 노르에피네프린이 분비되어 긴급상황이나 신체활동 시 심박수와 혈압을 높이고 교감신경 반응을 일으킵니다."],
  ["카테콜아민에 대해 설명하시오.",
   "카테콜아민은 부신수질에서 분비되는 호르몬이자 신경전달물질로, 에피네프린, 노르에피네프린, 도파민 등이 포함됩니다. 교감신경을 활성화하여 심박수와 혈압을 높이고, 간의 글리코겐 분해를 촉진해 혈당을 상승시킵니다."],
  ["에피네프린과 노르에피네프린에 대해 설명하시오.",
   "에피네프린은 심박수와 혈압을 증가시키고 기관지를 확장하여 급박한 상황에서 신체 반응을 높이는 호르몬입니다. 노르에피네프린은 주로 혈관을 수축시켜 혈압을 조절하고, 각성과 집중을 높이는 교감신경계 신경전달물질로 작용합니다."],
  ["코티졸(Cortisol)에 대해 설명하시오.",
   "코티졸은 부신피질에서 분비되는 스트레스 호르몬으로, 외부 스트레스에 대응하기 위해 혈압과 혈당을 높이는 역할을 합니다. 그러나 과도하게 분비되면 식욕 증가, 지방 축적, 고혈압, 불면증 등이 나타날 수 있습니다."],
  ["항상성이란?",
   "항상성은 외부 환경이 변해도 체온, 혈당, 혈압 등 인체 내부 상태를 일정하게 유지하려는 조절 작용입니다. 예를 들어 체온이 오르면 땀을 배출해 열을 낮추고, 혈당이 떨어지면 글루카곤을 분비해 간의 글리코겐을 분해하여 혈당을 유지합니다."],
  ["운동 중 수분을 섭취하는 이유는?",
   "운동 중 수분 섭취는 체온 조절, 혈액순환 유지, 근경련과 탈수 예방을 위해 필요합니다. 땀으로 손실된 수분과 전해질을 보충하여 근육에 산소와 영양소가 원활히 공급되도록 돕고, 운동 수행능력 저하를 막습니다."],
  ["수분이 인체에 어떤 역할을 하는가?",
   "수분은 인체의 약 60~70%를 차지하며 생명 유지에 필수적입니다. 영양소와 산소를 운반하고 노폐물을 배출하며, 땀을 통해 체온을 조절합니다. 또한 장기 보호, 관절 윤활, 소화·흡수·에너지 생성 같은 대사 작용에도 관여합니다."],
  ["크레아틴에 대해 설명하시오.",
   "크레아틴은 근육의 에너지 공급에 중요한 역할을 하는 물질로, ATP 생성을 도와 반복적이고 격렬한 운동 수행에 도움을 줍니다. 체내에서도 생성되지만 필요 시 보충제로 섭취하며, 순발력과 파워가 필요한 운동에 효과적입니다."],
  ["보디빌딩 선수들이 크레아틴을 섭취하는 이유는?",
   "보디빌딩 선수들은 근력과 파워 향상을 위해 크레아틴을 섭취합니다. 크레아틴은 근육 내 인산크레아틴 저장량을 늘려 ATP-PCr 시스템의 효율을 높이고, 근세포 내 수분 보유를 증가시켜 근육 부피가 커 보이는 효과도 있습니다."],
  ["필수 아미노산이란?",
   "필수 아미노산은 체내에서 합성되지 않거나 합성량이 부족해 반드시 음식이나 보충제로 섭취해야 하는 아미노산입니다. 대표적으로 BCAA인 류신, 이소류신, 발린이 있으며 근육 단백질 합성과 생리 기능 유지에 중요합니다."],
  ["BCAA란 무엇이며 어떤 효과가 있는가?",
   "BCAA는 분지사슬 아미노산으로, 필수 아미노산 중 류신, 이소류신, 발린을 말합니다. 근육에서 직접 대사되어 에너지 전환이 빠르고, 근육 단백질 합성 촉진, 근손실 방지, 운동 후 피로 회복에 도움을 줍니다."],
  ["필수 아미노산과 비필수 아미노산의 차이는?",
   "필수 아미노산은 체내에서 합성되지 않아 음식이나 보충제로 섭취해야 하는 아미노산이고, 비필수 아미노산은 체내에서 합성 가능한 아미노산입니다. 류신, 이소류신, 발린은 필수 아미노산이고, 글루타민과 아르기닌은 비필수 또는 조건부 필수 아미노산에 해당합니다."],
  ["공복 시 고강도 운동을 피해야 하는 이유는?",
   "공복 상태에서 고강도 운동을 하면 탄수화물이 부족해 근육 단백질이 분해되어 에너지로 사용될 수 있어 근손실 위험이 커집니다. 또한 혈당이 낮아져 어지러움, 저혈당 쇼크, 운동 수행능력 저하가 발생할 수 있습니다."],
  ["카보 로딩이란?",
   "카보 로딩은 탄수화물 로딩 또는 글리코겐 로딩이라고 하며, 시합 전 근육과 간의 글리코겐 저장량을 극대화하기 위한 식이 전략입니다. 고갈 단계와 저장 단계를 통해 무대 위에서 근육의 부피감과 펌핑감을 높이는 데 사용됩니다."],
  ["카페인의 효과와 적정 섭취량은?",
   "카페인은 중추신경을 흥분시키는 각성제로, 집중력 향상, 피로 지연, 지방 분해 촉진, 지구력 향상에 도움을 줄 수 있습니다. 건강한 성인 기준 하루 최대 400mg 이하가 권장되며, 과다 섭취 시 불면증, 불안, 심박수 증가, 이뇨 작용으로 인한 탈수 위험이 있습니다."],
  ["콜레스테롤, HDL과 LDL이란?",
   "콜레스테롤은 세포막과 호르몬의 재료가 되는 필수 지방질입니다. HDL은 혈관에 쌓인 콜레스테롤을 간으로 운반해 제거하는 좋은 콜레스테롤이고, LDL은 혈관벽에 콜레스테롤을 쌓이게 하여 동맥경화와 심혈관질환 위험을 높이는 나쁜 콜레스테롤입니다."],
  ["렙틴과 그렐린이란?",
   "렙틴은 지방세포에서 분비되는 포만감 호르몬으로 식욕을 억제합니다. 그렐린은 위장에서 분비되는 공복 호르몬으로 배고픔을 느끼게 하여 식욕을 촉진합니다."],
  ["알코올 섭취가 운동에 미치는 영향은?",
   "알코올은 테스토스테론 수치를 낮추고 단백질 합성을 방해하여 근성장을 저해할 수 있습니다. 또한 이뇨 작용으로 탈수를 유발해 컨디션과 운동 수행능력을 떨어뜨리고, 간이 알코올 해독을 우선하면서 지방 연소에도 부정적인 영향을 줍니다."],
  ["흡연이 운동에 미치는 영향은?",
   "흡연은 일산화탄소가 헤모글로빈과 결합해 산소 운반 능력을 떨어뜨리고, 니코틴이 심박수와 혈압을 높여 심혈관계에 부담을 줍니다. 또한 타르 등 유해물질이 폐 기능과 산소 교환 능력을 저하시켜 지구력과 운동 수행능력을 감소시킵니다."],
  ["에너지 부족 시 여성에게 발생할 수 있는 질환은?",
   "여성은 에너지 부족 상태가 지속되면 섭식장애, 무월경, 골다공증이 발생할 수 있습니다. 무리한 다이어트와 과도한 훈련으로 에너지 가용성이 낮아지면 호르몬 불균형이 생기고, 에스트로겐 감소로 골밀도가 떨어질 수 있습니다. 그 외 빈혈이나 탈모도 나타날 수 있습니다."],
  ["체력이란 무엇인가?",
   "체력은 인간이 생존하고 생활하며 신체활동을 수행하는 데 필요한 종합적인 능력입니다. 체력은 질병, 피로, 스트레스 등에 견디는 방위체력과 신체를 움직이고 운동을 수행하는 행동체력으로 나뉩니다. 행동체력은 다시 근력, 근지구력, 심폐지구력, 유연성 같은 건강체력과 순발력, 민첩성, 평형성, 협응성, 스피드 같은 운동체력으로 구분됩니다."],
  ["체력 검사의 목적과 필요성은?",
   "체력 검사는 현재 체력 수준을 객관적으로 파악하고 개인에게 맞는 운동 프로그램을 처방하기 위해 필요합니다. 또한 운동 전후 변화를 비교해 운동 효과를 평가하고, 건강상 위험 요소를 미리 확인하여 부상과 상해를 예방하며, 수치화된 변화를 통해 운동 동기를 높일 수 있습니다."],
  ["체질량지수, BMI와 구하는 공식은?",
   "BMI는 키와 몸무게를 이용해 비만도를 추정하는 지표입니다. 공식은 체중(kg) ÷ 신장(m)의 제곱이며, 일반적으로 BMI 25 이상은 비만으로 판단합니다. 다만 근육량과 체지방량을 구분하지 못하기 때문에 근육량이 많은 사람은 실제보다 비만으로 나올 수 있다는 한계가 있습니다."],
  ["카보넨 공식이란?",
   "카보넨 공식은 안정 시 심박수를 반영하여 개인에게 맞는 목표심박수를 계산하는 공식입니다. 공식은 목표심박수 = (최대심박수 - 안정시심박수) × 운동강도 + 안정시심박수이며, 유산소 운동 강도를 설정할 때 활용됩니다."],
  ["3대 영양소와 6대 영양소란?",
   "3대 영양소는 에너지를 생성하는 탄수화물, 지방, 단백질을 말합니다. 6대 영양소는 여기에 신체 기능 조절에 필요한 비타민, 무기질, 물을 더한 것입니다."],
  ["유산소/무산소 운동 시 사용 영양소 차이는?",
   "유산소 운동은 산소를 이용해 지방과 탄수화물을 에너지원으로 사용하며, 운동 시간이 길어질수록 지방 의존도가 높아집니다. 무산소 운동은 산소 없이 에너지를 만들기 때문에 빠르게 사용할 수 있는 탄수화물, 즉 글리코겐을 주로 사용합니다."],
  ["운동 후 영양 섭취 방법은?",
   "운동 후에는 근육 회복과 성장을 위해 단백질을 섭취하고, 고갈된 에너지 보충을 위해 탄수화물을 함께 섭취하는 것이 좋습니다. 또한 땀으로 손실된 수분과 전해질도 반드시 보충해야 합니다."],
  ["3대 영양소 ATP 대사 과정은?",
   "탄수화물은 포도당으로 분해되어 ATP를 생성하고, 지방은 유리지방산으로 분해된 후 많은 ATP를 생성합니다. 단백질은 주로 신체 구성 성분으로 사용되지만, 에너지가 부족할 때 아미노산으로 분해되어 에너지원으로 사용될 수 있습니다."],
  ["3대 영양소별 칼로리는?",
   "탄수화물과 단백질은 1g당 4kcal, 지방은 1g당 9kcal의 에너지를 냅니다."],
  ["웨이트 트레이닝 시 영양소 사용 순서는?",
   "웨이트 트레이닝은 짧은 시간에 강한 힘을 내야 하므로 저장된 탄수화물인 글리코겐을 먼저 사용합니다. 이후 탄수화물이 부족해지면 지방을 사용하고, 최후에는 단백질도 에너지원으로 사용될 수 있습니다."],
  ["운동 1시간 전 탄수화물 섭취 이유는?",
   "운동 전 탄수화물을 섭취하면 간과 근육에 글리코겐으로 저장되어 운동 중 사용할 에너지를 확보할 수 있습니다. 또한 운동 직전 섭취로 인한 위장 부담을 줄이기 위해 운동 약 1시간 전에 섭취하는 것이 좋습니다."],
  ["탄수화물의 저장과 사용은?",
   "탄수화물은 소화되어 글루코스가 되고, 간과 근육에 글리코겐 형태로 저장됩니다. 운동 시에는 저장된 글리코겐을 분해해 에너지로 사용하며, 저장 용량을 초과한 에너지는 지방으로 전환될 수 있습니다."],
  ["지방의 역할과 기능은?",
   "지방은 1g당 9kcal를 내는 고효율 에너지원이며, 유산소 운동 시 주요 에너지원으로 사용됩니다. 또한 장기를 보호하고 체온을 유지하며, 지용성 비타민의 흡수와 운반을 돕고 세포막을 구성합니다."],
  ["피하지방 vs 내장지방의 차이는?",
   "피하지방은 피부 바로 아래에 위치한 지방으로 체온 유지, 충격 흡수, 에너지 저장 역할을 합니다. 내장지방은 장기 주변에 위치해 장기를 보호하지만, 과다할 경우 당뇨와 심혈관질환 등 성인병 위험을 높입니다."],
  ["포화지방 vs 불포화지방에 대해 설명하시오.",
   "포화지방은 주로 동물성 식품에 많고 실온에서 고체이며, 과다 섭취 시 LDL 콜레스테롤 증가와 심혈관질환 위험을 높일 수 있습니다. 불포화지방은 식물성 기름, 견과류, 생선 등에 많고 실온에서 액체이며 혈관 건강에 도움을 줍니다."],
  ["필수 지방산이란?",
   "필수 지방산은 체내에서 합성되지 않아 반드시 음식으로 섭취해야 하는 지방산입니다. EPA, DHA 등이 있으며 세포막 구성, 생리 기능 유지, 신진대사에 관여합니다."],
  ["생리적으로 필요한 남녀 최소 지방 보유율은?",
   "생명 유지를 위한 최소 체지방률은 남성 약 5%, 여성 약 10%입니다. 여성은 호르몬과 생식 기능, 임신과 출산을 위해 남성보다 더 많은 지방이 필요합니다."],
  ["체지방과 제지방의 차이는?",
   "체지방은 몸속에 저장된 지방의 총량이고, 제지방은 체중에서 체지방을 제외한 근육, 수분, 뼈 등을 말합니다. 보디빌딩에서는 체지방을 줄이고 제지방, 특히 근육량을 늘리는 것이 중요합니다."],
  ["단백질의 정의와 기능은?",
   "단백질은 신체조직을 구성하고 효소와 호르몬의 재료가 되는 영양소입니다. 웨이트 트레이닝 후 손상된 근육의 회복과 성장에 필수적이며, 탄수화물과 지방이 부족할 때는 1g당 4kcal의 에너지원으로도 사용됩니다."],
  ["단백질 대사 회전이란?",
   "단백질 대사 회전은 체내 단백질이 계속 분해되고 다시 합성되는 과정입니다. 낡은 조직을 분해하고 새로운 조직을 만드는 재생 과정이며, 운동 후에는 단백질 섭취와 휴식을 통해 근육 회복과 성장을 돕습니다."],
  ["음의 질소 균형/음의 단백질이란?",
   "음의 질소 균형은 단백질 합성량보다 분해량이 더 많은 상태입니다. 단백질 섭취가 부족하거나 운동량이 과도할 때 발생하며, 지속되면 근손실로 이어질 수 있습니다."],
  ["단백질을 에너지원으로 과다 섭취 시 부작용은?",
   "단백질을 과다 섭취하면 소화 흡수가 느려져 소화장애나 변비가 생길 수 있고, 신장에 부담을 줄 수 있습니다. 특히 동물성 단백질을 많이 섭취하면 요산 증가로 요로결석 위험이 높아질 수 있습니다."],
  ["유청 단백질의 특징은?",
   "유청 단백질은 우유에서 치즈를 만들 때 나오는 유청에서 추출한 단백질입니다. 소화와 흡수가 빨라 운동 직후 근육에 아미노산을 빠르게 공급하는 데 좋습니다."],
  ["비타민의 효능과 필요성은?",
   "비타민은 에너지를 직접 내지는 않지만, 3대 영양소가 에너지로 쓰이도록 돕고 신진대사를 조절하는 역할을 합니다. 또한 면역력 강화, 항산화 작용, 피로 회복에 필요하며 결핍증 예방을 위해 음식으로 섭취해야 합니다."],
  ["비타민 종류, 수용성과 지용성에 대해 설명하시오.",
   "수용성 비타민은 B군과 C로 물에 녹고 과다 섭취 시 소변으로 배출되므로 매일 섭취가 필요합니다. 지용성 비타민은 A, D, E, K로 지방에 녹고 간이나 지방에 저장되기 때문에 과다 섭취 시 독성에 주의해야 합니다."],
  ["주요 비타민 결핍증은?",
   "비타민 A 결핍 시 야맹증과 안구건조증, B군 결핍 시 각기병·구내염·빈혈, C 결핍 시 괴혈병과 상처 회복 지연이 나타날 수 있습니다. 비타민 D 결핍 시 구루병·골다공증, E 결핍 시 근육 약화와 감각 이상, K 결핍 시 출혈 경향 증가와 지혈 지연이 나타날 수 있습니다."],
  ["음식물 섭취 시 소화기관별 작용은?",
   "음식물은 구강에서 저작작용과 아밀레이스에 의해 1차 소화가 시작되고, 식도는 연동운동으로 음식물을 위로 보냅니다. 위에서는 위산과 위액으로 음식물을 잘게 분해하고, 소장에서는 대부분의 영양소가 흡수됩니다. 대장에서는 수분을 흡수하고, 항문을 통해 소화되지 않은 찌꺼기를 배출합니다."],
  ["세컨드 윈드란?",
   "세컨드 윈드는 운동 초기에 나타나는 힘든 상태인 사점을 지나고 나서 호흡과 순환이 안정되며 운동이 갑자기 수월하게 느껴지는 현상입니다."],
  ["일일 에너지 소비 네 가지는?",
   "일일 에너지 소비는 기초대사량, 신체활동 에너지 소비량, 식이성 발열효과, 비운동성 활동열 생성으로 구성됩니다. 이 중 기초대사량이 가장 큰 비중을 차지합니다."],
  ["심폐계 기능이란?",
   "심폐계 기능은 심장과 폐가 협력하여 산소와 영양분을 조직에 공급하고, 이산화탄소와 노폐물을 제거하는 능력입니다. 운동 시 산소 운반 능력을 향상시켜 지구력 향상과 피로 회복에 중요한 역할을 합니다."],
  ["척추 안정화 심부근육이란?",
   "척추 안정화 심부근육은 코어근육이라고도 하며, 척추와 몸통의 안정성을 높이고 움직임 중 자세를 유지하는 역할을 합니다. 대표적으로 복횡근, 다열근, 척추기립근, 골반저근이 있습니다."],
  ["SNS에 회원의 비포애프터 사진을 공개할 때 주의사항은?",

const listEl = document.getElementById('list');
const progressEl = document.getElementById('progress');
let order = QA.map((_, i) => i);
let filter = 'all';

// 채점 결과 저장/복원 — 문항 "내용" 기준 키로 저장하여
// 문제 섞기·문항 추가/수정·브라우저 재접속에도 채점 상태가 유지됨
const STORE_KEY = 'bb_quiz_marks_v2';
function qhash(s) {
  let h = 5381;
  for (let i = 0; i < s.length; i++) h = ((h << 5) + h + s.charCodeAt(i)) | 0;
  return 'q' + (h >>> 0).toString(36);
}
const keyOf = (qi) => qhash(QA[qi][0]);

let marks = {};
try { marks = JSON.parse(localStorage.getItem(STORE_KEY)) || {}; } catch (e) { marks = {}; }
function saveMarks() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(marks)); } catch (e) {}
}

function passesFilter(qi) {
  const m = marks[keyOf(qi)];
  if (filter === 'all') return true;
  if (filter === 'unmarked') return !m;
  return m === filter; // 'correct' | 'incorrect'
}

function render() {
  listEl.innerHTML = '';
  let shown = 0;

  order.forEach((qi, displayIdx) => {
    if (!passesFilter(qi)) return;
    shown++;

    const [q, a] = QA[qi];
    const mark = marks[keyOf(qi)]; // undefined | 'correct' | 'incorrect'

    const card = document.createElement('div');
    card.className = 'card' + (mark ? ' ' + mark + ' seen' : '');

    const badgeChar = mark === 'correct' ? 'O' : (mark === 'incorrect' ? 'X' : '');

    const question = document.createElement('div');
    question.className = 'question';
    question.innerHTML =
      '<div class="num">' + (displayIdx + 1) + '</div>' +
      '<div class="q-text">' + q + '</div>' +
      '<div class="badge">' + badgeChar + '</div>' +
      '<div class="chevron">⌄</div>';

    const answer = document.createElement('div');
    answer.className = 'answer';

    // 정답 확인 버튼 (클릭 전까지 정답 숨김)
    const actions = document.createElement('div');
    actions.className = 'answer-actions';
    actions.innerHTML = '<button class="reveal-btn">정답 확인</button>';
    actions.querySelector('.reveal-btn').addEventListener('click', (e) => {
      e.stopPropagation(); reveal(card, answer);
    });
    answer.appendChild(actions);

    const inner = document.createElement('div');
    inner.className = 'answer-inner';
    inner.textContent = a;
    answer.appendChild(inner);

    const markBar = document.createElement('div');
    markBar.className = 'mark-bar';
    markBar.innerHTML =
      '<span class="label">채점:</span>' +
      '<button class="mark-btn correct-btn">⭕ 정답</button>' +
      '<button class="mark-btn incorrect-btn">❌ 오답</button>';
    markBar.querySelector('.correct-btn').addEventListener('click', (e) => {
      e.stopPropagation(); setMark(qi, 'correct');
    });
    markBar.querySelector('.incorrect-btn').addEventListener('click', (e) => {
      e.stopPropagation(); setMark(qi, 'incorrect');
    });
    answer.appendChild(markBar);

    question.addEventListener('click', () => toggle(card, answer));
    card.appendChild(question);
    card.appendChild(answer);
    listEl.appendChild(card);
  });

  if (shown === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty';
    empty.textContent = filter === 'incorrect'
      ? '오답으로 채점한 문제가 없습니다. 👍'
      : '해당하는 문제가 없습니다.';
    listEl.appendChild(empty);
  }

  updateProgress();
}

function setMark(qi, value) {
  const k = keyOf(qi);
  marks[k] = (marks[k] === value) ? undefined : value; // 같은 버튼 다시 누르면 채점 취소
  if (marks[k] === undefined) delete marks[k];
  saveMarks();
  render();
}

// 문항 클릭: 문제만 하이라이트(펼침). 정답은 아직 숨김.
function toggle(card, answer) {
  const willOpen = !card.classList.contains('open');

  // 다른 카드는 모두 접기 (한 번에 하나만 열림)
  document.querySelectorAll('.card.open').forEach(other => {
    if (other !== card) {
      other.classList.remove('open', 'revealed');
      other.querySelector('.answer').style.maxHeight = '0';
    }
  });

  card.classList.toggle('open', willOpen);
  if (!willOpen) card.classList.remove('revealed');
  card.classList.add('seen');
  answer.style.maxHeight = willOpen ? answer.scrollHeight + 'px' : '0';
  updateProgress();
}

// 정답 확인: 정답 텍스트와 채점 버튼 노출
function reveal(card, answer) {
  card.classList.add('open', 'seen', 'revealed');
  answer.style.maxHeight = answer.scrollHeight + 'px';
}

function setAll(open) {
  document.querySelectorAll('.card').forEach(card => {
    const answer = card.querySelector('.answer');
    card.classList.toggle('open', open);
    card.classList.toggle('revealed', open); // 전체 펼치기 = 정답까지 표시
    if (open) card.classList.add('seen');
    answer.style.maxHeight = open ? answer.scrollHeight + 'px' : '0';
  });
  updateProgress();
}

function updateProgress() {
  let correct = 0, incorrect = 0;
  QA.forEach((_, qi) => {
    const m = marks[keyOf(qi)];
    if (m === 'correct') correct++;
    else if (m === 'incorrect') incorrect++;
  });
  const graded = correct + incorrect;
  const unmarked = QA.length - graded;

  document.getElementById('cnt-all').textContent = QA.length;
  document.getElementById('cnt-unmarked').textContent = unmarked;
  document.getElementById('cnt-correct').textContent = correct;
  document.getElementById('cnt-incorrect').textContent = incorrect;

  progressEl.textContent = '채점 ' + graded + ' / ' + QA.length +
    '  ·  정답 ' + correct + ' · 오답 ' + incorrect;
}

function setFilter(f) {
  filter = f;
  document.querySelectorAll('.chip').forEach(c => {
    c.classList.toggle('active', c.dataset.filter === f);
  });
  render();
}

function shuffle() {
  for (let i = order.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [order[i], order[j]] = [order[j], order[i]];
  }
  render();
}

document.getElementById('expandAll').addEventListener('click', () => setAll(true));
document.getElementById('collapseAll').addEventListener('click', () => setAll(false));
document.getElementById('shuffle').addEventListener('click', shuffle);
document.getElementById('reset').addEventListener('click', () => { order = QA.map((_, i) => i); render(); });
document.getElementById('resetMarks').addEventListener('click', () => {
  if (confirm('모든 채점 결과를 초기화할까요?')) {
    marks = {}; saveMarks(); render();
  }
});
document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => setFilter(chip.dataset.filter));
});
document.getElementById('total').textContent = QA.length;

render();
</script>
</body>
</html>
