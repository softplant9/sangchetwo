<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>보디빌딩 지도자 시험 대비 자문자답</title>
<style>
  :root {
    --bg: #0f1419;
    --card: #1a212b;
    --card-hover: #212a36;
    --accent: #4ea1ff;
    --accent-soft: #1f3350;
    --q-color: #e8edf3;
    --a-color: #b8c4d0;
    --border: #2a333f;
    --answer-bg: #141b24;
    --done: #2e7d52;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Apple SD Gothic Neo", "Malgun Gothic", "맑은 고딕", system-ui, sans-serif;
    background: var(--bg);
    color: var(--q-color);
    line-height: 1.7;
    padding: 24px 16px 80px;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 780px; margin: 0 auto; }
  .hidden { display: none !important; }

  header {
    text-align: center;
    margin-bottom: 24px;
  }
  header h1 {
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 6px;
  }
  header p { color: #7b8794; font-size: 0.9rem; }
  .exam-cta {
    display: inline-flex; align-items: center; gap: 6px;
    margin-top: 14px;
    background: var(--accent); color: #06121f;
    font-weight: 700; font-size: 0.92rem;
    text-decoration: none;
    padding: 9px 20px; border-radius: 999px;
    transition: filter .15s;
  }
  .exam-cta:hover { filter: brightness(1.1); }

  .toolbar {
    position: sticky;
    top: 0;
    z-index: 10;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    background: rgba(15,20,25,0.92);
    backdrop-filter: blur(8px);
    padding: 12px 0 14px;
    margin-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .toolbar button {
    background: var(--card);
    color: var(--q-color);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 8px 16px;
    font-size: 0.85rem;
    cursor: pointer;
    transition: background .15s, border-color .15s;
    font-family: inherit;
  }
  .toolbar button:hover { background: var(--card-hover); border-color: var(--accent); }
  .toolbar select {
    background: var(--card);
    color: var(--q-color);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 8px 14px;
    font-size: 0.85rem;
    cursor: pointer;
    font-family: inherit;
    transition: border-color .15s;
  }
  .toolbar select:hover { border-color: var(--accent); }
  .toolbar select:focus { outline: none; border-color: var(--accent); }
  .toolbar .progress {
    align-self: center;
    color: #7b8794;
    font-size: 0.85rem;
    margin-left: 4px;
  }

  /* 로그인 / 로그아웃 (우측 상단, 작게) */
  .topbar {
    display: flex; justify-content: flex-end; align-items: center;
    min-height: 30px; margin-bottom: 6px;
  }
  .authbar { display: flex; flex-wrap: wrap; align-items: center; justify-content: flex-end; gap: 8px; }
  .auth-user { display: flex; align-items: center; gap: 8px; }
  .auth-btn {
    background: var(--card); color: var(--q-color); border: 1px solid var(--border);
    border-radius: 999px; padding: 5px 13px; font-size: 0.8rem; cursor: pointer;
    font-family: inherit; transition: all .12s; text-decoration: none; line-height: 1.4;
  }
  .auth-btn:hover { border-color: var(--accent); color: var(--accent); }
  .auth-btn.primary { background: var(--accent); color: #06121f; font-weight: 700; border-color: var(--accent); }
  .auth-btn.primary:hover { filter: brightness(1.08); color: #06121f; }
  .auth-status { color: #54d18c; font-size: 0.8rem; font-weight: 600; }
  .auth-msg { font-size: 0.75rem; color: #7b8794; }
  .auth-msg.error { color: #ff9a9a; }
  .auth-msg.ok { color: #54d18c; }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-bottom: 12px;
    overflow: hidden;
    transition: border-color .15s;
  }
  .card.open { border-color: var(--accent); }

  .question {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 18px 20px;
    cursor: pointer;
    user-select: none;
  }
  .question:hover { background: var(--card-hover); }
  .num {
    flex-shrink: 0;
    width: 30px; height: 30px;
    border-radius: 8px;
    background: #232f3d;
    color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem; font-weight: 700;
    margin-top: 1px;
  }
  .card.correct .num { background: #2e7d52; color: #fff; }
  .card.partial .num { background: #b8862b; color: #fff; }
  .card.incorrect .num { background: #9c3636; color: #fff; }
  .card.correct { border-color: #2e7d52; }
  .card.partial { border-color: #c79a3a; }
  .card.incorrect { border-color: #c14a4a; }
  .q-text {
    flex: 1;
    font-size: 1.02rem;
    font-weight: 600;
    color: var(--q-color);
  }
  .badge {
    flex-shrink: 0;
    font-weight: 800;
    font-size: 1.05rem;
    margin-top: 1px;
    width: 18px;
    text-align: center;
  }
  .card.correct .badge { color: #54d18c; }
  .card.partial .badge { color: #ffce6b; }
  .card.incorrect .badge { color: #ff7a7a; }
  /* 오답 전체 듣기 버튼 (툴바) — 재생 중 강조 */
  #playWrong.playing {
    background: #9c3636;
    border-color: #c14a4a;
    color: #fff;
    animation: speakpulse 1.1s ease-in-out infinite;
  }
  @keyframes speakpulse { 0%,100% { opacity: 1; } 50% { opacity: .55; } }
  /* 현재 읽고 있는 카드 강조 */
  .card.speaking-now { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(78,161,255,0.35); }
  .chevron {
    flex-shrink: 0;
    color: #6b7785;
    font-size: 1.1rem;
    transition: transform .2s;
    margin-top: 2px;
  }
  .card.open .chevron { transform: rotate(180deg); color: var(--accent); }
  /* 문항 클릭 시 문제 하이라이트 */
  .card.open .question { background: var(--accent-soft); }
  .card.open .q-text { color: var(--accent); }

  .answer {
    max-height: 0;
    overflow: hidden;
    transition: max-height .3s ease;
  }

  /* 정답 확인 버튼 영역 (정답은 클릭 전까지 숨김) */
  .answer-actions {
    padding: 8px 20px 18px 62px;
  }
  .reveal-btn {
    border: 1px solid var(--accent);
    background: var(--accent-soft);
    color: var(--accent);
    border-radius: 999px;
    padding: 9px 22px;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: all .12s;
  }
  .reveal-btn:hover { background: var(--accent); color: #06121f; }
  .card.revealed .answer-actions { display: none; }

  .answer-inner {
    display: none;
    padding: 4px 20px 20px 62px;
    color: var(--a-color);
    font-size: 0.98rem;
    border-top: 1px solid transparent;
  }
  .answer-inner::before {
    content: "A.";
    color: var(--accent);
    font-weight: 700;
    margin-right: 6px;
  }
  .card.revealed .answer-inner { display: block; }
  /* 답변 핵심 키워드 형광펜 강조 */
  .answer-inner .kw {
    background: linear-gradient(transparent 58%, rgba(255,221,87,0.42) 58%);
    color: #f3f6fa;
    font-weight: 600;
    padding: 0 1px;
    border-radius: 2px;
  }

  .mark-bar {
    display: none;
    gap: 10px;
    align-items: center;
    padding: 2px 20px 18px 62px;
  }
  .card.revealed .mark-bar { display: flex; }
  .mark-bar .label { color: #6b7785; font-size: 0.82rem; margin-right: 2px; }
  .mark-btn {
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--a-color);
    border-radius: 999px;
    padding: 6px 16px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: all .12s;
  }
  .mark-btn.correct-btn:hover { border-color: #54d18c; color: #54d18c; }
  .mark-btn.partial-btn:hover { border-color: #ffce6b; color: #ffce6b; }
  .mark-btn.incorrect-btn:hover { border-color: #ff7a7a; color: #ff7a7a; }
  .card.correct .mark-btn.correct-btn { background: #2e7d52; border-color: #2e7d52; color: #fff; }
  .card.partial .mark-btn.partial-btn { background: #b8862b; border-color: #b8862b; color: #fff; }
  .card.incorrect .mark-btn.incorrect-btn { background: #9c3636; border-color: #9c3636; color: #fff; }

  /* 필터 바 */
  .filterbar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    margin-bottom: 16px;
  }
  .chip {
    background: var(--card);
    color: var(--a-color);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 7px 16px;
    font-size: 0.85rem;
    cursor: pointer;
    font-family: inherit;
    transition: all .12s;
  }
  .chip:hover { border-color: var(--accent); }
  .chip.active { background: var(--accent); border-color: var(--accent); color: #06121f; font-weight: 700; }
  .chip .cnt { opacity: .7; font-weight: 700; }
  .chip.active .cnt { opacity: 1; }
  .chip.wrong.active { background: #c14a4a; border-color: #c14a4a; color: #fff; }
  .chip.maybe.active { background: #b8862b; border-color: #b8862b; color: #fff; }

  /* 검색 바 */
  .searchbar {
    display: flex;
    justify-content: center;
    margin-bottom: 12px;
  }
  .search-wrap {
    position: relative;
    width: 100%;
    max-width: 480px;
  }
  .search-icon {
    position: absolute;
    left: 15px; top: 50%;
    transform: translateY(-50%);
    color: #6b7785;
    font-size: 0.95rem;
    pointer-events: none;
  }
  .search-input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 999px;
    color: var(--q-color);
    font-family: inherit;
    font-size: 0.92rem;
    padding: 11px 40px 11px 40px;
    outline: none;
    transition: border-color .15s;
  }
  .search-input::placeholder { color: #5a6470; }
  .search-input:focus { border-color: var(--accent); }
  .search-clear {
    position: absolute;
    right: 8px; top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: #6b7785;
    font-size: 1rem;
    cursor: pointer;
    display: none;
    padding: 6px 9px;
    line-height: 1;
    font-family: inherit;
  }
  .search-clear:hover { color: var(--accent); }
  .search-wrap.has-text .search-clear { display: block; }
  mark {
    background: rgba(78,161,255,0.30);
    color: #d7e9ff;
    padding: 0 1px;
    border-radius: 3px;
  }

  .empty {
    text-align: center;
    color: #6b7785;
    padding: 50px 20px;
    font-size: 0.95rem;
  }

  footer { text-align: center; color: #5a6470; font-size: 0.8rem; margin-top: 30px; }

  @media (max-width: 600px) {
    body { padding: 16px 10px 70px; }
    header h1 { font-size: 1.25rem; }
    header p { font-size: 0.82rem; }

    .toolbar { gap: 6px; padding: 10px 0 12px; }
    .toolbar button { padding: 7px 12px; font-size: 0.8rem; }
    .toolbar .progress {
      flex-basis: 100%;
      text-align: center;
      margin-left: 0;
      margin-top: 2px;
    }

    .filterbar { gap: 6px; }
    .chip { padding: 6px 12px; font-size: 0.8rem; }

    .question { padding: 14px 14px; gap: 10px; }
    .num { width: 26px; height: 26px; font-size: 0.75rem; }
    .q-text { font-size: 0.95rem; }

    .answer-actions { padding: 6px 14px 14px 14px; }
    .answer-inner { padding: 4px 14px 16px 14px; font-size: 0.94rem; }
    .mark-bar { padding: 2px 14px 16px 14px; flex-wrap: wrap; }
    .mark-btn { padding: 8px 18px; font-size: 0.9rem; }
  }

  /* 큰 손가락 터치 대상 확보 */
  @media (hover: none) {
    .mark-btn { padding: 10px 20px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="authbar hidden" id="authbar">
      <span class="auth-msg" id="authMsg"></span>
      <a class="auth-btn primary" id="loginLink" href="login.html">로그인 / 가입</a>
      <span class="auth-user hidden" id="authUser">
        <span class="auth-status" id="authStatus"></span>
        <button class="auth-btn" id="logoutBtn">로그아웃</button>
      </span>
    </div>
  </div>
  <header>
    <h1>생체 2급 구술 면접 테스트</h1>
    <p>질문에 답한 뒤 클릭해 정답을 확인하고, 정답/오답을 채점하세요</p>
    <a class="exam-cta" href="exam.html">📝 실전 모의고사 (5문제 랜덤) →</a>
  </header>

  <div class="toolbar">
    <button id="expandAll">전체 펼치기</button>
    <button id="collapseAll">전체 접기</button>
    <button id="shuffle">문제 섞기</button>
    <button id="reset">순서 초기화</button>
    <button id="resetMarks">채점 초기화</button>
    <button id="playWrong">🔊 오답 듣기</button>
    <select id="ttsRate" title="재생 속도" aria-label="음성 재생 속도">
      <option value="1">1배속</option>
      <option value="1.5">1.5배속</option>
      <option value="2">2배속</option>
      <option value="2.5">2.5배속</option>
      <option value="3">3배속</option>
      <option value="3.5">3.5배속</option>
      <option value="4">4배속</option>
    </select>
    <span class="progress" id="progress"></span>
  </div>

  <div class="searchbar">
    <div class="search-wrap" id="searchWrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search" class="search-input" placeholder="키워드로 문항 검색 (예: 도핑, 골절, CPR)" autocomplete="off">
      <button class="search-clear" id="searchClear" aria-label="검색어 지우기">✕</button>
    </div>
  </div>

  <div class="filterbar">
    <button class="chip all active" data-filter="all">전체 <span class="cnt" id="cnt-all"></span></button>
    <button class="chip unmarked" data-filter="unmarked">미채점 <span class="cnt" id="cnt-unmarked"></span></button>
    <button class="chip correct" data-filter="correct">정답 <span class="cnt" id="cnt-correct"></span></button>
    <button class="chip maybe" data-filter="partial">헷갈림 <span class="cnt" id="cnt-partial"></span></button>
    <button class="chip wrong" data-filter="incorrect">오답만 <span class="cnt" id="cnt-incorrect"></span></button>
  </div>

  <div id="list"></div>

  <footer>총 <span id="total"></span>문항 · 채점 결과는 이 브라우저에 자동 저장됩니다</footer>
</div>

<script src="quiz-data.js"></script>
<script src="supabase-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
// QA 데이터는 quiz-data.js 에 정의됨 (공유)

const listEl = document.getElementById('list');
const progressEl = document.getElementById('progress');
let order = QA.map((_, i) => i);
let filter = 'all';
let searchTerm = ''; // 소문자 정규화된 검색어

function escapeHtml(s) {
  return s.replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
}
// 검색어와 일치하는 부분을 <mark>로 강조
function highlight(text) {
  if (!searchTerm) return escapeHtml(text);
  const lower = text.toLowerCase();
  let out = '', i = 0;
  while (i < text.length) {
    const idx = lower.indexOf(searchTerm, i);
    if (idx === -1) { out += escapeHtml(text.slice(i)); break; }
    out += escapeHtml(text.slice(i, idx));
    out += '<mark>' + escapeHtml(text.slice(idx, idx + searchTerm.length)) + '</mark>';
    i = idx + searchTerm.length;
  }
  return out;
}

// ── 답변 핵심 키워드 강조(형광펜) ─────────────────────────
// 각 문항의 질문·답변을 정밀 분석해 "구술 시험에서 반드시 말해야 하는
// 득점 키워드"만 사전 추출한 맵. 키는 질문 해시(qhash), 값은 답변 내 핵심어 배열.
// KW_MAP 데이터는 quiz-data.js 에 정의됨 (공유)
// 답변 텍스트를 HTML 이스케이프하고, 해당 문항의 핵심 키워드만 <span class="kw">로 강조
function keyize(answer, question) {
  const kws = KW_MAP[qhash(question)] || [];
  if (!kws.length) return escapeHtml(answer);
  const ranges = [];
  for (const kw of kws) {
    let from = 0, idx;
    while ((idx = answer.indexOf(kw, from)) !== -1) { ranges.push([idx, idx + kw.length]); from = idx + kw.length; }
  }
  if (!ranges.length) return escapeHtml(answer);
  ranges.sort((a, b) => a[0] - b[0] || b[1] - a[1]);
  const merged = [];
  let curEnd = -1;
  for (const [st, en] of ranges) {
    if (st >= curEnd) { merged.push([st, en]); curEnd = en; }
    else if (en > curEnd) { merged[merged.length - 1][1] = en; curEnd = en; }
  }
  let out = "", last = 0;
  for (const [st, en] of merged) {
    out += escapeHtml(answer.slice(last, st));
    out += "<span class=\"kw\">" + escapeHtml(answer.slice(st, en)) + "</span>";
    last = en;
  }
  out += escapeHtml(answer.slice(last));
  return out;
}

// 채점 결과 저장/복원 — 문항 "내용" 기준 키로 저장하여
// 문제 섞기·문항 추가/수정·브라우저 재접속에도 채점 상태가 유지됨
const STORE_KEY = 'bb_quiz_marks_v2';
function qhash(s) {
  let h = 5381;
  for (let i = 0; i < s.length; i++) h = ((h << 5) + h + s.charCodeAt(i)) | 0;
  return 'q' + (h >>> 0).toString(36);
}
const keyOf = (qi) => qhash(QA[qi][0]);

let marks = {};
try { marks = JSON.parse(localStorage.getItem(STORE_KEY)) || {}; } catch (e) { marks = {}; }
function saveMarks() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(marks)); } catch (e) {}
}

// 새로 추가된 문항(SEED_INCORRECT): 아직 채점 이력이 없으면 기본 '오답'으로 표시.
// 이미 채점한 문항은 건드리지 않으며, 로그인 시 이 시드값도 클라우드로 동기화됨.
if (typeof SEED_INCORRECT !== 'undefined') {
  let _seeded = false;
  SEED_INCORRECT.forEach(k => { if (!(k in marks)) { marks[k] = 'incorrect'; _seeded = true; } });
  if (_seeded) saveMarks();
}

// ── 오답 전체 음성 읽기(TTS) ────────────────────────────────
// 오답으로 채점한 모든 문항을 "문제 → 정답" 순서로 1.5배속으로 연속 재생.
// 같은 버튼을 다시 누르면 정지. 브라우저 내장 음성합성 사용(백엔드 불필요).
const TTS_RATE_KEY = 'bb_tts_rate';
let ttsRate = parseFloat(localStorage.getItem(TTS_RATE_KEY)) || 3;  // 기본 3배속, 사용자가 선택
let _ttsQueue = [];      // [{text, qkey}] 재생 항목
let _ttsIdx = 0;
let _ttsPlaying = false;
let _ttsKeepAlive = null;
let _ttsGen = 0;         // 재시작 시 이전 발화의 콜백 무시용

// 긴 답변은 문장/구두점 기준으로 잘게 나눠 재생(긴 단일 발화 중단 버그 회피)
function ttsChunks(text, max) {
  const out = [];
  let rest = (text || '').replace(/\s+/g, ' ').trim();
  while (rest.length > max) {
    const slice = rest.slice(0, max);
    let cut = Math.max(
      slice.lastIndexOf('. '), slice.lastIndexOf('? '), slice.lastIndexOf('! '),
      slice.lastIndexOf(', '), slice.lastIndexOf('·'), slice.lastIndexOf(' ')
    );
    cut = cut > max * 0.5 ? cut + 1 : max;
    out.push(rest.slice(0, cut).trim());
    rest = rest.slice(cut).trim();
  }
  if (rest) out.push(rest);
  return out;
}

function ttsHighlight(qkey) {
  document.querySelectorAll('.card.speaking-now').forEach(c => c.classList.remove('speaking-now'));
  if (!qkey) return;
  const card = listEl.querySelector('.card[data-qkey="' + qkey + '"]');
  if (card) {
    card.classList.add('speaking-now');
    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

function updatePlayBtn() {
  const btn = document.getElementById('playWrong');
  if (!btn) return;
  btn.textContent = _ttsPlaying ? '⏹ 듣기 정지' : '🔊 오답 듣기';
  btn.classList.toggle('playing', _ttsPlaying);
}

function stopTTS() {
  _ttsPlaying = false;
  _ttsGen++;
  _ttsQueue = [];
  _ttsIdx = 0;
  if (_ttsKeepAlive) { clearInterval(_ttsKeepAlive); _ttsKeepAlive = null; }
  try { window.speechSynthesis.cancel(); } catch (e) {}
  ttsHighlight(null);
  updatePlayBtn();
}

function speakNext() {
  if (!_ttsPlaying) return;
  if (_ttsIdx >= _ttsQueue.length) { stopTTS(); return; }
  const item = _ttsQueue[_ttsIdx++];
  ttsHighlight(item.qkey);
  const gen = _ttsGen;
  const u = new SpeechSynthesisUtterance(item.text);
  u.lang = 'ko-KR';
  u.rate = ttsRate;
  u.onend = () => { if (_ttsPlaying && gen === _ttsGen) speakNext(); };
  u.onerror = () => { if (_ttsPlaying && gen === _ttsGen) speakNext(); };
  window.speechSynthesis.speak(u);
}

function playAllWrong() {
  const synth = window.speechSynthesis;
  if (!synth || typeof SpeechSynthesisUtterance === 'undefined') {
    alert('이 브라우저는 음성 읽기를 지원하지 않습니다.');
    return;
  }
  if (_ttsPlaying) { stopTTS(); return; }
  // 현재 정렬 순서대로 오답 문항만 수집
  const wrong = [];
  order.forEach(qi => { if (marks[keyOf(qi)] === 'incorrect') wrong.push(qi); });
  if (!wrong.length) { alert('오답으로 채점한 문항이 없습니다.'); return; }

  _ttsQueue = [];
  wrong.forEach((qi, n) => {
    const [q, a] = QA[qi];
    const qkey = keyOf(qi);
    ttsChunks((n + 1) + '번 문제. ' + q, 170).forEach(t => _ttsQueue.push({ text: t, qkey }));
    ttsChunks('정답. ' + a, 170).forEach(t => _ttsQueue.push({ text: t, qkey }));
  });
  _ttsIdx = 0;
  _ttsPlaying = true;
  updatePlayBtn();
  // Chrome 장시간 재생 중단 방지용 keep-alive
  if (_ttsKeepAlive) clearInterval(_ttsKeepAlive);
  _ttsKeepAlive = setInterval(() => {
    if (_ttsPlaying && window.speechSynthesis.speaking) {
      window.speechSynthesis.pause(); window.speechSynthesis.resume();
    }
  }, 9000);
  speakNext();
}

// 페이지를 떠날 때 읽기 정지
window.addEventListener('beforeunload', () => { try { window.speechSynthesis.cancel(); } catch (e) {} });

function passesFilter(qi) {
  const m = marks[keyOf(qi)];
  // 채점 상태 필터
  let ok;
  if (filter === 'all') ok = true;
  else if (filter === 'unmarked') ok = !m;
  else ok = (m === filter); // 'correct' | 'partial' | 'incorrect'
  if (!ok) return false;
  // 검색어 필터 (질문지에서만 검색, 정답 본문은 제외)
  if (searchTerm) {
    if (!QA[qi][0].toLowerCase().includes(searchTerm)) return false;
  }
  return true;
}

function render() {
  // 재렌더 시 진행 중인 음성 읽기 정지(카드 DOM이 교체되므로)
  if (_ttsPlaying) stopTTS();
  listEl.innerHTML = '';
  let shown = 0;

  order.forEach((qi, displayIdx) => {
    if (!passesFilter(qi)) return;
    shown++;

    const [q, a] = QA[qi];
    const mark = marks[keyOf(qi)]; // undefined | 'correct' | 'partial' | 'incorrect'

    const card = document.createElement('div');
    card.className = 'card' + (mark ? ' ' + mark + ' seen' : '');

    const badgeChar = mark === 'correct' ? 'O' : (mark === 'incorrect' ? 'X' : (mark === 'partial' ? '△' : ''));

    const question = document.createElement('div');
    question.className = 'question';
    question.innerHTML =
      '<div class="num">' + (displayIdx + 1) + '</div>' +
      '<div class="q-text">' + highlight(q) + '</div>' +
      '<div class="badge">' + badgeChar + '</div>' +
      '<div class="chevron">⌄</div>';
    card.dataset.qkey = keyOf(qi); // 음성 재생 시 현재 카드 강조용

    const answer = document.createElement('div');
    answer.className = 'answer';

    // 정답 확인 버튼 (클릭 전까지 정답 숨김)
    const actions = document.createElement('div');
    actions.className = 'answer-actions';
    actions.innerHTML = '<button class="reveal-btn">정답 확인</button>';
    actions.querySelector('.reveal-btn').addEventListener('click', (e) => {
      e.stopPropagation(); reveal(card, answer);
    });
    answer.appendChild(actions);

    const inner = document.createElement('div');
    inner.className = 'answer-inner';
    inner.innerHTML = keyize(a, q);
    answer.appendChild(inner);

    const markBar = document.createElement('div');
    markBar.className = 'mark-bar';
    markBar.innerHTML =
      '<span class="label">채점:</span>' +
      '<button class="mark-btn correct-btn">⭕ 정답</button>' +
      '<button class="mark-btn partial-btn">🔺 헷갈림</button>' +
      '<button class="mark-btn incorrect-btn">❌ 오답</button>';
    markBar.querySelector('.correct-btn').addEventListener('click', (e) => {
      e.stopPropagation(); setMark(qi, 'correct');
    });
    markBar.querySelector('.partial-btn').addEventListener('click', (e) => {
      e.stopPropagation(); setMark(qi, 'partial');
    });
    markBar.querySelector('.incorrect-btn').addEventListener('click', (e) => {
      e.stopPropagation(); setMark(qi, 'incorrect');
    });
    answer.appendChild(markBar);

    question.addEventListener('click', () => toggle(card, answer));
    card.appendChild(question);
    card.appendChild(answer);
    listEl.appendChild(card);
  });

  if (shown === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty';
    empty.textContent = searchTerm
      ? '"' + searchInput.value.trim() + '" 검색 결과가 없습니다.'
      : (filter === 'incorrect'
        ? '오답으로 채점한 문제가 없습니다. 👍'
        : '해당하는 문제가 없습니다.');
    listEl.appendChild(empty);
  }

  updateProgress();
}

function setMark(qi, value) {
  const k = keyOf(qi);
  marks[k] = (marks[k] === value) ? undefined : value; // 같은 버튼 다시 누르면 채점 취소
  const newVal = marks[k];
  if (marks[k] === undefined) delete marks[k];
  saveMarks();
  cloudUpsert(k, newVal); // 로그인 상태면 클라우드에도 반영
  render();
}

// 문항 클릭: 문제만 하이라이트(펼침). 정답은 아직 숨김.
function toggle(card, answer) {
  const willOpen = !card.classList.contains('open');

  // 다른 카드는 모두 접기 (한 번에 하나만 열림)
  document.querySelectorAll('.card.open').forEach(other => {
    if (other !== card) {
      other.classList.remove('open', 'revealed');
      other.querySelector('.answer').style.maxHeight = '0';
    }
  });

  card.classList.toggle('open', willOpen);
  if (!willOpen) card.classList.remove('revealed');
  card.classList.add('seen');
  answer.style.maxHeight = willOpen ? answer.scrollHeight + 'px' : '0';
  updateProgress();
}

// 정답 확인: 정답 텍스트와 채점 버튼 노출
function reveal(card, answer) {
  card.classList.add('open', 'seen', 'revealed');
  answer.style.maxHeight = answer.scrollHeight + 'px';
}

function setAll(open) {
  document.querySelectorAll('.card').forEach(card => {
    const answer = card.querySelector('.answer');
    card.classList.toggle('open', open);
    card.classList.toggle('revealed', open); // 전체 펼치기 = 정답까지 표시
    if (open) card.classList.add('seen');
    answer.style.maxHeight = open ? answer.scrollHeight + 'px' : '0';
  });
  updateProgress();
}

function updateProgress() {
  let correct = 0, partial = 0, incorrect = 0;
  QA.forEach((_, qi) => {
    const m = marks[keyOf(qi)];
    if (m === 'correct') correct++;
    else if (m === 'partial') partial++;
    else if (m === 'incorrect') incorrect++;
  });
  const graded = correct + partial + incorrect;
  const unmarked = QA.length - graded;

  document.getElementById('cnt-all').textContent = QA.length;
  document.getElementById('cnt-unmarked').textContent = unmarked;
  document.getElementById('cnt-correct').textContent = correct;
  document.getElementById('cnt-partial').textContent = partial;
  document.getElementById('cnt-incorrect').textContent = incorrect;

  progressEl.textContent = '채점 ' + graded + ' / ' + QA.length +
    '  ·  정답 ' + correct + ' · 헷갈림 ' + partial + ' · 오답 ' + incorrect;
}

function setFilter(f) {
  filter = f;
  document.querySelectorAll('.chip').forEach(c => {
    c.classList.toggle('active', c.dataset.filter === f);
  });
  render();
}

function shuffle() {
  for (let i = order.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [order[i], order[j]] = [order[j], order[i]];
  }
  render();
}

document.getElementById('expandAll').addEventListener('click', () => setAll(true));
document.getElementById('collapseAll').addEventListener('click', () => setAll(false));
document.getElementById('shuffle').addEventListener('click', shuffle);
document.getElementById('reset').addEventListener('click', () => { order = QA.map((_, i) => i); render(); });
document.getElementById('resetMarks').addEventListener('click', () => {
  if (confirm('모든 채점 결과를 초기화할까요?')) {
    marks = {}; saveMarks(); cloudClearAll(); render();
  }
});
document.getElementById('playWrong').addEventListener('click', playAllWrong);
const ttsRateSel = document.getElementById('ttsRate');
ttsRateSel.value = String(ttsRate); // 저장된 배속 복원
ttsRateSel.addEventListener('change', () => {
  ttsRate = parseFloat(ttsRateSel.value) || 1;
  try { localStorage.setItem(TTS_RATE_KEY, String(ttsRate)); } catch (e) {}
  // 재생 중이면 새 배속으로 현재 위치부터 즉시 다시 재생
  if (_ttsPlaying) {
    _ttsGen++;                              // 이전 발화 콜백 무효화
    _ttsIdx = Math.max(0, _ttsIdx - 1);     // 방금 읽던 항목부터
    try { window.speechSynthesis.cancel(); } catch (e) {}
    speakNext();
  }
});
document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => setFilter(chip.dataset.filter));
});

const searchInput = document.getElementById('search');
const searchWrap = document.getElementById('searchWrap');
searchInput.addEventListener('input', () => {
  searchTerm = searchInput.value.trim().toLowerCase();
  searchWrap.classList.toggle('has-text', searchInput.value.length > 0);
  render();
});
searchInput.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') { searchInput.value = ''; searchTerm = ''; searchWrap.classList.remove('has-text'); render(); }
});
document.getElementById('searchClear').addEventListener('click', () => {
  searchInput.value = '';
  searchTerm = '';
  searchWrap.classList.remove('has-text');
  searchInput.focus();
  render();
});

document.getElementById('total').textContent = QA.length;

render();

// ── 클라우드 동기화 (Supabase) ──────────────────────────────
// 로그인하면 채점(정답/헷갈림/오답) 기록이 계정에 저장되어
// 다른 브라우저·기기에서도 그대로 이어집니다.
// 미설정(supabase-config.js 비어있음) 시에는 기존처럼 이 브라우저에만 저장.
let sb = null, sbUser = null, sbSyncing = false;
const sbConfigured = !!(window.SUPABASE_URL && window.SUPABASE_ANON_KEY
  && /^https?:\/\//.test(window.SUPABASE_URL)
  && !/YOUR_/.test(window.SUPABASE_URL) && !/YOUR_/.test(window.SUPABASE_ANON_KEY));

const authbar = document.getElementById('authbar');
const loginLink = document.getElementById('loginLink');
const authUserEl = document.getElementById('authUser');
const authStatus = document.getElementById('authStatus');
const authMsg = document.getElementById('authMsg');
const footerEl = document.querySelector('footer');

let _authMsgTimer = null;
function setAuthMsg(text, kind) {
  authMsg.textContent = text || '';
  authMsg.className = 'auth-msg' + (kind ? ' ' + kind : '');
  if (_authMsgTimer) { clearTimeout(_authMsgTimer); _authMsgTimer = null; }
  // 오류가 아닌 상태 메시지는 잠시 뒤 자동으로 사라짐(일반적인 토스트 동작)
  if (text && kind !== 'error') {
    _authMsgTimer = setTimeout(() => { authMsg.textContent = ''; authMsg.className = 'auth-msg'; }, 3500);
  }
}

function updateAuthUI() {
  if (!sbConfigured) { authbar.classList.add('hidden'); return; }
  authbar.classList.remove('hidden');
  const inUser = !!sbUser;
  loginLink.classList.toggle('hidden', inUser);
  authUserEl.classList.toggle('hidden', !inUser);
  if (inUser) authStatus.textContent = '☁️ ' + sbUser.email;
  if (footerEl) {
    footerEl.innerHTML = inUser
      ? '총 ' + QA.length + '문항 · ☁️ 클라우드 동기화 중 — 어느 기기에서든 같은 계정으로 이어집니다'
      : '총 ' + QA.length + '문항 · 로그인하면 다른 기기에서도 채점 기록이 이어집니다';
  }
}

async function syncFromCloud() {
  if (!sb || !sbUser || sbSyncing) return;
  sbSyncing = true;
  setAuthMsg('동기화 중...');
  try {
    const { data, error } = await sb.from('quiz_marks').select('qhash, mark');
    if (error) throw error;
    const cloud = {};
    (data || []).forEach(r => { cloud[r.qhash] = r.mark; });
    // 로컬에만 있고 클라우드엔 없는 채점은 업로드(최초 로그인 시 기존 기록 보존)
    const toPush = [];
    for (const k in marks) {
      if (!(k in cloud)) { cloud[k] = marks[k]; toPush.push({ user_id: sbUser.id, qhash: k, mark: marks[k] }); }
    }
    if (toPush.length) await sb.from('quiz_marks').upsert(toPush, { onConflict: 'user_id,qhash' });
    marks = cloud;
    saveMarks();
    render();
    setAuthMsg('동기화 완료 · 채점 ' + Object.keys(marks).length + '개', 'ok');
  } catch (e) {
    setAuthMsg('동기화 오류: ' + (e.message || e), 'error');
  } finally {
    sbSyncing = false;
  }
}

async function cloudUpsert(k, value) {
  if (!sb || !sbUser) return;
  try {
    if (value === undefined) {
      await sb.from('quiz_marks').delete().eq('user_id', sbUser.id).eq('qhash', k);
    } else {
      await sb.from('quiz_marks').upsert(
        { user_id: sbUser.id, qhash: k, mark: value, updated_at: new Date().toISOString() },
        { onConflict: 'user_id,qhash' });
    }
  } catch (e) { setAuthMsg('저장 오류: ' + (e.message || e), 'error'); }
}

async function cloudClearAll() {
  if (!sb || !sbUser) return;
  try { await sb.from('quiz_marks').delete().eq('user_id', sbUser.id); } catch (e) {}
}

if (sbConfigured && window.supabase) {
  sb = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
  sb.auth.onAuthStateChange((_event, session) => {
    sbUser = session ? session.user : null;
    updateAuthUI();
    if (sbUser) syncFromCloud();
  });

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await sb.auth.signOut();
    // 다른 계정과 섞이지 않도록 이 브라우저의 캐시 채점을 비우고 로그인 페이지로 이동
    marks = {}; saveMarks();
    location.href = 'login.html';
  });
} else if (sbConfigured && !window.supabase) {
  authbar.classList.remove('hidden');
  setAuthMsg('동기화 라이브러리를 불러오지 못했습니다. 네트워크 확인 후 새로고침하세요.', 'error');
} else {
  updateAuthUI(); // 미설정: 로그인 바 숨김 (로컬 저장만 사용)
}
</script>
