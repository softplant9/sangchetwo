<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>보디빌딩 지도자 시험 대비 자문자답</title>
<style>
  :root {
    --bg: #0f1419;
    --card: #1a212b;
    --card-hover: #212a36;
    --accent: #4ea1ff;
    --accent-soft: #1f3350;
    --q-color: #e8edf3;
    --a-color: #b8c4d0;
    --border: #2a333f;
    --answer-bg: #141b24;
    --done: #2e7d52;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Apple SD Gothic Neo", "Malgun Gothic", "맑은 고딕", system-ui, sans-serif;
    background: var(--bg);
    color: var(--q-color);
    line-height: 1.7;
    padding: 24px 16px 80px;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 780px; margin: 0 auto; }

  header {
    text-align: center;
    margin-bottom: 24px;
  }
  header h1 {
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 6px;
  }
  header p { color: #7b8794; font-size: 0.9rem; }

  .toolbar {
    position: sticky;
    top: 0;
    z-index: 10;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    background: rgba(15,20,25,0.92);
    backdrop-filter: blur(8px);
    padding: 12px 0 14px;
    margin-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .toolbar button {
    background: var(--card);
    color: var(--q-color);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 8px 16px;
    font-size: 0.85rem;
    cursor: pointer;
    transition: background .15s, border-color .15s;
    font-family: inherit;
  }
  .toolbar button:hover { background: var(--card-hover); border-color: var(--accent); }
  .toolbar .progress {
    align-self: center;
    color: #7b8794;
    font-size: 0.85rem;
    margin-left: 4px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-bottom: 12px;
    overflow: hidden;
    transition: border-color .15s;
  }
  .card.open { border-color: var(--accent); }

  .question {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 18px 20px;
    cursor: pointer;
    user-select: none;
  }
  .question:hover { background: var(--card-hover); }
  .num {
    flex-shrink: 0;
    width: 30px; height: 30px;
    border-radius: 8px;
    background: #232f3d;
    color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem; font-weight: 700;
    margin-top: 1px;
  }
  .card.correct .num { background: #2e7d52; color: #fff; }
  .card.incorrect .num { background: #9c3636; color: #fff; }
  .card.correct { border-color: #2e7d52; }
  .card.incorrect { border-color: #c14a4a; }
  .q-text {
    flex: 1;
    font-size: 1.02rem;
    font-weight: 600;
    color: var(--q-color);
  }
  .badge {
    flex-shrink: 0;
    font-weight: 800;
    font-size: 1.05rem;
    margin-top: 1px;
    width: 18px;
    text-align: center;
  }
  .card.correct .badge { color: #54d18c; }
  .card.incorrect .badge { color: #ff7a7a; }
  .chevron {
    flex-shrink: 0;
    color: #6b7785;
    font-size: 1.1rem;
    transition: transform .2s;
    margin-top: 2px;
  }
  .card.open .chevron { transform: rotate(180deg); color: var(--accent); }

  .answer {
    max-height: 0;
    overflow: hidden;
    transition: max-height .3s ease;
  }
  .answer-inner {
    padding: 4px 20px 20px 62px;
    color: var(--a-color);
    font-size: 0.98rem;
    border-top: 1px solid transparent;
  }
  .answer-inner::before {
    content: "A.";
    color: var(--accent);
    font-weight: 700;
    margin-right: 6px;
  }

  .mark-bar {
    display: flex;
    gap: 10px;
    align-items: center;
    padding: 2px 20px 18px 62px;
  }
  .mark-bar .label { color: #6b7785; font-size: 0.82rem; margin-right: 2px; }
  .mark-btn {
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--a-color);
    border-radius: 999px;
    padding: 6px 16px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: all .12s;
  }
  .mark-btn.correct-btn:hover { border-color: #54d18c; color: #54d18c; }
  .mark-btn.incorrect-btn:hover { border-color: #ff7a7a; color: #ff7a7a; }
  .card.correct .mark-btn.correct-btn { background: #2e7d52; border-color: #2e7d52; color: #fff; }
  .card.incorrect .mark-btn.incorrect-btn { background: #9c3636; border-color: #9c3636; color: #fff; }

  /* 필터 바 */
  .filterbar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    margin-bottom: 16px;
  }
  .chip {
    background: var(--card);
    color: var(--a-color);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 7px 16px;
    font-size: 0.85rem;
    cursor: pointer;
    font-family: inherit;
    transition: all .12s;
  }
  .chip:hover { border-color: var(--accent); }
  .chip.active { background: var(--accent); border-color: var(--accent); color: #06121f; font-weight: 700; }
  .chip .cnt { opacity: .7; font-weight: 700; }
  .chip.active .cnt { opacity: 1; }
  .chip.wrong.active { background: #c14a4a; border-color: #c14a4a; color: #fff; }

  .empty {
    text-align: center;
    color: #6b7785;
    padding: 50px 20px;
    font-size: 0.95rem;
  }

  footer { text-align: center; color: #5a6470; font-size: 0.8rem; margin-top: 30px; }

  @media (max-width: 600px) {
    body { padding: 16px 10px 70px; }
    header h1 { font-size: 1.25rem; }
    header p { font-size: 0.82rem; }

    .toolbar { gap: 6px; padding: 10px 0 12px; }
    .toolbar button { padding: 7px 12px; font-size: 0.8rem; }
    .toolbar .progress {
      flex-basis: 100%;
      text-align: center;
      margin-left: 0;
      margin-top: 2px;
    }

    .filterbar { gap: 6px; }
    .chip { padding: 6px 12px; font-size: 0.8rem; }

    .question { padding: 14px 14px; gap: 10px; }
    .num { width: 26px; height: 26px; font-size: 0.75rem; }
    .q-text { font-size: 0.95rem; }

    .answer-inner { padding: 4px 14px 16px 14px; font-size: 0.94rem; }
    .mark-bar { padding: 2px 14px 16px 14px; flex-wrap: wrap; }
    .mark-btn { padding: 8px 18px; font-size: 0.9rem; }
  }

  /* 큰 손가락 터치 대상 확보 */
  @media (hover: none) {
    .mark-btn { padding: 10px 20px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>생체 2급 구술 면접 테스트</h1>
    <p>질문에 답한 뒤 클릭해 정답을 확인하고, 정답/오답을 채점하세요</p>
  </header>

  <div class="toolbar">
    <button id="expandAll">전체 펼치기</button>
    <button id="collapseAll">전체 접기</button>
    <button id="shuffle">문제 섞기</button>
    <button id="reset">순서 초기화</button>
    <button id="resetMarks">채점 초기화</button>
    <span class="progress" id="progress"></span>
  </div>

  <div class="filterbar">
    <button class="chip all active" data-filter="all">전체 <span class="cnt" id="cnt-all"></span></button>
    <button class="chip unmarked" data-filter="unmarked">미채점 <span class="cnt" id="cnt-unmarked"></span></button>
    <button class="chip correct" data-filter="correct">정답 <span class="cnt" id="cnt-correct"></span></button>
    <button class="chip wrong" data-filter="incorrect">오답만 <span class="cnt" id="cnt-incorrect"></span></button>
  </div>

  <div id="list"></div>

  <footer>총 <span id="total"></span>문항 · 채점 결과는 이 브라우저에 자동 저장됩니다</footer>
</div>

<script>
const QA = [
  ["여자 피지크 규정포즈 4가지는?",
   "여자 피지크 규정포즈 4가지는 프런트 더블 바이셉스, 사이드 체스트, 백 더블 바이셉스, 사이드 트라이셉스입니다."],
  ["클래식 보디빌딩 규정포즈 7가지는?",
   "클래식 보디빌딩 규정포즈 7가지는 프런트 더블 바이셉스, 프런트 랫 스프레드, 사이드 체스트, 백 더블 바이셉스, 백 랫 스프레드, 사이드 트라이셉스, 앱도미널 앤 타이입니다."],
  ["경기장 규격에 대해 설명하시오.",
   "보디빌딩 경기장의 무대 높이는 약 80~100cm, 무대 폭은 16~24m, 무대 깊이는 6~8m가 적당합니다. 선수의 근육이 잘 드러날 수 있는 조명을 사용하고, 심판이 선수를 충분히 관찰할 수 있는 거리를 확보해야 합니다. 무대 배경은 근육이 돋보이도록 검정색이나 짙은 파란색의 무광 배경을 사용하는 것이 좋습니다."],

  ["운동 중 과호흡의 생리적 반응은?",
   "운동 중 과호흡이 발생하면 이산화탄소가 과도하게 배출되어 혈중 이산화탄소 농도가 낮아지고, 호흡성 알칼리증이 나타날 수 있습니다. 이로 인해 혈관 수축, 뇌혈류 감소, 어지러움, 근육경련, 전해질 불균형 등이 발생할 수 있습니다."],
  ["건강체력 5가지와 운동체력 6가지는?",
   "건강체력은 근력, 근지구력, 유연성, 심폐지구력, 신체조성입니다. 운동체력은 순발력, 민첩성, 평형성, 협응성, 스피드, 반응시간입니다."],
  ["ATP 합성 중 지질 대사 과정은?",
   "지질은 중성지방이 유리지방산과 글리세롤로 분해된 뒤, 유리지방산이 베타산화를 거쳐 미토콘드리아에서 대량의 ATP를 생성합니다."],
  ["세컨드 윈드란?",
   "세컨드 윈드는 운동 초기에 나타나는 힘든 상태인 사점을 지나고 나서 호흡과 순환이 안정되며 운동이 갑자기 수월하게 느껴지는 현상입니다."],
  ["일일 에너지 소비 네 가지는?",
   "일일 에너지 소비는 기초대사량, 신체활동 에너지 소비량, 식이성 발열효과, 비운동성 활동열 생성으로 구성됩니다. 이 중 기초대사량이 가장 큰 비중을 차지합니다."],
  ["심폐계 기능이란?",
   "심폐계 기능은 심장과 폐가 협력하여 산소와 영양분을 조직에 공급하고, 이산화탄소와 노폐물을 제거하는 능력입니다. 운동 시 산소 운반 능력을 향상시켜 지구력 향상과 피로 회복에 중요한 역할을 합니다."],

  ["해부학적 자세와 일반 자세의 차이는?",
   "해부학적 자세는 똑바로 선 상태에서 손바닥이 정면을 향하고 팔의 뼈가 평행한 기준 자세입니다. 일반 자세와의 핵심 차이는 손바닥 방향과 팔뼈 배열이며, 인체 부위와 움직임을 설명하는 국제 표준 기준 자세로 사용됩니다."],
  ["족배굴곡과 족저굴곡 시 사용되는 근육과 움직이는 뼈는?",
   "족배굴곡은 발등이 정강이 쪽으로 올라가는 움직임으로 전경골근, 장무지신근, 장지신근이 주로 사용됩니다. 족저굴곡은 발끝이 아래로 향하는 움직임으로 비복근과 가자미근이 주로 사용됩니다. 발목 움직임에는 주로 경골, 비골, 거골이 관여합니다."],
  ["흉쇄유돌근에 대해 설명하시오.",
   "흉쇄유돌근은 흉골과 쇄골에서 시작하여 측두골의 유양돌기에 붙는 목 근육입니다. 양쪽이 함께 수축하면 목을 굽히고, 한쪽만 수축하면 같은 쪽으로 측굴하고 반대쪽으로 회전시키는 기능을 합니다."],
  ["척추 안정화 심부근육이란?",
   "척추 안정화 심부근육은 코어근육이라고도 하며, 척추와 몸통의 안정성을 높이고 움직임 중 자세를 유지하는 역할을 합니다. 대표적으로 복횡근, 다열근, 척추기립근, 골반저근이 있습니다."],
  ["광배근 운동 4가지는?",
   "광배근 운동에는 랫풀다운, 풀업, 벤트오버 바벨 로우, 원암 덤벨 로우가 있습니다."],
  ["덤벨 운동과 바벨 운동의 차이는?",
   "바벨 운동은 양손이 하나의 바에 고정되어 있어 고중량 훈련과 전신 협응력 향상에 유리합니다. 덤벨 운동은 양손이 독립적으로 움직이기 때문에 좌우 균형을 맞추고, 목표 근육 고립과 가동범위 확보에 유리합니다. 핵심 차이는 하중 연결 방식과 궤적의 자유도입니다."],
  ["운동 시 타깃 근육 외에 다른 근육도 함께 동원되는 이유는?",
   "인체의 움직임은 여러 근육이 협응하여 이루어지기 때문에 타깃 근육 외에도 협력근과 안정근이 함께 동원됩니다. 협력근은 움직임을 보조하고, 안정근은 관절과 자세를 안정화하여 안전하고 효율적인 움직임을 만듭니다."],

  ["비타민 B6, 피리독신의 역할은?",
   "비타민 B6는 단백질과 아미노산 대사를 돕고, 신경전달물질 생성에 관여합니다. 또한 혈관 건강 유지와 에너지 대사에도 중요한 역할을 합니다."],
  ["스포츠 보충제의 위험성은?",
   "스포츠 보충제의 위험성은 생리적 위험과 도핑 위험으로 나눌 수 있습니다. 생리적으로는 간과 신장 부담, 소화불량, 통풍 등을 유발할 수 있고, 비인증 제품에는 합성 스테로이드 등 금지 성분이 오염되어 의도치 않은 도핑 위반으로 이어질 수 있습니다."],
  ["운동 시 필요한 영양 보조제는?",
   "대표적인 영양 보조제로는 프로틴, 크레아틴, BCAA, 아르기닌이 있습니다. 프로틴은 근육 회복과 합성을 돕고, 크레아틴은 인산크레아틴 저장량을 늘려 폭발적인 근력 향상에 도움을 줍니다. BCAA는 운동 중 근손실 방지와 회복에 도움을 주며, 아르기닌은 혈류 개선과 펌핑 효과에 도움을 줄 수 있습니다."],

  ["세계도핑방지기구 WADA란?",
   "WADA는 전 세계 스포츠 도핑 방지 활동을 촉진, 조정, 감독하는 국제 독립기구입니다."],
  ["WADA 금지약물에는 어떤 것이 있는가?",
   "WADA 금지약물에는 동화작용제, 이뇨제, 호르몬 및 대사변조제, 마약, 흥분제 등이 있습니다."],
  ["WADA 상시 금지 방법은?",
   "WADA 상시 금지 방법은 혈액 및 혈액성분 조작, 화학적·물리적 변조, 유전자 및 세포 도핑입니다."],
  ["도핑방지규정의 3가지 핵심 원칙은?",
   "도핑방지규정의 핵심 원칙은 엄격책임 원칙, 사전 미통지 원칙, 치료목적사용면책 제도입니다. 엄격책임 원칙은 선수 체내 물질에 대한 책임이 선수 본인에게 있다는 원칙이고, 사전 미통지 원칙은 불시에 검사를 실시하는 원칙입니다. TUE는 치료 목적의 금지약물 사용을 예외적으로 승인받는 제도입니다."],
  ["도핑검사 시료채취의 합당한 지연 사유는?",
   "도핑검사 시료채취의 합당한 지연 사유에는 시상식 참석, 미디어 인터뷰, 정리운동, 의료 처치 등이 있습니다. 다만 도핑검사관의 허가와 감독 하에 이루어져야 합니다."],
  ["도핑방지규정에서 선수의 역할과 책임은?",

const listEl = document.getElementById('list');
const progressEl = document.getElementById('progress');
let order = QA.map((_, i) => i);
let filter = 'all';

// 채점 결과 저장/복원 (qi -> 'correct' | 'incorrect')
const STORE_KEY = 'bb_quiz_marks_v1';
let marks = {};
try { marks = JSON.parse(localStorage.getItem(STORE_KEY)) || {}; } catch (e) { marks = {}; }
function saveMarks() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(marks)); } catch (e) {}
}

function passesFilter(qi) {
  if (filter === 'all') return true;
  if (filter === 'unmarked') return !marks[qi];
  return marks[qi] === filter; // 'correct' | 'incorrect'
}

function render() {
  listEl.innerHTML = '';
  let shown = 0;

  order.forEach((qi, displayIdx) => {
    if (!passesFilter(qi)) return;
    shown++;

    const [q, a] = QA[qi];
    const mark = marks[qi]; // undefined | 'correct' | 'incorrect'

    const card = document.createElement('div');
    card.className = 'card' + (mark ? ' ' + mark + ' seen' : '');

    const badgeChar = mark === 'correct' ? 'O' : (mark === 'incorrect' ? 'X' : '');

    const question = document.createElement('div');
    question.className = 'question';
    question.innerHTML =
      '<div class="num">' + (displayIdx + 1) + '</div>' +
      '<div class="q-text">' + q + '</div>' +
      '<div class="badge">' + badgeChar + '</div>' +
      '<div class="chevron">⌄</div>';

    const answer = document.createElement('div');
    answer.className = 'answer';
    const inner = document.createElement('div');
    inner.className = 'answer-inner';
    inner.textContent = a;
    answer.appendChild(inner);

    const markBar = document.createElement('div');
    markBar.className = 'mark-bar';
    markBar.innerHTML =
      '<span class="label">채점:</span>' +
      '<button class="mark-btn correct-btn">⭕ 정답</button>' +
      '<button class="mark-btn incorrect-btn">❌ 오답</button>';
    markBar.querySelector('.correct-btn').addEventListener('click', (e) => {
      e.stopPropagation(); setMark(qi, 'correct');
    });
    markBar.querySelector('.incorrect-btn').addEventListener('click', (e) => {
      e.stopPropagation(); setMark(qi, 'incorrect');
    });
    answer.appendChild(markBar);

    question.addEventListener('click', () => toggle(card, answer));
    card.appendChild(question);
    card.appendChild(answer);
    listEl.appendChild(card);
  });

  if (shown === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty';
    empty.textContent = filter === 'incorrect'
      ? '오답으로 채점한 문제가 없습니다. 👍'
      : '해당하는 문제가 없습니다.';
    listEl.appendChild(empty);
  }

  updateProgress();
}

function setMark(qi, value) {
  marks[qi] = (marks[qi] === value) ? undefined : value; // 같은 버튼 다시 누르면 채점 취소
  if (marks[qi] === undefined) delete marks[qi];
  saveMarks();
  render();
}

function toggle(card, answer) {
  const willOpen = !card.classList.contains('open');

  // 다른 카드의 펼쳐진 답변은 모두 접기 (한 번에 하나만 열림)
  document.querySelectorAll('.card.open').forEach(other => {
    if (other !== card) {
      other.classList.remove('open');
      other.querySelector('.answer').style.maxHeight = '0';
    }
  });

  card.classList.toggle('open', willOpen);
  card.classList.add('seen');
  answer.style.maxHeight = willOpen ? answer.scrollHeight + 'px' : '0';
  updateProgress();
}

function setAll(open) {
  document.querySelectorAll('.card').forEach(card => {
    const answer = card.querySelector('.answer');
    card.classList.toggle('open', open);
    if (open) card.classList.add('seen');
    answer.style.maxHeight = open ? answer.scrollHeight + 'px' : '0';
  });
  updateProgress();
}

function updateProgress() {
  let correct = 0, incorrect = 0;
  QA.forEach((_, qi) => {
    if (marks[qi] === 'correct') correct++;
    else if (marks[qi] === 'incorrect') incorrect++;
  });
  const graded = correct + incorrect;
  const unmarked = QA.length - graded;

  document.getElementById('cnt-all').textContent = QA.length;
  document.getElementById('cnt-unmarked').textContent = unmarked;
  document.getElementById('cnt-correct').textContent = correct;
  document.getElementById('cnt-incorrect').textContent = incorrect;

  progressEl.textContent = '채점 ' + graded + ' / ' + QA.length +
    '  ·  정답 ' + correct + ' · 오답 ' + incorrect;
}

function setFilter(f) {
  filter = f;
  document.querySelectorAll('.chip').forEach(c => {
    c.classList.toggle('active', c.dataset.filter === f);
  });
  render();
}

function shuffle() {
  for (let i = order.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [order[i], order[j]] = [order[j], order[i]];
  }
  render();
}

document.getElementById('expandAll').addEventListener('click', () => setAll(true));
document.getElementById('collapseAll').addEventListener('click', () => setAll(false));
document.getElementById('shuffle').addEventListener('click', shuffle);
document.getElementById('reset').addEventListener('click', () => { order = QA.map((_, i) => i); render(); });
document.getElementById('resetMarks').addEventListener('click', () => {
  if (confirm('모든 채점 결과를 초기화할까요?')) {
    marks = {}; saveMarks(); render();
  }
});
document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => setFilter(chip.dataset.filter));
});
document.getElementById('total').textContent = QA.length;

render();
</script>
