<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>실전 모의고사 · 생체 2급 구술 면접</title>
<style>
  :root {
    --bg: #0f1419;
    --card: #1a212b;
    --card-hover: #212a36;
    --accent: #4ea1ff;
    --accent-soft: #1f3350;
    --q-color: #e8edf3;
    --a-color: #b8c4d0;
    --border: #2a333f;
    --answer-bg: #141b24;
    --gold: #ffce6b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Apple SD Gothic Neo", "Malgun Gothic", "맑은 고딕", system-ui, sans-serif;
    background: var(--bg);
    color: var(--q-color);
    line-height: 1.7;
    padding: 24px 16px 80px;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 720px; margin: 0 auto; }

  header { text-align: center; margin-bottom: 18px; }
  header h1 { font-size: 1.45rem; font-weight: 700; margin-bottom: 6px; }
  header p { color: #7b8794; font-size: 0.9rem; }
  .back-link {
    display: inline-block; margin-top: 12px;
    color: #7b8794; font-size: 0.85rem; text-decoration: none;
  }
  .back-link:hover { color: var(--accent); }

  /* 연속 만점 진행 표시 (상단 고정 띠) */
  .streak-bar {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    margin-bottom: 18px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 999px; padding: 10px 18px;
  }
  .streak-label { font-size: 0.85rem; color: #7b8794; font-weight: 600; }
  .flames { display: flex; gap: 6px; }
  .flame {
    font-size: 1.15rem; filter: grayscale(1) opacity(0.35);
    transition: filter .3s, transform .3s;
  }
  .flame.on { filter: none; transform: scale(1.15); }

  .panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 24px;
  }
  .hidden { display: none !important; }

  /* 인트로 */
  .intro-rules {
    list-style: none; margin: 16px 0 20px; padding: 0;
    color: var(--a-color); font-size: 0.95rem;
  }
  .intro-rules li { padding: 6px 0 6px 26px; position: relative; }
  .intro-rules li::before { content: "✔"; position: absolute; left: 0; color: var(--accent); }
  .intro-rules .warn::before { content: "⚠"; color: var(--gold); }
  .intro-stat {
    text-align: center; color: #7b8794; font-size: 0.85rem; margin-bottom: 18px;
  }
  .intro-stat b { color: var(--gold); }

  .big-btn {
    display: block; width: 100%;
    background: var(--accent); color: #06121f;
    border: none; border-radius: 999px;
    padding: 15px; font-size: 1.05rem; font-weight: 700;
    cursor: pointer; font-family: inherit;
    transition: filter .15s;
  }
  .big-btn:hover { filter: brightness(1.1); }
  .big-btn.gold { background: linear-gradient(135deg, #ffd97a, #f5a623); color: #3a2400; }
  .ghost-btn {
    display: block; width: 100%;
    background: var(--card); color: var(--q-color);
    border: 1px solid var(--border); border-radius: 999px;
    padding: 13px; font-size: 0.95rem; font-weight: 600;
    cursor: pointer; font-family: inherit; margin-top: 10px;
    text-align: center; text-decoration: none;
    transition: border-color .15s;
  }
  .ghost-btn:hover { border-color: var(--accent); }

  /* 라운드 내 문항 진행 */
  .progress-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .q-counter { font-size: 0.95rem; font-weight: 700; color: var(--accent); }
  .dots { display: flex; gap: 7px; }
  .dot { width: 11px; height: 11px; border-radius: 50%; background: var(--border); }
  .dot.correct { background: #2e7d52; }
  .dot.partial { background: #b8862b; }
  .dot.incorrect { background: #c14a4a; }
  .dot.active { box-shadow: 0 0 0 2px var(--accent); }

  /* 문제 */
  .q-num { color: #7b8794; font-size: 0.8rem; font-weight: 700; letter-spacing: .04em; }
  .q-text {
    font-size: 1.2rem; font-weight: 600; color: var(--q-color);
    margin: 6px 0 22px; line-height: 1.6;
  }

  .answer-box {
    background: var(--answer-bg); border: 1px solid var(--border);
    border-radius: 12px; padding: 18px; margin-bottom: 20px;
    color: var(--a-color); font-size: 1.0rem;
  }
  .answer-box .label {
    display: block; color: #7b8794; font-size: 0.78rem; font-weight: 700;
    letter-spacing: .05em; margin-bottom: 8px;
  }
  .kw {
    background: linear-gradient(transparent 58%, rgba(255,221,87,0.42) 58%);
    color: #f3f6fa; font-weight: 600; padding: 0 1px; border-radius: 2px;
  }

  .grade-row { display: flex; gap: 10px; }
  .grade-btn {
    flex: 1; background: var(--card); color: var(--a-color);
    border: 1px solid var(--border); border-radius: 999px;
    padding: 13px; font-size: 0.98rem; font-weight: 600;
    cursor: pointer; font-family: inherit; transition: all .12s;
  }
  .grade-btn.g-correct:hover { border-color: #54d18c; color: #54d18c; }
  .grade-btn.g-partial:hover { border-color: #ffce6b; color: #ffce6b; }
  .grade-btn.g-incorrect:hover { border-color: #ff7a7a; color: #ff7a7a; }
  .hint { text-align: center; color: #7b8794; font-size: 0.85rem; margin-top: 12px; }

  /* 라운드 결과 */
  .round-headline { text-align: center; font-size: 1.5rem; font-weight: 800; margin-bottom: 6px; }
  .round-headline.win { color: var(--gold); }
  .round-headline.lose { color: #ff9a9a; }
  .round-sub { text-align: center; color: var(--a-color); font-size: 0.98rem; margin-bottom: 4px; }
  .round-note { text-align: center; color: #7b8794; font-size: 0.88rem; margin-bottom: 20px; }

  .result-item { border: 1px solid var(--border); border-radius: 12px; margin-bottom: 10px; overflow: hidden; }
  .result-q { display: flex; align-items: flex-start; gap: 10px; padding: 14px 16px; cursor: pointer; background: var(--card); }
  .result-q:hover { background: var(--card-hover); }
  .result-badge {
    flex-shrink: 0; width: 24px; height: 24px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 0.85rem; color: #fff; margin-top: 2px;
  }
  .result-badge.correct { background: #2e7d52; }
  .result-badge.partial { background: #b8862b; }
  .result-badge.incorrect { background: #9c3636; }
  .result-qtext { flex: 1; font-size: 0.98rem; font-weight: 600; }
  .result-chevron { color: #6b7785; flex-shrink: 0; transition: transform .2s; }
  .result-item.open .result-chevron { transform: rotate(180deg); }
  .result-answer { max-height: 0; overflow: hidden; transition: max-height .25s ease; background: var(--answer-bg); }
  .result-answer .inner { padding: 16px; color: var(--a-color); font-size: 0.95rem; }
  .result-actions { margin-top: 22px; }

  /* 최종 합격 화면 */
  .victory { text-align: center; position: relative; }
  .trophy { font-size: 4.2rem; line-height: 1; margin-bottom: 8px; animation: pop .6s ease; }
  @keyframes pop { 0% { transform: scale(0); } 70% { transform: scale(1.25); } 100% { transform: scale(1); } }
  .victory h2 {
    font-size: 2.1rem; font-weight: 800; margin-bottom: 14px;
    background: linear-gradient(135deg, #ffe08a, #f5a623);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .victory .msg { color: var(--q-color); font-size: 1.05rem; line-height: 1.9; margin-bottom: 18px; }
  .victory .msg .em { color: var(--gold); font-weight: 700; }
  .victory .stats { color: #7b8794; font-size: 0.9rem; margin-bottom: 24px; }
  .victory .stats b { color: var(--q-color); }

  /* 축포 */
  #confetti { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 50; }
  .confetto { position: absolute; top: -12px; width: 9px; height: 14px; opacity: 0.9; will-change: transform; }
  @keyframes fall {
    to { transform: translateY(110vh) rotate(720deg); opacity: 0.9; }
  }

  @media (max-width: 600px) {
    .panel { padding: 22px 16px; }
    .q-text { font-size: 1.1rem; }
    .grade-btn { padding: 12px 4px; font-size: 0.88rem; }
    .victory h2 { font-size: 1.7rem; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🔥 실전 챌린지</h1>
    <p>무작위 5문제 만점을 <b>5번 연속</b> 달성하면 합격!</p>
    <a class="back-link" href="index.html">← 전체 문제로 돌아가기</a>
  </header>

  <!-- 연속 만점 진행 -->
  <div class="streak-bar" id="streakBar">
    <span class="streak-label">연속 만점</span>
    <div class="flames" id="flames"></div>
    <span class="streak-label" id="streakCount"></span>
  </div>

  <!-- 인트로 -->
  <div class="panel" id="introScreen">
    <ul class="intro-rules">
      <li>한 라운드 = <b>무작위 5문제</b>. 문제를 보고 답한 뒤 <b>정답 확인</b>으로 채점합니다.</li>
      <li><b>5문제 모두 정답(100점)</b>이어야 그 라운드를 통과합니다.</li>
      <li>이것을 <b>5라운드 연속</b> 달성해야 최종 합격입니다.</li>
      <li class="warn">한 문제라도 <b>헷갈림·오답</b>이면 연속 기록이 <b>0으로 초기화</b>되고 처음부터 다시!</li>
    </ul>
    <p class="intro-stat" id="introStat"></p>
    <button class="big-btn" id="startBtn">챌린지 시작</button>
  </div>

  <!-- 문제 -->
  <div class="panel hidden" id="quizScreen">
    <div class="progress-row">
      <span class="q-counter" id="qCounter"></span>
      <div class="dots" id="dots"></div>
    </div>
    <div class="q-num" id="qNum"></div>
    <div class="q-text" id="qText"></div>

    <div id="revealArea">
      <button class="big-btn" id="revealBtn">정답 확인</button>
    </div>

    <div id="answerArea" class="hidden">
      <div class="answer-box">
        <span class="label">모범답안</span>
        <span id="answerText"></span>
      </div>
      <div class="grade-row">
        <button class="grade-btn g-correct" data-g="correct">⭕ 정답</button>
        <button class="grade-btn g-partial" data-g="partial">🔺 헷갈림</button>
        <button class="grade-btn g-incorrect" data-g="incorrect">❌ 오답</button>
      </div>
      <p class="hint">정직하게 채점하세요 — 채점 후 자동으로 넘어갑니다</p>
    </div>
  </div>

  <!-- 라운드 결과 -->
  <div class="panel hidden" id="resultScreen">
    <div class="round-headline" id="roundHeadline"></div>
    <div class="round-sub" id="roundSub"></div>
    <div class="round-note" id="roundNote"></div>
    <div id="resultList"></div>
    <div class="result-actions">
      <button class="big-btn" id="nextBtn"></button>
      <a class="ghost-btn" href="index.html">전체 문제로 돌아가기</a>
    </div>
  </div>

  <!-- 최종 합격 -->
  <div class="panel hidden victory" id="victoryScreen">
    <div class="trophy">🏆</div>
    <h2>합격을 축하합니다!</h2>
    <div class="msg" id="victoryMsg"></div>
    <div class="stats" id="victoryStats"></div>
    <button class="big-btn gold" id="againBtn">다시 도전</button>
    <a class="ghost-btn" href="index.html">전체 문제로 돌아가기</a>
  </div>
</div>

<div id="confetti"></div>

<script src="quiz-data.js"></script>
<script>
const Q_PER_ROUND = 5;     // 라운드당 문항 수
const ROUNDS_TO_WIN = 5;   // 연속 만점 목표 라운드 수

// ── 공용 유틸 (index.html과 동일 로직) ──────────────────────
function escapeHtml(s) {
  return s.replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
}
function qhash(s) {
  let h = 5381;
  for (let i = 0; i < s.length; i++) h = ((h << 5) + h + s.charCodeAt(i)) | 0;
  return 'q' + (h >>> 0).toString(36);
}
function keyize(answer, question) {
  const kws = (typeof KW_MAP !== 'undefined' && KW_MAP[qhash(question)]) || [];
  if (!kws.length) return escapeHtml(answer);
  const ranges = [];
  for (const kw of kws) {
    let from = 0, idx;
    while ((idx = answer.indexOf(kw, from)) !== -1) { ranges.push([idx, idx + kw.length]); from = idx + kw.length; }
  }
  if (!ranges.length) return escapeHtml(answer);
  ranges.sort((a, b) => a[0] - b[0] || b[1] - a[1]);
  const merged = []; let curEnd = -1;
  for (const [st, en] of ranges) {
    if (st >= curEnd) { merged.push([st, en]); curEnd = en; }
    else if (en > curEnd) { merged[merged.length - 1][1] = en; curEnd = en; }
  }
  let out = "", last = 0;
  for (const [st, en] of merged) {
    out += escapeHtml(answer.slice(last, st));
    out += '<span class="kw">' + escapeHtml(answer.slice(st, en)) + '</span>';
    last = en;
  }
  out += escapeHtml(answer.slice(last));
  return out;
}

// ── 기록 저장 ──────────────────────────────────────────────
const STAT_KEY = 'bb_exam_streak_v1';
function loadStat() { try { return Object.assign({ best: 0, clears: 0, rounds: 0 }, JSON.parse(localStorage.getItem(STAT_KEY)) || {}); } catch (e) { return { best: 0, clears: 0, rounds: 0 }; } }
function saveStat(s) { try { localStorage.setItem(STAT_KEY, JSON.stringify(s)); } catch (e) {} }
let stat = loadStat();

// ── 상태 ──────────────────────────────────────────────────
let pick = [];     // 이번 라운드 문항 인덱스
let cur = 0;       // 현재 문항(0-based)
let grades = [];   // 이번 라운드 채점
let streak = 0;    // 연속 만점 라운드 수
let totalRounds = 0; // 이번 시도에서 치른 라운드 수

const $ = id => document.getElementById(id);

function pickQuestions(n) {
  const idx = QA.map((_, i) => i);
  for (let i = idx.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [idx[i], idx[j]] = [idx[j], idx[i]];
  }
  return idx.slice(0, Math.min(n, idx.length));
}

function showScreen(name) {
  $('introScreen').classList.toggle('hidden', name !== 'intro');
  $('quizScreen').classList.toggle('hidden', name !== 'quiz');
  $('resultScreen').classList.toggle('hidden', name !== 'result');
  $('victoryScreen').classList.toggle('hidden', name !== 'victory');
  $('streakBar').classList.toggle('hidden', name === 'victory');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderFlames() {
  const f = $('flames');
  f.innerHTML = '';
  for (let i = 0; i < ROUNDS_TO_WIN; i++) {
    const s = document.createElement('span');
    s.className = 'flame' + (i < streak ? ' on' : '');
    s.textContent = '🔥';
    f.appendChild(s);
  }
  $('streakCount').textContent = streak + ' / ' + ROUNDS_TO_WIN;
}

function renderIntro() {
  streak = 0; totalRounds = 0;
  renderFlames();
  if (stat.clears > 0) {
    $('introStat').innerHTML = '🏆 합격 달성 <b>' + stat.clears + '회</b> · 최고 연속 만점 <b>' + stat.best + '라운드</b>';
  } else if (stat.best > 0) {
    $('introStat').innerHTML = '최고 연속 만점 <b>' + stat.best + '라운드</b> · 전체 ' + QA.length + '문항';
  } else {
    $('introStat').innerHTML = '총 <b>' + QA.length + '문항</b> 중에서 무작위 출제';
  }
  showScreen('intro');
}

function startChallenge() {
  streak = 0; totalRounds = 0;
  renderFlames();
  startRound();
}

function startRound() {
  pick = pickQuestions(Q_PER_ROUND);
  cur = 0;
  grades = new Array(pick.length).fill(null);
  renderFlames();
  showScreen('quiz');
  renderQuestion();
}

function renderDots() {
  const dots = $('dots');
  dots.innerHTML = '';
  pick.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (grades[i] ? ' ' + grades[i] : '') + (i === cur ? ' active' : '');
    dots.appendChild(d);
  });
}

function renderQuestion() {
  const qi = pick[cur];
  const [q] = QA[qi];
  $('qCounter').textContent = '라운드 ' + (streak + 1) + ' · 문제 ' + (cur + 1) + ' / ' + pick.length;
  $('qNum').textContent = 'Q' + (cur + 1);
  $('qText').textContent = q;
  $('answerArea').classList.add('hidden');
  $('revealArea').classList.remove('hidden');
  renderDots();
}

function revealAnswer() {
  const qi = pick[cur];
  const [q, a] = QA[qi];
  $('answerText').innerHTML = keyize(a, q);
  $('revealArea').classList.add('hidden');
  $('answerArea').classList.remove('hidden');
}

function grade(value) {
  grades[cur] = value;
  if (cur < pick.length - 1) {
    cur++;
    renderQuestion();
  } else {
    finishRound();
  }
}

function finishRound() {
  totalRounds++;
  stat.rounds = (stat.rounds || 0) + 1;
  const correct = grades.filter(g => g === 'correct').length;
  const perfect = correct === pick.length;

  if (perfect) {
    streak++;
    if (streak > stat.best) stat.best = streak;
  } else {
    streak = 0;
  }
  saveStat(stat);
  renderFlames();

  if (perfect && streak >= ROUNDS_TO_WIN) {
    renderVictory();
  } else {
    renderRoundResult(perfect, correct);
  }
}

function renderRoundResult(perfect, correct) {
  const partial = grades.filter(g => g === 'partial').length;
  const incorrect = grades.filter(g => g === 'incorrect').length;

  const head = $('roundHeadline');
  if (perfect) {
    head.className = 'round-headline win';
    head.textContent = '🔥 만점! (' + streak + '/' + ROUNDS_TO_WIN + ' 연속)';
    $('roundSub').textContent = pick.length + '문제 모두 정답입니다.';
    $('roundNote').textContent = '앞으로 ' + (ROUNDS_TO_WIN - streak) + '라운드만 더 연속 만점이면 합격!';
    $('nextBtn').textContent = '다음 라운드 도전 →';
  } else {
    head.className = 'round-headline lose';
    head.textContent = '아쉬워요, 연속 기록 초기화';
    $('roundSub').textContent = '이번 라운드: ⭕ ' + correct + ' · 🔺 ' + partial + ' · ❌ ' + incorrect;
    $('roundNote').textContent = '만점이 아니면 연속 기록이 0이 됩니다. 틀린 문항을 확인하고 다시 도전하세요!';
    $('nextBtn').textContent = '처음부터 다시 도전 →';
  }

  const list = $('resultList');
  list.innerHTML = '';
  const badgeChar = { correct: 'O', partial: '△', incorrect: 'X' };
  pick.forEach((qi, i) => {
    const [q, a] = QA[qi];
    const g = grades[i] || 'incorrect';
    const item = document.createElement('div');
    item.className = 'result-item';
    item.innerHTML =
      '<div class="result-q">' +
        '<div class="result-badge ' + g + '">' + badgeChar[g] + '</div>' +
        '<div class="result-qtext">' + escapeHtml(q) + '</div>' +
        '<div class="result-chevron">⌄</div>' +
      '</div>' +
      '<div class="result-answer"><div class="inner">' + keyize(a, q) + '</div></div>';
    const qhead = item.querySelector('.result-q');
    const ans = item.querySelector('.result-answer');
    qhead.addEventListener('click', () => {
      const open = item.classList.toggle('open');
      ans.style.maxHeight = open ? ans.scrollHeight + 'px' : '0';
    });
    // 틀리거나 헷갈린 문항은 복습하도록 자동으로 펼쳐 둠
    if (g !== 'correct') {
      item.classList.add('open');
      // maxHeight는 화면 표시 후 설정 필요 → 다음 틱에 적용
      setTimeout(() => { ans.style.maxHeight = ans.scrollHeight + 'px'; }, 0);
    }
    list.appendChild(item);
  });

  showScreen('result');
}

function renderVictory() {
  stat.clears = (stat.clears || 0) + 1;
  saveStat(stat);

  $('victoryMsg').innerHTML =
    '무작위 5문제를 <span class="em">5번 연속 만점</span>으로 통과했습니다.<br>' +
    '이건 운이 아니라 <span class="em">실력</span>입니다. 어떤 문제가 나와도 막힘이 없네요!<br>' +
    '실제 시험장에서도 지금처럼 <span class="em">자신 있게</span> 답하시면 됩니다.<br>' +
    '그동안 정말 고생 많으셨습니다 — <span class="em">합격을 진심으로 응원합니다!</span> 💪';
  $('victoryStats').innerHTML =
    '이번 도전에서 치른 라운드 <b>' + totalRounds + '회</b> · 누적 합격 달성 <b>' + stat.clears + '회</b>';

  showScreen('victory');
  launchConfetti();
}

// ── 축포 ──────────────────────────────────────────────────
const CONFETTI_COLORS = ['#ffce6b', '#4ea1ff', '#54d18c', '#ff7a7a', '#f5a623', '#b388ff'];
function launchConfetti() {
  const root = $('confetti');
  root.innerHTML = '';
  const N = 120;
  for (let i = 0; i < N; i++) {
    const c = document.createElement('div');
    c.className = 'confetto';
    const left = Math.floor((i / N) * 100) + (i % 5) * 2;
    const dur = 2.6 + (i % 7) * 0.35;
    const delay = (i % 11) * 0.12;
    c.style.left = (left % 100) + 'vw';
    c.style.background = CONFETTI_COLORS[i % CONFETTI_COLORS.length];
    c.style.animation = 'fall ' + dur.toFixed(2) + 's linear ' + delay.toFixed(2) + 's forwards';
    if (i % 3 === 0) c.style.borderRadius = '50%';
    root.appendChild(c);
  }
  // 정리
  setTimeout(() => { root.innerHTML = ''; }, 9000);
}

// ── 이벤트 ────────────────────────────────────────────────
$('startBtn').addEventListener('click', startChallenge);
$('revealBtn').addEventListener('click', revealAnswer);
$('nextBtn').addEventListener('click', startRound);
$('againBtn').addEventListener('click', startChallenge);
document.querySelectorAll('.grade-btn').forEach(btn => {
  btn.addEventListener('click', () => grade(btn.dataset.g));
});

renderIntro();
</script>
